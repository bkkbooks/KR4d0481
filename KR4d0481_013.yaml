body:
  text: 定宇集卷十三元陳櫟撰試文講義賀立太子表伏以青宫肇建天方耀於前星黃屋尊居人益瞻於北極慶綿宗社喜溢寰區中賀臣聞宗子維城大所以固邦本震男主器重可以繫羣心以聰明睿知之君得恭敬溫文之嗣重明麗正天下之化由之一有元良萬國之貞以此福延無盡幸豈斯今恭惟皇帝陛下道極髙明計定悠久􅏨綿于瓞視周業而匹休李盤其根笑唐基之未大視膳愛篤主鬯位堅臣幸值邦榮屬分省寄龍樓問曉想歡洽於奉承鷺序班晨愧阻陪於舞蹈賀瑞芝表伏以聖皇御極物説兌秋造化發祥芝彰賁治特産虞庠之域將開孔道之符夫豈偶然必有召此中賀臣聞世珍靈草品異凡荄漢作房歌猶薦揚於九廟唐生陜府尚頒示于百僚豈如臨照之初預兆聲名之盛教嚴于淑胄子之地瑞應于祀素王之庭卓冠古今歡傳遠邇欽惟皇帝陛下天資睿知帝學緝熙接統緒于千齡道能傳道茁芝莖於三秀和以召和臣某幸際休徴曷勝喜氣必大書于信史實可並堯蓂之呈期永夀於斯文豈但邁莊椿之算道不欲雜論論曰聖人以一心貫道非深於道者未易知也夫道之體一而已矣而其用則散於萬殊雖萬殊也而實不外乎一本也天下無心外之道聖人之於道亦惟以一心貫之道之萬殊不外乎一本聖人以一心貫道則一本可該乎萬殊以一本言無雜也以萬殊言亦不可以雜言也道本無雜可雜非道也而奚以不欲雜為哉莊生述仲尼答顔淵之問而以道不欲雜為言此殆莊生之寓言而非夫子之言也雖其末焉要歸之論能究極于心欲以心之虛集道之實若于一貫之旨有見者其論似焉而實非也吾故曰非深于知道者未易言也請因莊生之言而辨之聖道其天矣乎天之道至誠無息其為物不二也不二者一也無雜也而萬物自為之各得其所焉不過于一中分造化雖萬也而實一之散殊也亦未嘗雜也蓋至誠無息者道之體萬殊之所以一本也萬物各得其所者道之用一本之所以萬殊也天地以生物為心亦惟以一心貫通而已天之道猶以一心貫之孰謂聖人之于道而不以一心貫之乎聖人之道其泛應曲當用各不同若雜然而無倫也然聖人之心則惟渾然一理之貫通而已曷嘗有一毫之駁雜者故曰吾道一以貫之而曽子所以深契於一唯也曽子猶然契于一唯而况顔子乎夫子于回終日與言博之以文凡于斯道之萬殊無不言矣其以一心貫萬殊而歸一於本者則博之之餘未嘗不約之以禮也夫豈務博而陷于支離分雜者若莊生述孔顔問答則異是矣顔子雖王佐才志在為邦然未嘗汲汲焉陋巷簞瓢終身自樂安有之衛之行哉謂衛君年少行獨而輕其國或者曰衛君蒯聵也或曰蒯聵方以魯哀之末年復國時顔子已不在矣殆出公輒也吁周子之兄之前果可與談莊周之化蝶哉使誠有之二君者一得罪于父一據國拒父悖于三綱大倫道之大本已絶奚論其行獨而輕用其國哉莊生之説謂夫子欲止其行而首以道不欲雜言且謂雜則多且擾而憂隨之嗟夫是非夫子之言也聖人之一本散為萬殊以一心貫通之其萬殊者不外于一本一而萬萬而一無所謂雜也亦正不必言不欲雜也天下同歸而殊塗一致而百慮天下何思何慮何患其多何患其擾而又何憂焉夫子博顔子以文而約之以禮博則廣之以萬殊而約則貫之于一本也是真夫子所以與顔子言者也今是言也無乃莊生之于道略見其體之一者反覆數千百言而未有攸當也歸之于心齋而曰唯道集虛虛者心齋也不求道于道而求道于心似矣若欲以心之虛集此道者則實非也蓋道不外于心心之外無道道也心也本一也而非二也豈道為心外物必有假于集之而後有所得哉且又先之曰無聽之以心而聽之以氣舍心之本而求之氣之末何始言道之不欲雜而終焉之論求道如是其雜哉愚故曰非夫子之言也莊生為是言似是焉而實非也豈無所見而敢云爾哉噫聖道本無雜也而異端欲雜之莊周之于聖道非愚者之不及殆智者之過也凡其書載夫子之言與夫譏議夫子之言大率皆過于荒唐之論無一如魯論之可信可稽者是聖道本無雜而周欲雜之也夫子嘗曰攻乎異端斯害也已異端則深為聖道害豈徒雜之而已哉噫莊生非深于聖道者宜其于聖道未易言而反雜之也謹論九五福一曰夀論疇止于陽數之終故知慶尤備于聖人壽立於陽數之始當知年尤永于聖人夫福夀為基疇該聖人之全有此福必首願聖人之長有此夀也疇終於一書聖人之福固有必俱有數始于一疇聖人之夀實有必久有乃知夀聖人以享此全福者天也聖人之長享此夀乃所以全享此福歟此箕疇至九而言福明疇必于一而言夀也且洪範之疇有九而五福之疇居其九是福也蓋持衆美而效之君者也洛書之數至九而全聖人之福亦至五而全以此五者之福總於五福之疇福者備也固全備于聖人矣然全享此福必夀則可以長享此福宜箕子以一曰首明之謂天生聖人豈偶然者天命長久是曰夀焉夀為福之基天所以夀聖人乃常以全福福聖人歟衆疇有所終固願聖人之全得其福一疇有所始首願聖人之必得其夀必得其夀始可以全得其福五福以夀為先厥有旨哉請暢發厥旨嘗謂人生之福以備為貴尤以久為貴故敘疇中之福至於五而全福以久為貴故明福中之夀居于一之始論福必先論夀其諸以得夀則有其基以得福歟何以言之洛出書聖人則之洛書終於九數而洪範之則之也五福終于九疇治天下之大法至此而全故享天下之大順惟聖人為能全之全不歸之聖人而誰歸然何莫非福也聖人以一身備諸福亦何莫非所以享此福也而君子之明疇必以夀居衆福之先夫豈強為是之次第者豈不以五常理之備者也而非仁無以包之故言五常者必先于仁五行氣之備者也而非水無以生之故言五行者必先于水五福者福之備者也而非夀無以享之故言五福者必先于夀天之生聖人也不數洪龎碩大之氣悠遠久長之數其逢之也猶不數聖人之身實洪碩之氣之所鍾固宜其全享此福也聖人之生悠遠久長之數之所屬尤宜其長享此夀也天將以多福福聖人則必以上夀夀聖人故品第一定其疇而福皆該焉權衡以定其論而夀獨先焉以多福歸聖人而先以上夀願聖人得非福固足以該夫夀夀則永可以享夫福其夀如山則其福如川其夀如松則其福如茨夀等箕翼則福齊岡陵君子誠非強為是之次第者然則行葦不惟言介爾景福也而必曰夀考惟祺甫田不惟言報以介福也而必曰萬夀無疆詩人以夀為福基其與箕疇該五福于衆疇之中而首曰夀於一疇之終始者蓋亦相表裏者歟今夫履一而載九者洛書數也始于一五行而終于九五福者聖人則洛書之數也洪範大法至是極備聖人治功至是成終于是備大順而享全福亦可以無愧矣疇之九于斯而終福之五于斯而萃降年有永夀之福也充積有餘富之福也安靜無虞康寧之福也樂善不倦而好德之福備修身以俟而考終之福備此所謂五福也非聖人信不足以全享之矣然備于九疇之終者為福而歸夫疇之始者為夀人生天地中莫難備者福人于衆福中尤難得者夀得此夀則衆福享之百年而不難不得此夀則衆福享之一日而未易此當然之理必至之符閲千古而不易焉所謂接千齡而聖人生天之所賦山川之所鍾靈實天地間最高厚之氣最悠長之數其超越等倫冠絶庸衆不知其幾也常人如蟪蛄之不知春秋其于諸福不過寵利之幸邀耳聖人之夀等龜鶴則所以享此全福者何莫非安富尊榮之日凡人如朝菌之不知晦朔則於諸福不過榮華之飄風耳聖人之夀邁松柏則所以受此全福者何莫非優悠怡愈之時聖人關天地而出享有道之長蓋將與日月兮齊光長千古而不老者夀綿于千萬嵗則千萬嵗此福也夀歷于億萬年則億萬年此福也夀延于無窮無極則此福亦無窮無極福以夀而久夀為福之基明疇君子其以長享此夀願聖人者蓋將以全享此福歸聖人夫豈諛乎哉抑論之聖人無心于福與夀天自有心于福夀乎聖人然聖人非聽之天而已語曰仁者夀易曰有大德者必得其夀好德之中自有有永之夀有餘之福焉夀居福之先夀之福豈出於好德之福之外哉觀箕疇之論福者又當以是而求之昔嘗考之矣九疇之序雖至五福而終五福之本實自皇極而出曰皇建其有極斂時五福是也五福之斂本於皇極之建然則皇極者五福之根本五福者皇極之效驗歟然箕子之明疇不以他為福之先而獨于夀推先焉抑又何也豈非以天下無夀外之福綿此夀則能享此福夀聖人者天也則願聖人夀以全有此福君子之願蓋同符于天也洪範九疇始于五行中于皇極終于五福武王之夀蓋與五行相胚胎皇極相終始善必先知九齡見夢天之夀武王實􅂌之以五行正氣之永長而使之長為皇極至理之宗主者由是以此上夀基此全福富有四海身其康強富與康寧之福也以夀享之也勤用明德高朗令終好德考終之福也無非夀享之也長有此夀以全有此福箕子明疇之深意深乎旨哉抑又有説福有基以夀為之基豈惟聖人為然哉自天子以至于庶人皆然斂時五福錫厥庶民是福也聚之武王之一身而散之于百千萬億人之身蓋一人有慶而兆民賴之耳君之夀即民之夀君之福即民之福華封之祝祝聖人夀堯之上夀如彼故堯之民多仁夀而夀域開於唐則萬邦協和之福夀之餘效也德為聖人必得其夀舜上夀如許故舜之民多仁夀而夀域開于虞則萬邦咸寧之福夀之餘慶也豈特建極斂福之武王為然猗歟休哉何幸為夀域中之一民而願聖人夀擬唐處士陽城除諫議大夫誥古者諫無専官上而為相復於王以從諫下而為工亦執藝事以諫官無高卑人無貴賤皆以諫納忠漢以來有諫大夫始以諫為名則專以言為責任亦重矣至我有唐有拾遺有補闕又有諌議大夫其任固不尤重歟在廷之臣或以選直或以序進未有以處士起家居是官者處士陽城潛德弗耀化其鄉人大臣以爾名聞安有能善其鄉而不能正其君者是用擢為諫議大夫官以諫且議為名宜直諫讜議以奉其職豫違汝弼汝其懋哉毋蹈漢人所謂處士純盜虛聲則豫汝嘉問曾子曰夫子之道忠恕而已矣中庸曰忠恕違道不逺同一忠恕也而聖人學者異焉先儒謂迹雖同而心實異其論確矣然此直為施諸已而不願亦勿施於人者言之爾至若我不欲人之加諸我也吾亦欲無加諸人則與勿施於人異矣使子貢果及此可謂與聖人之心不異乎其猶有間乎毋率爾而對將以觀深造焉對夫子之道忠恕言聖人之道也動以天者也中庸違道不遠之忠恕言學者之于道也動以人者也朱子集注曰盡已之謂忠推已之謂恕又曰中心為忠如心為恕聖人之道安而行之何待于盡已推已哉惟曽子能悟一貫于一唯門人則不能矣曽子之答門人所以必借學者盡己推己之目以著明之忠字在聖人為誠恕字在聖人為仁聖人之道本不當以忠恕言也中庸所謂忠恕方是正言學者之忠恕爾違猶去也朱子章句云如齊師違榖七里之違言忠恕之去道不遠也所以程子于語之忠恕曰忠者體恕者用忠者無妄恕者所以行乎忠也此與違道不遠異者動以天爾豈非夫子之道忠恕自然而然以動以天者言之中庸所謂忠恕勉而行之以動以人者言之乎先儒謂迹雖同而心實異迹之同者同以忠恕言也心之異者動有天人之分也施諸己而不願亦勿施于人雖繼忠恕違道不遠之後乃獨以恕言而不及乎忠蓋忠恕如形與影不可相離單言恕則忠行乎其中矣所謂無忠做恕不出必忠而後所如之心始得其正耳至若子貢所謂我不欲人之加諸我吾亦欲無加諸人與中庸之施諸己而不願亦勿施于人辭若不異而夫子以為非爾所及何也此以仁言者也朱子嘗以對終身可行之恕章而辨之曰無者自然而然勿者禁止之辭此所以為仁與恕之别至矣盡矣今明問惟即中庸之勿施于人與子貢之欲無加諸人對言以示疑而不及夫子對子貢所謂己所不欲勿施于人者毋乃欲窺見學者之所藴歟聖門雖自顔子以下頴悟莫如子貢子貢自謂何敢望回顔子于仁尚不能無違于三月之後况子貢乎夫子明謂非爾所及則子貢之不能及此可見矣使其晚年得聞性與天道之妙而庶幾及焉亦恐守之也非化之也愚敢斷之曰無加諸人流出于心不待勉強自然行仁之事也其自曽子所謂夫子之道忠恕動以天之道而為者歟勿施于人以心度心勉強行之強恕求仁之事也其自子思所謂忠恕違道不遠動以人之道而推之者歟問子以四教文行忠信又曰行有餘力則以學文行先於文歟文先於行歟對子以四教文行忠信先文而後行弟子記夫子之教也行有餘力則以學文先行而後文夫子之言所以教為人弟子者也集注於四教章曰教人以學文修行而存忠信也於行有餘力章曰文謂詩書六藝之文德行本也文藝末也窮其本末知所先後可與入德矣愚竊謂文行忠信之文與君子博學于文博我以文之文同凡天地間事事物物之理皆文也其所該甚廣大先文而後行其先博文而後約禮先格物致知而後誠意正心修身之意歟則以學文之文不過指詩書六藝之文而言乃文藝之末耳其所該不及文行之文之廣大矣蓋有感于時之為人弟子者徒事文藝之末而忽德行之本故欲其先孝弟等而後文藝歟以為學之大端言則當先文而後行以文藝之輕重言則當先行而後文意固各有攸在也歷試卷經疑論語曰溫故而知新可以為師矣記乃云記問之學不足以為人師孟子曰人之患在好為人師師説又云巫醫樂師百工之人不恥相師其義如何毋隱對師道在天地間不可一日不立也尚矣人生三事如一三者何君父師也人非父不生非君無以治其生非師無以善其生師道之重與君父等是師也本為道成而上者言也道成而上者有師藝成而下者亦因謂之師是殆師其所師而非吾所謂師矣奈之何藝成而下者反知所師而道成而上者乃或有愧于所謂師乎論語學記孟子之言謂為師者也以道成而上者言也師説之言謂相師者也借藝成而下者言也為師者不可有好為師之心彼為師者而好為師是未知溫故知新始可以為師而記問之學猶不足為師焉則方汲汲于義理之無窮而不敢沾沾于記問之有限于師將有所不暇為矣而何好之有彼從師者而恥相師是未知巫醫樂工之猶知師藝成而下者之猶不恥相師耳使知巫醫樂工之猶知有師藝成而下者之不恥相師焉則方將因荑稗之有秋而悟我黍稷之末植于從師將有所不暇息矣而何恥之有請詳言之夫溫故知新與記問之學不同溫故知新者時習舊聞而每有新得也記問之學者無得于心而所知有限也天下之義理無窮學問之工夫何盡能溫故以無亡其所能而每知新以日知其所亡則所學日新而其應不窮始可以為師矣夫子言此始僅可以為師以明未溫故知新者之未可以為師也若徒以記問為學則拘于口耳之舊聞而無心思之新得以在我有限之記何以應學者無窮之求所以不足于為人師也學記言此猶不足以為師則夫併記問之學而無之者其不足以為師又不言可知矣先儒可以為師一章而引學記之語以為經義互相發明有旨哉若夫孟氏以好為師為人患者亦以人之為人師學問有餘人資于己不得已而應之耳若有好為師之心則自足而不復有進矣此人之大患也愚謂好為師者是未知師道之為重師名之難稱者也彼知新者始僅可以為師記問猶不足以為師而我乃敢好為師乎能知新而不徒為記問之學則雖不好為師而人必將師之不能知新而僅為記問之學或不能為記問之學焉則雖好為師而不足師矣孔孟之時師道猶立猶未重可慨也孰謂時世愈降師愈微如韓愈氏之處唐者也時至中唐師道不立甚矣獨一昌黎奮不顧俗唱師説以鳴人已蜀日已越雪之尚望其知有師者乎獨不思士大夫之族其自視何如其髙自標致視巫醫樂工又何如今于身則恥師焉視彼之不恥相師乃甘心遜而弟之以道成而上者自居而智反出藝成而下者之下以從師為恥而不牛馬襟裾之恥以事師為恥而不羊質虎皮之恥其恥殆終身不去矣巫醫樂工之師為其徒者猶能如畏壘之尸而祝之師友淵源之師則泛泛乎如浮萍之相值于江湖可恥孰有大于是者是則韓子之所憂也是則師説之所以作也要知性者萬物之一源非有我之得私也以在我學問之有餘而應學者之不足此公天下之用心耳孔子有朋自遠方來不亦樂乎孟子曰得天下英才而教育之三樂也學廣問多道隆望重不待溫故而始知新焉不徒僅為記問之學焉則以我覺覺彼後覺不私理義之悅心使均得以悅于心方且𢎞樂育之造尚安有好為之患者若夫恥于相師則其恥自有矣為師者何與焉師道立則善人多善人多則朝廷正而天下治為弟子者何幸順下風而立謹對人生八嵗入小學而教之以灑掃應對進退之節禮樂射御書數之文十五而入大學教之以窮理正心修身治人之道此為學之序或有偶失其序寖是年長奈何即欲進而躐等于大學之事則時過後學不無勤苦難成之憂又欲退而俯循其小學之事則與先生並行必不屑為將命之童外而師友之講明內而父兄之教詔使之入小學大學各得其宜何説而可由小學而進于大學尚矣或有其年寖長未由小學而遽進于大學者豈惟今日憂之先儒已憂之其説具于大學或問可考也愚默覩今日為學之弊歷察古人為學之宜嘗因是而酌之曰年之寖長者遽進于大學不當以年之己長而自居力補乎小學之缺遺年之方幼者方進于小學必當以年之寖長者為鑒而力培乎大學之基本何也小學所以培大學之基本大學所以收小學之成功二者之學相為終始其序不可紊其功不可缺也久矣先儒之序小學大學二書也必兼舉而互言之序小學則曰小學之方灑掃應對窮理修身斯學之大是因小學而要終于大學也序大學則曰人生八嵗皆入小學而教之以灑掃應對進退之節禮樂射御書數之文及其十有五年則入大學而教之以窮理正心修身治人之道是因大學而原始于小學也可見學大學者必由小學以為之入門學小學者當知大學以為之標的初非截然為二而不可以相入也循序漸進固當然矣不幸偶失其序而年之寖長者初末有小學之工夫遽自躋于大學之等輩祗見其躐等陵節終發望洋向若之嘆而已然則如之何亦惟尺璧寸隂汲汲兢兢參之小學以補前日未為之功講明大學以盡今日當為之業敬以涵養敬以致知而復敬以力行讀書次第為學工程謹守先儒之遺訓而從事焉毋以年長自居毋以俯就自恥人一己百人十己千以學之則雖愚必明雖柔必強也何勤苦難成之足憂哉能如此則將自知長幼之有序而與先生並行非所患也亦不必拘于使之為將命之童而屑不屑不必論也吁此為年之既長而失其序者言之也若方幼者可以其幼而忽諸乎八嵗而後十五以前七八寒暑倐忽間耳茍不力加之培養漸與之發明則一轉盼而十五矣總角丱兮突而辨兮後之視此方幼者即今之視夫寖長者也然則如之何曰天下無不教之資惟在得所以善教之道幼學之士性情之竇未開知能之良未遠培養其氣質之美第一義也開發其性質之明第二義也孟子曰其子弟從之則孝弟忠信雖不止為小學言而于小學為尤切何也孝弟忠信之質所以蚤培而豫養之者莫急于此時也陵犯虛偽之根潛伏于此而不自知則少成若性待其長而責之以孝弟忠信難矣若夫性資有敏有鈍鈍者姑謹守夫小學之法無以議為也其稍敏者當隨其所見而開發之小學之書之外如語如孟如大學皆可以漸而誦習講明之使之先識其標的之所在待其長而精熟焉終身鑽仰而造詣焉而其基本則已此焉立矣夫如是庶不蹈寖長者之覆轍乎不然吾懼其及也嗟夫天下事履之而後知身自嘗焉而後驗遙度意決皆非也而况相與論小學大學之宜乎為學之弊愚也三折肱於此矣終不敢外先儒之説以對小學之序有曰以培其根以達其枝味哉斯言培其根指小學言也達其枝指大學言也譬之木焉方其始生枝雖未逹而根茍先培則異日上撓青雲下庇千人之枝其本體皆具于此矣茍非培之為深根為蟠根異日欲望其枝之逹胡可得也由此言之則大學綱三目八之全體大用其根盡在于小學所關甚不小也審然也則今日之入耳出口僅皆誦焉者小學之教果在于此而已乎是果能培其根以待異日而逹其枝乎內而父子外而師友其加之意焉伯魚過庭聞詩聞禮孟子學孔子者也乃曰君子之不教子古者易子而教何耶對古人之于子也有親傳之教有師傅之教親傳之教仁之至也師傅之教義之盡也亦仁之至也師傅之教蓋所以濟親傳之教而親傳之教亦所以助師傅之教所以道並行而不相悖者也孔子之教伯魚也不以師傅廢親傳耳曷嘗以親傳廢師傅哉易子而教古法也亦孔氏家法也孟子學孔子者也孟子之言未嘗悖于道也謂孟子之言教子異于孔子之所以教其子疑之過矣請詳陳之父子之道天性也而父子主恩責善朋友之道也而朋友以義合人倫有五而父子居其首朋友居其終焉而師不與非師不與也師也朋友之尊者也人生于三事之如一君父師是也天生時而地生材人其父生而師教之四者君以正用之是師也者上參乎君父之尊而下為朋友之倫中之最尊者也使君子必盡親教其子而不使之從師則師道不立而師可廢矣父子主恩而責善則義得以賊恩故易子而教之使主恩之仁全于己而以責善之義望之師兹道也所以濟此仁也以師傅之教託之師而或有當抽關啓鑰身率言傳者亦不容不以親傳之教喻其子焉此亦天理人情之至而不容己者三代之隆法教寖備王宫國都以及閭巷莫不有學家之孰黨之庠術之序國之學必有師焉記曰生子十年出就外傅榖梁子曰羈貫成童不就外傅父之罪也未聞必親教其子也孔子之教伯魚也今特無以考其所從何師而其必從師可知矣不徒證之他書只以過庭聞詩禮一章證之自可知也若孔子自親教其子則詩禮之終始孔子自耳提面命口講而指畫其所以學未學了然心知之矣何待問其嘗學詩學禮乎陳亢又何為而曰君子之遠其子乎吾故曰孟子之言未嘗悖于孔子也教子以親傳之教仁也教子以師傅之教義所以全此仁也伯􅆥之兒無奪席后稷之孫無惰穡耳濡目染之化身率言傳之功自有不容以師傅廢親傳者豈盡以教之責付之師而純以姑息之愛禽犢之愛待其子噤不以一語教之而後為合于君子之教子哉請證之朱子或問朱敬之有異聞乎曰得一日教看大學此即陳亢之問伯魚之對之意也敬之朱子第三子也今雖未知敬之所從何師然公之長子孰特命之遠親傳之教而求師傅之教不遠千里由建而婺以師小東萊先生吕成公焉可見文公教子之法矣其遣孰之婺也親書數千百言細大不捐詳曲必盡末䇿警數十語深切著明終之曰夙興夜寐無忝爾所生勉之勉之在此一行曷嘗以從成公師傅之教而盡默默于親傳之教乎吁孟子學孔子者也朱子學孔子孟子者也其于教子也仁之至義之盡也一而已矣而有二乎哉謹對人心惟危道心惟微惟精惟一允執厥中對心統性情者也執中則以精一而能性其情者也人心生于情欲之私道心原于性命之正心之所發雖有情與性之殊能精且一而明誠之兼盡則性其情而情其性而無過不及之中在是矣此舜所以發明堯之一言以授禹也夫心之虛靈知覺其本一而已矣而其用之發則有人心道心之分雖上智不能無人心以人不能無情欲之私也雖下愚不能無道心以人無不稟此性命之正也然情欲之動易危而不安性命之發易微而難著危者愈危則微者愈微而天理之公卒不能勝人欲之私矣誠能精以致其明而察夫情與性之間而不雜一以致其誠以守夫性情之正而不離則危者安微者著道心之正足以宰制夫人心人心之發無不聽命于道心情之發皆性之正人心之動皆道心之純是所謂性其情者也雖不規規然求以執守夫中而動靜云為之間自無過不及之差中道不期其合而自無不合矣聖人之所以為聖自安然而行之而合于中焉其曰允執云者蓋聖人不自聖之盛心雖無待于執實自謙而謂之執云耳堯以是傳之舜惟曰允執其中而有餘舜以是傳之禹非加以微危精一則不足得非舜之聖不異于堯故堯之授舜惟止于一言禹入聖域而未優故舜之授禹不容不益之以三言歟此非道心之外他有所謂中也自心之發于此理者而言則謂之道心自道心之形于事為而無過不及者言之則曰中無二致也惟心之發有情與性之分是以必貴于精一之功能性其情而無過不及之差蓋無非精一之驗其執中也豈如復焉執焉之賢拘拘持守而謂之執哉歷觀前聖之書繫乎道統之傳者莫要乎三聖授受之言而吻合乎斯言者有子思之中庸焉喜怒哀樂即人心也率性謂道即道心也明善非惟精乎誠身非惟一乎君子時中又何異于執中乎中之一言不特三聖傳心之要道百世相傳實不外此中道焉允執厥中書以此始咸中有慶書以此終吁旨哉問經史所載皆時務也讀虞書則知堯舜之務讀夏商周之書則知禹湯文武周公之務讀史亦然至于史則時與務靡然俱下何歟無乃知為務以救時而不知稽經以為務歟欽惟皇上神聖冠倫嗣大歷服祗若祖訓以科舉取士豈徒務以經術變前代設科之陋而已蓋務得真儒而用使風移俗易臻至治也混一以來垂四十年草創因循至于今日官冗吏汚民嚚俗敝有矣欲致隆平當去太甚然則官冗不可不汰也當如漢光武吏職減損十置其一歟吏汚不可不懲也當如隋文帝使人遺以錢帛受者加罪歟民嚚而爭訐相尚當如趙廣漢者鈎距求情痛繩以法歟俗敝而奢侈無節但令如賈誼者太息于庶人帝服倡優后飾歟自古一法立一弊生弊生則又為之法于是法如牛毛弊如蜂午時與務靡然俱下由此故也然則使人何以無幸爵之心而不壅銓曺何以使吏消黷貨之念而不干邦憲何以使民知遜悌何以使俗知禮節古之治天下者經具焉而何務為之本知經之要明務之本逢今之時平天下猶運之掌上耳魏徴論五帝三王不易民而化封德彛非之曰魏徴書生豈識時務彼不知教化乃時務也魏徴言焉太宗納焉是以有貞觀之治嘗聞取法于上僅得其中使皇元之治止如貞觀而不進于唐虞三代之隆果有真儒出焉將其心愧恥矣諸君欽聽明詔以來念此至熟也其稽經以對副聖天子側席真儒之意對恭惟皇上聰明天生緝熙聖學行聖祖神宗欲行未行之事肇新科舉一是以經學訓多士執事先生欽若明詔發䇿鄉闈析經與史時與務而以官吏民俗四事貫穿經史責真儒之用焉大哉問也愚竊謂經所以載道而道非有體無用之道也道之體必達于事之用史所以載事而事非有用無體之事也事之用必當本于道之體惟道能制乎時而今可返之古徒事則制于時惟見古寖降于今清官冗滌吏汚化民嚚移俗敝皆事也即所謂時務也惟以道之實行之則事無非實事有唐虞三代之得而無由漢迄隋之失矣讀虞夏商周之書則知堯舜禹湯文武之道知堯舜禹湯文武之道則知堯舜禹湯文武之務由今考之唐虞官百夏商倍周三百六十允釐董正皆責以實也官奚由冗九德及于簡廉三風列夫殉貨諭遷戒其貝玉皆訓以實也吏奚由汚嚚訟雖胤子猶非之頑嚚不友之凶必罪焉皆警以實也民何患其嚚禹之克儉文之卑服商俗之服美矜夸至于風移皆化以實也俗何患其敝唐虞三代聖人皆以道之實時務之中教化與焉有體有用稽之經者然也兹其為帝王之時乎自漢以下具見于史所載時務而已矣事多不本于道是天下有無體之用也徒知為務以救時而時卒不可救漢光武併省州縣減損吏員無可議者隋文患吏之汚使人遺以金帛而陷之罪自為欺而責人以廉豈為君之道趙廣漢為缿筒事鉤距發姦擲伏一時若可快終非循吏所為漢文帝恭儉朴素為天下先而庶人帝服倡優后飾尚有如賈生所云執事枚舉四事謂官冗不可不汰吏汚不可不懲民嚚當去其訐俗敝當戢其奢是皆以事言之而未及道之本也一法立一弊生一弊生而一法又立豈非徒知時務而不知教化者為之乎時務事也教化道也不徒時務之末必本之以教化之道于平天下乎何有土廣則民稠民稠則事夥事夥則官不得不冗僥幸者爭奔兢焉愈冗矣豈不可擇其可汰者而汰之而嚴銓選之法歟然此猶事也必欲革其幸爵之心非得教化之道則不可徒知吏之道當重祿以養其廉而制官刑以警其貪或紏之者自犯之是漢人所謂姦法與盜法也必痛革此則汚吏庶可懲然此猶事也必欲化其黷貨之心非得教化之道則不可珥筆當禁譁訐當懲今禁權豪亦嚴矣然或上下相蒙而嚚訐未可變毋乃徒為其事而未修教化之道以生其遜悌之心歟服色之僭當限奢靡之習當更如銷金珠翠嘗禁矣猶視為具文而僭奢未遽變毋乃徒為其事而未崇教化之道以使其自知有禮節之心歟事必本于道道必本于心惟在于正心以正人心而已今國家薄海內外悉主悉臣唐虞以來之天下未是有也得其道以平天下真猶運之掌耳治天下具于經而何經為之要其大學一書乎經言平天下務具焉而何務為之本其潔矩乎朱子之論潔矩有云所操者約而所及者廣此平天下之要道也潔矩之大者務在與民同好惡而不専其利耳與人同好惡者用人之事也不專其利者用財之事也今輔相大臣皆臯夔周召其人參錯天下為邦伯皆龔黃召杜其人民之所好好之民之所惡惡之用人允合平天下章之旨矣生財之道前世未及藏富于民而不徒藏富于國得無尚有可思者乎潔矩者平天下之要道正心者又潔矩之要道透格物致知之夢覺關而理無不明透誠意正心之善惡關而心無不正心之正即心之可以為矩者也正一心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方正四方而天下平矣官之冗吏之汚民之嚚俗之敝一丕變之易易耳魏徴以行仁義勸唐太宗而以當今為鬼為蜮者非封德彛是矣使徴能以大學平天下之要道進其君則貞觀之治豈止如今之所觀而已不屑為貞觀而躋世于唐虞夏商周愚不無望于今之致君者謹對大學之道全章大學全章之經詳分之其節有七略分之其節有二前列三者之綱本末終始之説所以結之也後列八者之目本末厚薄之説又所以結之也明明德者大學之體新民者大學之用止至善者明德新民之凖則自知止以至能得所以言止至善之次第也格物致知誠意正心修身者明明德之條目齊家治國平天下者新民之條目物格知至則知所止誠意而下則得所止之序也凡此皆先儒之所己言亦學者之所通知辭不待贅矣愚嘗摘二本末之辭而味之物有本末之云以明德新民而分本末也本亂末治之云以身與家國天下而分本末也以明德新民分本末則明德為本而新民為末矣以身與家國天下分本末則格物致知誠意正心修身者為本而齊家治國平天下為末矣本者體之謂末者用之謂由本而末其體立而後用行之謂乎于三者之綱而論其體用必當極其所止以為歸宿之地于八者之目而論其體用必當知其所始以為從入之塗何謂極其所止以為歸宿之地止于至善是也何謂知其所始以為從入之塗格物致知誠意是也明明德者明己之明德新民之體也新民者明民之明德明明德之用也然明明德新民皆當止于至善之地以為歸宿之凖則然後有以盡天理之公而無一毫人欲之私使明德新民而不止於至善則所以修已治人者終茍道也故必知其所止而漸進以求得其所止則明德新民之體用始無遺憾矣于三者之綱而論其體用必當極其所止以為歸宿之地此之謂也格物致知誠意正心以修其身明明德之事也大學之體所以立也齊家治國平天下新民之事也大學之用所以行也身茍修矣齊家以下舉而措之而已然身則未易修也修身之事有二關致知為夢覺關誠意為善惡關能格物以致知則為覺否則夢能誠意而意誠則為善否則惡透過此二關則知至而知以明意誠而行以逹由是而進進不止心以是而正身以是而修則體立矣家以是而齊國以是而治天下以是而平則用行矣其孰禦焉于八者之目而論其體用必當知其所始以為從入之塗此之謂也抑又嘗有味于明明德于天下者之辭以為篇首之言明明德與新民為對則大學之體用猶二此言明明德于天下而新民在其中則大學之體用非二矣明明德于天下其貫大學之體用而一之者歟故大學一章之經十章之傳之綱領也篇首三言八者條目之綱領也要而言之則明德一言又三言之綱領而亦大學一書之綱領也博學而詳説之將以反説約也讀大學者其思之天命之謂三句此為中庸首章第一節雖有命性道教之分一以貫之仁義禮智之理而已天以是理賦于人謂之命人受是理于心謂之性循是理而行之于身謂之道品節是理以善天下謂之教天能與人以是性而不能使人皆全其性是故不可無聖人之教也天與人以性而人不能皆全其性何也以氣質之稟有不齊也人皆以此章所云為天地之性殊不知已兼氣質言之矣天以隂陽五行化生人物氣以成形而理因賦焉所謂命也理何理也即太極之理流行而為元亨利貞者是也元亨利貞天道之常仁義禮智人性之綱天人非二理也人未受而為性則惟可以元亨利貞言而未有仁義禮智之名耳得天命之元在人性為仁得天命之亨在人性為禮得天命之利與貞在人性為義與智天所賦之命即為人所受之性此所謂天命之謂性也率循也循其性之自然而行之於身即道也循其仁之性則自父子之親以至仁民愛物仁之道也循其義之性則自君臣之分以至于敬長尊賢義之道也循其禮與智之性則恭敬辭讓之節文是非邪正之分别禮與智之道也率非用力之謂順其所受之性而行其所當行者耳此所謂率性之謂道也使人皆全其天命之性而共由其率性之道則何待于教哉惟夫性道雖同而氣質有異太極動靜而為隂陽隂陽變合而為五行而人生焉太極之理已不能離乎二五之氣之中人稟太極之理以成性稟二五之氣以成形天地之性其能離乎氣質之中乎氣清質粹之極者為聖人故性焉安焉而氣質不能拘焉自聖人以降則氣有清濁質有粹駁隨其分數之多寡而智愚賢不肖于是乎分賢智之于道不免于過愚不肖之于道不免于不及過不及皆差也其不能全天命之性一也斯人也何可無聖人之教哉聖人之道亦非外立一道以為教也不過因人所率循之道而品節之以為教使過不及者有以取中焉耳辨親疏之殺而使各盡其情則仁之教立矣别貴賤之等而使各盡其分則義之教行矣為之制度文為使之守而不失則禮之教得為之開導禁止使之有别而不差則智之教明矣品節仁義禮智之道以為仁義禮智之教使不能知其性之所有而全之者今皆不拘于氣質不蔽于私欲而無過不及之差以復全其仁義禮智之性焉此所謂修道之謂教也常人之性不免拘于氣質清濁粹駁之雜故不能全其所受于天者而有待于教聖人之性超然于氣質極清極粹之表故其功能有助于天而為天下以立教有降命之天不可無立教之聖人也如此夫噫此子思子之言也亦嘗知其所自來乎六經言性自湯誥始子思之言性實自湯誥出惟皇上帝降衷于下民以天賦之命言也于下民之三字已略見人所受之意矣若有恆性以人受之性言也若之一字已略見率性之意矣克綏厥猷惟后猷即率性之道而后之克綏厥猷即修道之教也謂子思之言不自成湯來可乎下文所謂大本之中性也達道之和道也自誠明謂之性性焉之聖無待于教而為人立教者也自明誠謂之教復焉之賢已不能無待于教而况愚不肖乎篇首之天命始乎言天篇末之上天之載終乎言天夫然後知道之大原出于天深矣乎好名之人一節觀人之法當於名實誠偽之間辨之慕其名而為之者偽耳非實焉而誠也故或矯情于其大而不覺露真情于其小知此則可與講孟子此章矣夫讓千乘之國惟聖賢能之然好名之人亦有能之者矣聖賢所以真能者誠也實也故徹表裏貫小大一于誠實而已其安然而讓千乘之國者也如此克勤其小物而不忽于其小也亦如此好名之人能之非出于誠實也徒出于一時之釣名干譽而勉強為之耳非本能輕富貴之人也乃偽也惟其偽也故于大處雖勉強而于小處不覺發露是以千乘之大國能矯情修飾以讓之而于一簞食豆羮之小不覺其情發露而較之其心蓋以為千乘之國辭受之間萬目瞪之不止十目所視而已近可以盜名于一時遠可以眩名于千載故為之然名也非實也勉也非安也表也非裏也簞食豆羮得失之際則微矣必謂人何暇注目于斯焉所以不覺鄙吝之真情實態乃發露于忽易不虞之地也蓋好名之偽不及偽為于此焉之表而鄙吝之誠于中者反露焉忽之故也是以聖賢觀人之法不于其所勉而于其所忽然後見其所安之實也蘇氏嘗曰人能碎千金之璧而不能不失聲於破釜正此意也或曰是則然矣聖賢之真能讓國者其于食羮之小之類亦克勤不忽焉有可證乎曰有堯舜泰伯能讓天下尚矣不待言矣真能以國讓者其􅆥齊季札乎􅆥齊讓孤竹季札讓吳皆誠也非名也故􅆥齊則聞加富二等就官一列之盟相視而嘻笑之卒能食薇而餓焉季札則一劔之微心許徐君卒挂于其墓至于舍室而耕以食焉大者固純全于小得失亦何嘗漏綻乎是蓋徹表裏貫小大一于誠實者也其與好名之人偽于表而非誠于裏勉于大而不覺露于小者所以不可同年而語也或又曰人之度量相去甚遠有斗筲之量有江海之量好名之人能以國讓此江海之量者如鄧彪劉愷以國讓弟使弟受非服而已厚其名者近之茍非其人則簞食豆羮見于色此斗筲之量者如羊斟之羊羮不與而敗華元劉殷之鵝炙不得而怨庾悅者近之蓋謂兩等人也奚必以是論哉曰斯意也廣漢張氏之説也然較之集注之説則味不同矣且朱子答問嘗有曰茍非其人其人指其能讓國者非指好名之人也其説章章明矣講學者其能深繹之否乎子貢問為仁一章一鄉之善士一章人之大倫有五朋友居其一友也者所以輔仁所以責善者也師弟子云者其名雖不列于大倫然朋友之尊者為師其幼者為弟子皆朋友之屬也孔門之教莫大于求仁孟氏之教莫大乎性善子貢問為仁而孔子以友士之仁答之孟子言性善而今以友士言之蓋以友所以輔仁所以責善欲資之以輔我之仁責我以善則不容不友其仁者不友其善者也然取友之道安有限量哉勢有貴賤道無貴賤時有古今道無古今孔子言友其士之仁者而必先之曰事其大夫之賢者豈非欲人之取友不當拘于勢之貴賤歟孟子言友天下之善士而必繼之曰又尚論古之人豈非欲人之取友不當限于時之古今歟孔子答問仁者多矣若克己若敬恕若先難後獲或直指全體或明示切要獨于此以事賢友仁言何也程子曰此為仁之資也藝成而下者之工欲善其事猶必先利其器豈有道成而上之君子欲為仁而可獨學無友不廣其為仁之資乎十室之邑必有忠信豈有居是邦也而無大夫之賢士之仁者乎賢以事仁以德言非大夫賢而未仁士仁而不賢也大夫已仕而其仁已著于事業士未仕而其賢方藴于德性故曰仁子謂子賤君子哉若人然必謂魯多君子故子賤得資取之而為君子今以君子而居是邦也安有不友士之仁而能資之以輔我之仁者然使拘于友士之仁而不知事其大夫之賢則取友之道狹矣事之為言師之之謂也比之于友則有尊嚴敬事之意又加一等矣大夫之于我勢雖不同道無不同士之仁者固我為仁之資也大夫之賢亦我為仁之資也大夫之一言一行一政一教其德可師其行可法我能尊而事之資而取之則于士之仁者有相觀而善之益于大夫之賢者有下觀而化之工而為仁之助𢎞矣此孔子答子貢問仁之大意也孟子道性善朱子嘗謂學者能體會孟子之意則七篇之中無非性善之理誠哉是言孟子此章雖主取友言之然善之一言諄諄凡數言無非性善之意也人性本無不善也今曰一鄉之善士則以善蓋一鄉言一國天下之善士則以善蓋一國天下言以人性之皆善而此有蓋一鄉一國與天下之善豈其性獨與人異乎哉均此賦豫之善者雖人性之所同能不失于賦豫之善而充極之者則善士之所獨此所以有善士之名也然善士之善雖蓋乎一鄉一國與天下也善士之心則未嘗自謂其善之足以蓋一鄉一國與天下也善士之善雖充其極善士之心則無紀極是以貴于取友也一鄉之善士曷嘗謂其善蓋一鄉而不友一鄉之善士哉一國與天下之善士曷嘗謂其善蓋一國與天下而不友一國天下之善士哉一鄉之善士而能好善不已資責善之益而不己則進進而為一國之善士矣一國之善士而能好善不已資責善之益而不已則進進而為天下之善士矣能為天下之善士非自爾也以其能友一鄉一國與天下之善士故能兼一鄉一國與天下之善而為我之善也士而能為天下之善士性雖充其極矣而其心則安所極哉使止于友天下之善士而不尚論古之人則取友之道猶未免于狹也古之人于我時雖不同道無不同以友天下之善士為未足又尚論古之人古之人不可得見矣然古之人之德行事業言辭則載于書詠于詩未嘗不可于今之世而見古之人也人之好尚各以類合或曠百世而一心或同堂席而異意何也有心中之善而後能取古人之善有方寸之古人而後能知方册之古人我能為天下之善士矣豈有誦詩讀書而不知古人之為人者乎是以必論其當時行事之迹也行事之迹也者考其托之行事與詩書之載諸空言者合也是尚進而取友也上進而取友者不徒取今人之善必等而上之而取古人之善也善無終窮取友以為我之善者亙今古而無窮至于此豈獨為一世之善士而已乎此孟子論友一章之大意也定宇集卷十三
