  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0481_WYG_008-1a, image: WYG1205/WYG1205-0271a.png}
body:
  text: 定宇集卷八元陳櫟撰隨録共三十三則學者規模貴大工夫貴宻規模不大而工夫徒宻則狹隘而無以受道之廣大工夫不宻而規模徒大則踈畧而無以造道之精㣲譬如一片屋間架大矣而無門無壁是何等屋裏面雖繪飾極好而間架卑陋又何足取學者少年不要十分英發如王弼注易固自不是然亦不易僅二十四嵗而死晉時人只一句說得好便見稱於世其清虛無實也如此陳安卿當為朱門第一人㸔道理不差其文字純正明暢黄直卿李方子多有差處方虛谷自稱子方子此習于世俗而不考古人之過也取何休公羊傳注一㸔則不敢下矣為趙某作翠侍題詠序稱其人為子趙子他亦何敢當朱文公只稱子周子子張子子程子别稱何人江事天頗有見識但平生有一件不是見土木偶直溺之程子謂凡有人形者皆當敬之豈可如此能不信他便好了闕𢎞齋每歸休寜其族人爭相㽞欵公曰喫無錢之酒食害有益之光隂遂亟去學朱子之學而精到似程勿齋者甚少此公才質鈍只是勤其文字頗絮煩學問精到絮煩得好范稱發名起居休寜自號尺山老人著井觀雜說多不足取姑摘其中二條於此曰古者有兩子我太史公曰宰我為臨菑大夫與田常作亂以夷其族孔子恥之孔子家語同辭家語後史記出想孔猛作家語王肅註家語為司馬遷所誤耳按左氏傳哀公十四年闞止子我事齊簡公與陳恒爭寵属徒攻公宮不勝被殺夫宰予在聖門雖累遭訶斥然而言語居四科之次與子貢並稱必不至弄兵君側以速大禍况子路及難夫子且哭問拜弔至於覆醢齊之亂夫子請討魯論與左氏僃載顚末今子我身戕族夷禍踰子路而無一言及之豈聖人師生之情獨藐於子我哉假使不悲其死亦當有以責其死矣然則王肅受誤於孔猛孔猛受誤於太史公而太史公受誤於子我之名歟班固以文直事核史遷贊博物洽聞劉向贊許之在愚其敢輕訾然尚論古之人者不知其人可乎栁子厚漁翁詩漁翁夜傍西岩宿曉汲清湘然楚竹烟消日出不見人欵乃一聲山水緑南城童宗說音註欵音襖乃音靄新安張敦頤音辯亦無異說今按玉篇類篇廣韻集韻欵從矣從欠倚亥反相應聲也乃曩亥反此字之本旨語辭也皆無襖靄音者文簡程公演繁露謂舟人於歌聲之外别出一聲以互相其所歌今徽嚴間舟行猶聞其如此若然則倚亥曩亥二反正似舟人相歌之聲又何必於篇韻外特創二音而後為得耶方虗谷文云學者臨川而四明文也永康而東嘉臨川撫州郡望陸象山撫州又象山之門人慈湖楊簡敬仲四明人四明明州慶元府也陳亮同甫門人然亦與之游從同甫之墓水心銘之有云我覺子覺詆濂喝洛黄直卿李敬子之守可移乎象山之學實流為禪專以覺悟訓學者以我之覺期子之覺而詆斥濂溪周子伊洛程子之學有禪家呵佛罵祖意黄榦字直卿李公謹字敬子皆朱子門人上足能守朱子之學而不為象山所移者也其餘同門亦問有為所移者矣水心自建康帥閫病歸不復出大肆力於碑銘記文四方甚重之陳筠牕名耆卿字壽老吴荆溪名子良字明輔二人皆宗水心為文雖奔走其後而追之終莫能繼此見乾淳間有此様學問文章皆不以正理為主者也所謂穉變而來老化而去天地間萬形皆自無而變為有自有而化為無物之稚者自無變有而來物之老者自有化無而去來生也至而伸也去死也返而歸也此八字括盡人物死生之理程泰之禹貢圖不愜人意不能使人一見了然其所指山水地名徒添出後來者愈使惑亂可無此圖夷堅志乃容齋洪景盧邁又號野處諡文敏公借以演史筆虗誕荒幻明明如此今謂莊列為虗誕荒幻而廢之可乎此二字出列子夷堅聞而志之一句謂未嘗見其事而記之耳夷堅即左傳中所謂庭堅即臯陶也凡三十二志趙與時賓退録述其序意甚詳說夷堅二字亦明今坊中所刋廑四五卷後靣多有益於人不盡荒誕惜無本子𢎞齋文字中屡用軼字嘗靣問之云滿字之意問所從來云見人用之却不言何人按左傳彼徒我車懼其侵軼我也乃車相踰過之意未見滿字之訓既未知所本不如勿用愚按軼字亦疊轍三音荘子奔軼絶塵揚子河東賦軼五帝之遐邇王褒有軼才東坡始皇扶蘓論鞅自以為軼堯舜而駕湯武洪光弼晧中和堂記今天子紹開中興逺軼孝宣皆超過之義所謂土然而居恐只是塊然而處之意風然而休恐只是韓文其去也風休之意乃是以死字實字作活字虗字用之然大竒矣不可為法劉辰翁字㑹孟號須溪江古心之愛友文字有好議論惜無全篇純雅者其學不自朱子來是其天資高後來漸漸迂僻如註杜詩多說得迂晦教人費力解說可笑其人好怪父喪七年不除以此釣名楊誠齋亦間氣所生何可輕議其詩文有無限好語亦有不愜人意處文過竒帯輕剽處盖自荘子來程文簡公易老通言光宗喜老子此書投合光宗其強合處節去其單解老子處自好文所以明理必明理然後能作文必講學然後能明理講學當於何下手不出乎讀六經四書而已六經非大儒不能盡通初學且先通一經四書亦當讀之有次序文公定法先大學次語次孟末及中庸今皆當按此用功精熟以㸔四書窮一經然後讀官様典雅程文以則倣之又求之古文以助其文氣曉其文法雖大儒教人亦不過如此而已論孟集註只在熟讀精思貫穿透徹而已先且要記得一部四書在我胷中不靠印本提一段首句便衝口念得下面細字然後却問自得之妙所謂自得之妙在各人自得言不盡意難以語人也黄山谷云由杜子美以來四百餘年斯文委地文章之士隨世所能傑出儕軰未有升子美之堂者况室家之好耶予嘗欲隨欣然意㑹處箋以数語終以汨沒世俗初不暇給雖然子美詩妙處乃在無意於文夫無意而意已至非廣之以國風雅頌深之以離騷九歌安能咀嚼其意味闖入其門耶故使後軰自求之則得之深矣彼喜穿鑿者弃其大㫖取其發興於所過林泉人物草木魚蟲以為物物皆有所托如世間商度隠語者則子美之詩委地矣程斗山雪詩云良謀雖已禽元濟勝賞無如得李貍誠齋雖嘗借李貍言牛尾貍然恐不可只作如此用之又古詩云欲騎揚州鶴不食武昌魚揚州猶可上武昌不可居對巧意未粹吾甥仲文詩云雨添新水半篙緑風减殘花㡬片紅工而妥梅花詩云淡勻姑射仙人貌清奪林逋處士魂奪字未妥當改作返嘗讀胡餘學作壽慶樓記云文字頗絮然却自好大凡作文字如装􅃧然先且說一片冷語又時時說一段可笑之話使人笑末說一段大可笑者使人笑不休又曰此記出𢎞齋後只将仁者壽積善餘慶兩句來反覆議論竟無一字相犯難得張益州畫像記謂公暨暨公來于于暨暨武毅貌軍旅容也玉藻篇戎容暨暨老泉用暨暨字本玉藻文定宇集卷八
