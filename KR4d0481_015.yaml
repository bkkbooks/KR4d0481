body:
  text: 定宇集卷十五元陳櫟撰陳氏譜略陳氏本始記曰武王克商封舜之後於陳則陳虞帝之後也始封之君曰胡公滿自是以國為氏魯莊公二十二年陳公子完奔齊子孫為齊卿因得其政其初卜辭曰有媯之後將育于姜筮辭曰此其代陳有國乎不在此其在異國必姜姓也春秋之末陳為楚所并而姜姓之齊果為陳所代陳成子之曽孫曰大公和遂改姓田氏則仍陳姓而不改者其在陳國之子孫乎前代姓陳人自古姓陳人按史記前漢書有陳杞完涉餘平萬年咸湯遵後漢書有陳俊元寵忠禪龜實紀蕃重三國志有陳登羣矯震武晉書有陳騫輿頵夀儒林傳陳邵南史有陳武帝霸先慶之昕暄北史有陳建子康茂稜儒林傳陳竒隋書有陳孝意唐書有陳叔逹子昂元禮諫􅆥行君賓京希烈少游宋朝有希􅆥先生陳摶江州義門陳旭藴古聚居二百年家二千石陳堯叟堯咨堯佐前乎此而雜見他書與後乎此者不可勝紀今姑略之類出潁川汝南下邳廣陵東海河南六望世之拘譜其族往往强附于前代聞人以侈大之世代悠逺實不可詳今不取所以述諸史陳姓人者欲兒輩知前代吾姓有如許人耳吾家藤溪之始祖自桐廬而遷新安二郡皆揚州之所統則吾宗望出廣陵意其或然云始祖鬲山府君始祖鬲山府君諱禧唐僖宗時避廣明之亂自桐廬郡泝流而上至新安郡休寧之西曰藤溪里愛其溪山之清竒因家焉其後子孫益蕃一村無二姓故人稱是村曰陳村府君之始遷也泛宅浮家託于漁釣積德敦義鄉稱善人沒葬於縣之南地曰鬲山歲益久一方之民神之乃創廟墓傍尸而祝之凡水旱必禱焉東作不祀府君不敢興西成不祀府君不敢食子孫之祀之有不如鬲山之民之祀者視桐鄉之于朱邑庶幾焉且諸鄉大姓之祖有廟食者矣程忠壯公是也有墓祭者矣孫王墓是也彼其生也或貴為大將或南面稱孤沒而為神固其所宜也若府君生無位于時託為烟波之釣叟沒乃神于後永為樹藝之田祖其亦靈異也己民報事兮無怠其始自今兮欽于世世鬲山成塵溪水絶府君之祠始應歇耳傳曰盛德必百世祀虞之世數未也府君為虞之子孫其亦䝉盛德之餘澤而百世祀者與本房先世事略先髙祖之祖諱天寵字德承行第三娶金氏公勤儉慈愛該博練逹田疇甲一鄉紹興二十三年徽行經界公為一鄉首今簿書契劵四至列公名者無數發廪遇雨必糶榖之乾者凡可及人唯力是視婺源王公炎之初年客公孰創一簿題曰待問王公遇書有不通事有可疑悉條列之候伺公出而問焉按社籍紹興二十六年丙子陳福政為社師記其年八十八公為社宿年必亞之三十二年壬午公始卒相傳謂公年七十餘信矣髙祖之父諱嘉謨字少臯行第六娶同邑渭橋吳氏公以錫類恩授迪功郎能世其學某嘗見翁一帖答新淦宰字呼之曰信臣其字畫遒徑詞語典古曽祖以下之字皆不及焉髙祖諱有章字朝美行第三娶渭橋吳氏中年納後房王氏杭人生先曽祖公好善而文世濟其美其生也祖視之曰保家之主也遺文可見者僅祝文一篇今見社籍中卒于淳熙五年戊戌十有一月七日髙祖妣卒於紹熙四年癸丑九月二十有七日王氏卒於紹熙五年甲寅六月二十有一日前是族譜未用老泉蘇公條例故髙祖以上享年幾某日卒俱不備知可知者曽祖以下而已曾祖諱伯同字同叔行第六五娶渭橋吳氏公天性樂易於生業不屑為祖居叔氏居之曽祖妣出所藏當三錢創屋三重别居時里之惡少曰橫八包者盜人之牛將屠之公執里役陳之邑給榜戢其姦惡少恨焉持屠刀欲害公一忠僕曰陳簡奮身衛公斃惡少於一杖下卒全此僕罪僅編管公嘗語人吾遭此橫逆巾未嘗去首也先業為始破自是家漸落屋亦他售數世之業墜焉然公詩酒自娛不為芥蒂善歌詞且善填之先考嘗以公詠火種古詩教櫟于髫齡時今猶記一詠曰一㸃若星眇傳薪遍寰海味斯言似若借以自喻且有望于後之人者嗜藏書分析遷徙散亡殆盡今猶有存焉生于紹興二十二年壬午卒於淳祐元年辛丑二月二日享年八十曽祖妣生於紹興二十五年乙亥卒于嘉定十七年甲申十有一月二十有三日享年七十先祖諱慶大字士俊行第六八娶渭橋吳氏以姪女從姑自祖妣以上三世則然矣三子長先考次先叔諱履正字德之次諱晉出繼歙潘氏先祖遭家中否將變通於既窮售祖妣奩珥以買田以贏子錢鄉人朱氏子貸以乘桴桴漂人逝錢以烏有近族居鄉南五城當孔道欲依以開肆紹定元年戊子祖妣又倒奩珥之餘相先祖遷焉力可買屋且嘗有贏錢貸人買屋而已終僦屋以居開肆如韓伯休售藥以謀什一曾祖晚年始就飬故曾祖先祖祖妣皆殁於五城慕返葬於周之義皆葬於陳村從先志也祖妣慈惠敏明自幼知書孝經語孟皆誦甚熟且能記歌行雅詞櫟之幼也未嘗學前祖妣已口授之孝經語孟矣故櫟五嵗已能背誦論語及歌行古文實祖妣之訓也先祖生于淳熙九年壬寅卒于寶祐四年丙辰十有一月四日享年七十有五祖妣生于淳熙十年癸卯卒于咸淳二年丙寅九月十有九日享年八十有四先考諱履長字復之晚年更諱源長從學者號之曰復齊行第五十娶同邑旌城汪氏先産二男二女皆不育暨生櫟先考年四十有二矣二女適吳惟深葉應宗先考之幼也遭家否極篤志勤學年十七從諸叔游淮因假館焉歸則先祖遷矣家益落故終身假館凡六十年從游二百餘人父子兩世從之比比櫟年七嵗先考則挾以自隨教之靡不至年十五已為饑所驅束父書以出年十六始請舉子課於黃常甫先生固賴先生㸃化之而父子自師友實為之本也先考少習書外家諸舅有春秋學因改習春秋熟于春秋三傳於左氏尤熟櫟每問事不休應口輒答某公某年也櫟年未三十時嘗倣柳子非國語體作一書是非左氏傳以首數條質之先考先考謂曰汝未洞究春秋三傳國語未可為此歐陽公曰著述須待老積勤宜少時汝其戒之櫟聞言汗流亟秉􅂌炎火至今不敢為凡先考所以成其子者類如此平生待人平直略無城府鄉稱善人先外祖汪公諱輝有學有文先母舅諱定老資俊甚弱冠工舉子業今其遺墨尚存不幸早世先考哭之極哀嵗癸丑外祖殁其將殁也先考往省之告之曰公不幸無孫今幸有外孫某當世公家祀詔外孫無忘公其勿以餒而為戚外祖頷之故先考世必修外祀櫟奉治命惟謹不以菲廢禮焉先考事親孝養祖妣也力不逮心諄諄以缺甘㫖為愧祖妣開譬婉而真誠所謂啜菽飲水盡其歡者歲丙寅祖妣殁己巳謀葬事是年先叔以力不能辦欲緩之先考曰葬親何事也吾當力撙節以辦此自買舟以往一切以為已任毫髮不以諉先叔卒襄事平生好傳藥方有疾或以問必以已驗者教之不少靳多以取效既殁鄉人感小疾者多追思之凡此皆一節一行之可紀者先是嵗乙亥孔道軍旅擾擾先考始挈家自五城歸祖里距先祖之遷五十有八年天道六十年必復意者其有數乎始歸無所於居得屋不容膝然先考安焉素耐勤苦年髙矣視不昏編寫無虛日卒之前數日燈下尚蠅頭細書卒之前一日尚自作客問時櫟館中澤見家問知先考小風寒亟走歸省歸至先考已不能言矣實至元二十四年丁亥二月二十九日申時也先考生於嘉定四年辛未十一月冬至日丑時享年七十有七先妣蚤多疾灼艾黃逾千壯晚彌閒健慈愛平直始終以之生於嘉定十三年庚辰五月十一日申時殁於至元二十一年甲午二月二十八日巳時享年七十有五凡吾先世之事大略如此嗟乎自始祖府君十有八世而至櫟他房有以儒學顯者而本房獨無有然洪範五福貴不與焉數世以來夀皆八九十無下七十者祖與妣偕老無再娶者父子皆親傳無祝螟者皆稱善人無一為人所指者良可表於道曰處士陳君之墓有儒學而不顯安足計哉又自曽祖以上世潤其屋降是窶殊甚然家雖空而行頗實口雖羮藜飯糗之不給而經炊史酌之味無窮貧亦安足計哉所大懼者氣薄蚤衰兒輩才下志怠或隤其家聲焉耳記曰其先祖無美而稱之是誣也有善而弗知不明也知而弗傳不仁也此三者君子之所恥也謹因續編族譜而略述祖考遺事以示兒輩使知豫家數世儒學之相繼庶幾其能善繼云吾家四世以來得古意者又有一節先曾祖平生不好佛故治命命先祖曰如我死喪葬其略參用古今禮謹毋作佛事先考先叔所以喪先祖祖妣不肖所以喪考妣皆不敢變焉大抵此說儒者知之者多而能行之者寡不搖於俗論則奪於婦人先考之殁也來弔者見勉曰縱不齊佛亦必聲鐘應之曰升屋而號告曰臯某復此儒家之聲鐘也欲聲佛家之無常鐘也何為又有曰縱不為佛事亦必填受生又應之曰民受天地之中以生夙興夜寐無忝爾所生此儒家之填受生也以紙寓錢填受生也何為此不肖所以不搖於俗論者也吳氏女兄明敏知書習聞家法固無異論吾婦朱其父兄信佛甚亦化之無異論焉此不肖所以不奪於婦人者也昔程子曰吾家治喪不用浮屠洛中亦有一二人家化之近年同邑求邇范公歙邑古梅吳公之家皆然然程子大賢范吳冨者人無敢非之吾家三世不幸皆貧流俗不過曰是貧甚不能為故立異耳嗟乎安得家肥屋潤更酌古禮行之以一洗流俗之言哉又嘗聞士友之言曰平昔非不知佛事不足為古禮所當用一旦不幸至于大故則族姻交以不孝責我雖欲不為不可得已嗟乎佛入中原祭禮荒胡僧奏樂孤子忙後村劉公嘆之久矣孝也者其作佛事之謂與流俗之所謂不孝也乃我之所謂孝也流俗之所謂孝也乃我之所謂不孝也兒輩聽之不守家法非吾子孫吾豈惟望爾之不敢變哉將世世望子孫無變也櫟謹書福州通判公諱慶勉字志問應城尉親兄之子也以詩經應甲子鄉舉紹定五年壬辰徐元杰榜第三甲出身調廬州舒城縣尉監浦東鹽場韶州推官鄂州蒲圻縣丞福州簽判兼西外宗寺簿湖南轉運司主管文字武岡軍通州不上換福州通判未上卒纍官至宣議郎生於淳熙十年癸卯卒于景定二年辛酉享年七十有九公學正文粹誠而謹畏儉而廉勤櫟猶及見之與貢元公應午兄弟自為師友貢元公遂亦以詩經中甲午鄉舉四方從學者衆亦有平林之遺風其所授於人者皆其受于兄者也公擢第年已五十及宦游深受知于信菴趙公葵于仕進淡如也以清白遺子孫六藝之學三世不墜其孫尚有聲士林云遺文不暇詳録略見于後入仕者二十二人入大學者十人請舉不中第入仕入官者七人雜識吾宗以儒學略自見者亦既書于前矣聞之方陳氏人物盛時村無二姓合族稅錢以貫計者一千三百有竒讀書者比屋各家之老遇風月良夜杯酒相叙飲罷步街上聽子弟絃誦聲自村首至尾聲東西相震以是快愜為樂事每歲秋賦終場可讀之卷幾七十以故方解額窄時連數舉無脫計偕者此外有齒有德而潛隱不耀如餘姚宰之曽祖圭年餘九十漫翁謂鄉人號之曰佛者尤多有之顧愚之生也晚未及搜訪而備録焉謹開其端存一條于此以俟同宗之君子凡先世之有一節一行一善言善事之可書以為訓者各以所聞續録之云陳村里名騰溪非也百川沸騰詩人所傷溪何取於騰哉洪野處士書為滕溪亦非按吾里有山曰藤溪嶺舊多産青藤嶺巋然溪傍溪實繞其麓故嶺曰藤坑溪曰藤溪信而有證又村名陳村實以吾姓姓是村也按是村吾宗未居之先實名洪村洪其姓者居之今田地文簿洪村二字班班可見家中舊居土人猶以洪村坎頭目之洪氏子孫後微為𨽻愚之少也猶見一家今併此一家無之矣唐末以前以姓姓其村三四百年後子孫無噍類焉吾宗中否異姓有來居者而陳氏子孫終較多陳村之名亦永不磨噫昔爽鳩氏始居齊地而後太公因之太公之子孫固不能常如小白時其視爽鳩之影響不存者大有間矣同宗有志之君子盍亦勉自樹立張吾家聲以求稱此村之名也哉雲萍小録陳櫟字夀翁小名佳老行第三住休寧縣千秋鄉之陳村生淳祐十二年壬子三月二十七日寅時曽祖諱慶大字士俊考諱源長字復之妣同縣旌城汪氏荆室同鄉回溪朱氏子男二人照字仲明己卯五月十一日未時生行第得一勳擬字仲成甲申五月二十一日寅時生行第得三先叔之子棣早世無後先嬸石氏命勳後之一女許適吳氏甥彬仲文家世居陳村先六世祖諱寵即洪野處士志尚書程母夫人墓所謂處士與之親兄也田産甲千秋一鄉三傳至曽先祖家益落至紹定戊子先祖以從弟運管一房居同鄉之五城當南五嶺孔道可開肆略謀生遷依之故櫟生于五城至乙亥歲笳鼓數驚而祖里稍僻靜先君遂自五城遷居陳村焉櫟自七嵗至十四嵗侍先君遊學年十五饑驅之僭為童子師自此竟不能舍堅苦蹉跎無從質正歲辛卯年四十矣僭和虛谷方公上南行詩偶得轉聞于判簿宏齊先生曹公聞先生頗稱嘉之櫟于先生自少景慕不啻水之江星之斗也丙申二月入泮道過長林橋因納謁拜館下先生欣然與進降屈年德如平生歡自此相奬借訓誨者甚至雖察父哲兄之我愛良不是過自丙申至庚子無歲不見無月不書愛之有加焉無替也近秋丁一再上謁其還也䝉力留之館中且云嗣歲確佚老於家嗣春未必可㑹晤可不留一惜别乎因不敢辭入夜縱談忽出一紙首題曰雲萍小録乃叙述家世及平生及賢子孫以賜教者也且令櫟亦書世家以呈櫟思之雲萍小録所以叙交好示久逺也非敵已不當書非稍有可書不敢書雖今者先生忘年而下交之先世自唐末由嚴陵遷陳村迄於今登科者一族凡六人而櫟一𣲖纍世不仕櫟也自揆晚末上交何敢僭不足乎揚雲萍之至又何敢僭然念先生謙恭之盛德出于真誠有如夫子之于人常俯而就之者既忘其尊而以是先施之櫟茍輕愛不述以報則真頑冥不靈也已因敢忘其卑而書以呈焉併以呈希仁希文二兄長其無曰是子是録多見其不知量也則幸甚幸甚大德庚子八月二十一日契家姪陳櫟百拜謹呈定宇集卷十五
