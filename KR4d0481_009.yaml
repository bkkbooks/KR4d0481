body:
  text: 定宇集卷九元陳櫟撰傳行狀墓志墓表通守陳公傳公諱慶勉字志問世家休寧之陳村曽祖嘉聞始遷五城祖仁傑父克紹皆不仕叔父唯字斯傳深春秋紹興壬子冠鄉舉乙卯再貢丙辰擢第調德安府應城尉而卒士論惜之公生于淳熙癸卯甲子年甫二十有二以詩經貢于鄉五試春官紹定五年壬辰徐公元辰榜擢丙科年已五十矣授廬州舒城尉六年癸巳四月之任端平元年甲午全子才孟珙等師入河南謂中原可􅃌日復制府諉公董餉汴京米以石計者萬有五千載以舟百自合淝部舟至京口支裝涉湖而江又泝河而淮北過徐泗南過盱眙歷濠梁扺壽春交卸之日斗升無虧駭風濤危哨騎脫萬死而得一生未幾敵決潼關水踵三家灌智瑶軍故智事有大謬不然者矣公亦匹馬南還與吏士皆飢疲采野瓜柿梨棗代食幸而得還尉於斯者前後凡幾人不自我先不自我後乃獨丁此時吁危矣哉幸公在任日常率士卒棄馬徒步捕獲強盜兩夥共二十有一人解上司正典刑勞績章章他如相視山寨數十處教之備禦有方邉民獲入堡安集凡此皆鉛槧之士所深避不敢為者非公文武才全疇克爾此豈內地行呼唱衒綵捧之尉云乎哉端平三年丙申替歸次授嘉興府華亭縣蒲東監鹽場嘉熙三年己亥十一月之任次年庚子霪雨泥濘攤曬久妨鹽課虧額遭庾臺罰俸百指嗸嗸日糴以度楮幣一緡僅得米二升有半居官謂食天祿孰料其窮至此未幾大疫且大飢亭户四百五十有竒死且逃之餘僅存百九十貧不聊生煎辦無力坐是課大虧所辦十不及二三庾臺初索公印厯寄庫繼察公廉勤無可致力無可歸咎陳于朝令公解見任别注一等合入差遣奉旨特依公遂離任别注淳祐元年辛丑十二月也不自我先不自我後飢荒疫疾公適丁之所幸庾使知公朝廷知公遂得善去不然殆哉然公之在任也先是姦民蕭元輔者以亭場三萬畝冒獻于御馬院公親詣􅁃臺條陳原委利病乞奏于朝石卿孝淳備以公言敷奏得旨以元場還亭户石公令公代撰碑頌以垂不朽焉飢疫而課虧于一時非公之過場復而課辦于悠久乃公之功公于官何負哉石公去馬公繼之奏令公善歸馬公力也公嘗上馬公書有曰淮西之餉汴海東之疫飢皆百年所無之事而某任警曹則當之任鹺局則當之豈骨相寒苦而然耶嗟乎可嘆也已仕途萬里出門即羊腸天欲飽公之智熟公之仁未必非福自是而後三四任以前之畏途視之差可以言順境矣三授韶州推官淳祐五年乙巳七月之任先是獲盜賞典屢陳未行左司徐公榜下士孤寒無援為言于朝七年丁未正月凖吏部符下奉旨轉儒林郎改次等合入官赴部注籍四月始離任方公之在任也以劄子言二事于部使者其一言寺院之弊其一言州兵之單有曰有寺院則有住持近年以來僧不以戒行任住持惟以奔競爭住持耳官因常住之多寡立為租息之定額利租息之入開告訐之門大率常住有千緡之入則租息收千緡之半今日僧請增輸則乙可攘甲之處明日訐其小過則丁可毁丙之處是官與僧同盜常住也某仕于韶如端溪英石諸州多所經歷每到寺院東倒西傾未嘗有一榻可卧一竈可炊者稽弊所由蓋常住歸于郡守之囊槖寺院壞于客僧之住持聼其壞頺誰任修理名曰祝聖而廢墜至此成危邦之陋風豈太平之盛觀為人臣子忍辱視之今冝敷奏之乞委本路監司覺察有常住持處只許衣鉢相傳不許客僧夤緣請住有戾于此上下同以贓論庶主僧不至視寺院如傳舍寺院不至終敝棄如辨髦其于祝萬年壽豈為無補言兵事有曰廣東諸郡多與章貢郴桂鄰溪洞縱橫時乎出沒相挻而起遂至震驚始畏張皇而卒至滋蔓兵不足故也昔儂智高之禍可鑒矣一二年來如韶有九峰之擾章貢有寧都之擾懲之于前則宜防之于後策將安出曰填補官兵措置民兵是也何謂填補官兵諸郡廂禁有名無實欲行招補奈招之易而飬之難姑以韶一郡言之郡計匱乏何以辦此本郡雖無生財之道而有出息之計竊見江浙郡縣全藉榷稅而獨不行于廣南民擅𣙜酤之利者日以富官非酒泛之給者日以貧倘許官自設法與江浙一體施行官酤界外不妨民酤則酒息可助招補矣又竊見廣南鄰郡官鬻鹽今本郡有寄樁省錢萬緡倘借此錢以充官鬻本柄與鄰郡一體施行而于官鬻界外不妨鈔家則鹽息可助招補矣又竊見本州有萬緡解庫嵗有出息約二千緡倘許以此出息亦充衣糧費則解息可助招補矣合此三者以資招補于民無損于兵有飬闕籍補以強壯老弱代以子弟委監司以稽原額飭郡守以嚴教閲則廂禁庶幾可革何謂措置民兵陜西義勇兩淮萬弩手皆民兵也二廣號為樂土土曠民稀所以處流民置兵籍猶有可議者試以韶一郡言之冒占户絶之田無時無訟不闢不耕之地茅葦相望凡若此者倘自朝廷行下官不許私占盡行根括籍為官田稽其畝步以處江上之流民而徙耕之所過州縣量行資給為之室廬貸以牛種復以租役家籍一強壯為半年軍春夏耕耘秋冬教閲自縣而一郡郡而一路籍田可處萬家則得萬人為兵矣今江上流民動以萬計與其使耕于沙州聚爭于不足之區孰若使耕于二廣散處于有餘之地與其使冒迭哨之危以資敵之向導孰若使為樂土之兵以備吾之緩急大率若淮之萬弩手焉以出息飬州兵以為緩急城守之備以間田飬民以為緩急調教之備二者官無飬兵之費而坐獲飬兵之利不猶愈于束手無䇿乎凡此皆言言允當鑿鑿可行茍目前以冀終更者那計及此韶守張公貴洪舉公有曰九韶俗悍訟牒繁興有積年不決者陳某畫諾之頃燭姦擲偽如見肺肝吏服其公民懷其惠今兹班赴臨發之日吏民依依不忍釋觀此及後蕭漕之舉公公無負于韶可知矣淳祐八年戊申赴班僅授鄂州蒲圻丞赴見闕十一月之任政事之暇時與趙宰侯尉為文酒之會有足樂者湖北漕蕭公逢辰舉公有曰陳某性資純恪學問老成擢第二十年安貧守道調曲江推官二廣屬郡貨寶所聚仕于彼者誰慕酌泉之操獨能載月而歸一寒自苦兹二政蒲圻率職輔令門清如水邑民歎服頗有清靜無欲之化當職得之親見初非溢美自非公之聲實相符前後一操豈易得此于漕使哉十一年辛亥五月替歸五授簽書威武軍節度判官廳公事兼西外宗正簿領十二年壬子十二月之任三山大郡也節度大府也外宗簿亦朝士也公往任簿領于斯裨贊優遊不必有赫赫之功而後見也西外宗正趙公汝佺福建提刑胡公頴知福州陳公昉交章舉公最後知福州陸公德輿舉公有曰陳某稟資朴茂蒞事恪勤佐幕兩年老成譽滿信不誣矣寶祐三年乙邜三月替歸六授行湖南轉運司主管文字四年丙辰七月之任時趙公葵家居于潭鄉老程公元鳯以書為公先容趙公首見公即有老成持重之褒自是日信重之方漕使章公青孫之赴召而去新使洪公燾之未來也有旨命公護印非朝廷知公有素豈輕寄之以此時兵興雲屯待哺招糴給運沓至嘗以減糴數中朝省且以書言之程相論度牒登仕誥難售程公復書有究心職業之稱與裁減誥數即暗減糴數也此于事理當減而求減者也繼有􅈲湖南和糴二十萬石前寶慶二郡乞蠲免公恐上江四郡紛紛援例所糴數將如何敷之别白利病曲盡其至陳于朝省五年丁巳九月省劄行下明言湖南運漕陳宣義申述詳明極可嘉尚已劄下令道永寶慶日下照數糴足札付湖南轉運司嚴督之省劄褒嘉夫豈易得此于事理不當免而不免者也六年戊午八月漕司瑣闈試士史漕岩之委公董試且俾飭考官命題立説主于正大公體氶惟謹是舉取士允協輿論公有力焉九月出院替歸開慶元年已未赴堂求倅時有帶朝職始得倅之旨援外宗簿領以請得通判武岡軍替何籍闕何又替于大信者也未幾賈宣閫奏特辟楊季衝替見任于大信有旨令下兩任改替公念改替則闕愈逺又恐宣司再辟人則此闕終為有力者所奪不得已改注福州倅景定元年庚申某月也公嘗簽判是州去思在人將以半刺重臨先聲所騰士民鼓舞嗟乎豈謂遽以二年辛酉二月七日謝世而去之乎公自少負俊聲叔姪弟兄自為師友與應城公治經雖不同而學術淵源則同過庭聞詩出于父命遂與弟貢元公同習詩亦同以詩經蜚聲場屋踰冠領薦士林艷之次春南宮宣昭義問之題已屢擬之而竟下第公不怨勝已反求益力然後乎此二十有七年始第則已老矣﨑嶇州縣之職􅂷二十年非無功非有過而仕止于是使假我數年終福倅之任家事亦詎止是家素單寒公謹畏自持終始氷蘖沒之日田畝不盈百人多以老且貧為公惜是皆俗見孔子非萬世仕者之法乎為委吏必會訃當為乘田必牛羊茁壯長盡其職分所當為而已矣使後日不為魯司寇孔子之為孔子自若也何損焉公自歷官職分必盡有功無過賞不酬勞班改宜宰邑晚節宜通守皆天也公何愧哉譬之于物早遲巨細時節分量一聼于天菊之香晚不羡梅之先春鷽鳩之搶榆不羡雲鵬之摶扶吾方以壽考安貧為公幸而不以老窶為公惜識者當有取于斯言循轉自迪功至宣義以官年少拘礙不得上贈二親公嘗恨之逹觀亦不足多恨公為文長于論事有陸宣公之風五七四六皆典重純雅惜遺逸者多耳櫟于公為族姪孫即公與詩詞唱酬六五公同叔之曽孫不忍公之沒沒無傳也隨所見聞追而為之傳外是有當牽連得書者謹附見焉公母弟貢元公諱應午字志可以詩經領甲午鄉舉會諸侯于東都止駕言徂東題也主意謂賢君欲振動天下之精神必自吾身之振動者先之所以必東其駕以東諸侯之駕氣象雄偉終篇稱是至今膾炙人口垂免解而不得試竟以癸丑殁公家問中深惜之公遺文中有和姪履正長短句曰一種名駒日千里駸駸良驥曾幾到文場掉鞅奔騰猶未問汝視文淵子姪誰同誰異莫效季良豪傑士伯髙謹厚宜操履以馬援之戒兄子者戒之尚可見前輩之遺風焉此則先叔父字德之丙午先預薦而韓守補降為乙榜者書此以見公一家文學之盛又以見勵族姪之嚴盛德事之一端云泰定元年春二月二日戊午櫟謹書處士南山戴君行狀皇慶壬子同邑桐岡金公聘豫為孰師其戴氏外孫蘭庭芳時方十嵗從遊三年警敏異常兒豫器之謂必成立後十四年泰定乙丑面以其先君子南山君行實為託禮辭之既而敷書以事狀來請之勤勤豫對其二舅讀之漸讀漸涕零哽咽不能言默誦終篇嗟夫尚忍言之哉謹按事狀托實書之君諱杞字南山姓戴氏世占名族于徽之休寧上世居亳之譙國徙袁之宜春南唐保大間銀青光祿大夫撿校國子祭酒兼監察御史上柱國諱安始遷邑東由山鄉之隆阜里是為君十四世祖墓在黃墩小練原髙祖諱靖從事郎婺州蘭溪主簿二子次諱得一建康府知録曾祖也妣金氏祖諱杼江東漕貢辟􅁃司幹官妣吳氏雍守竹洲公警之孫女繼寇氏考諱登庸號震齋舊師弗齋陳公宜孫妣吳氏伯父諱元凱武學釋褐授成忠郎池帥司幹辦公事世母朱氏侍郎公晞顔孫女年九十有一矣尚健壽者如斯夫君生以至元甲申十二月十六日亥時殁以大德癸卯正月十一日戌時得年僅二十數之短如斯理有不可測者後六年乙酉十一月十五日葬于鄉之遐富原君幼頴悟五嵗而讀書十二能文鄉先逹弗齋陳公𢎞齋曹公皆賞異之賦詩有驚人句友梅吳公資深次臯孫公巖有取焉君之從叔父貢元公采為蘭言如此君娶金氏武岡君新寧簿公革孫女國舍桐岡公應鳯女也一子是為蘭君殁後二十五日始生方在母腹族之人幸其女窺覦將為後及生男也震齋喜極宿疾頓蘇親督養視閔閔焉冀其長而有立也越三年丙午震齋亦殁于是寡孤零丁無所于依外大父哀之挈以歸燾之維之撫之育之天地父母之恩不啻也君季氏良佐君相臣實總家事桐岡公為叩請取先疇鴻溝之責家𨽻董租入移户稅自由山而里仁以便輸應少長付孰師教之又為卜謀姻對凡所以曲成者無所不用其至延祐丙辰桐岡不幸亦逝賴諸舅承先志念不少殊嵗己未蘭年十七始贅于歙山泉之汪氏丞相吉國程公元鳯之孫甥也外舅公元清愛同鳲鳩與外氏交扶植之豈期明年汪氏疾弗起甥館興闌逡巡歸祖廬依叔父以居泰定乙丑春建康鈔庫提領汪公巽元歸以孫女家事甫粗定蘭每端居深念君片言隻字不復存一日伯舅總管公伯顔遇君所贈程德菴詩于插架中以授蘭曰而父手澤也蘭驚泣拜受襲藏以生不識父今得見詩若書何哀幸歟金氏每謂蘭言君仁孝天至念母食每寡必深探所欲時進甘旨不忍須臾離側如孺兒之不能去乳母也考晚嬰疾寡出乂門户事殷君嘗藥于內幹蠱于外靡遺餘力亦無不滿親意嘗自言曰二親年未六十吾方幾冠天或者鑒吾孝親之心庶幾親康寧則反哺之日長也金氏年十九歸君悉鬻奩藏買田如干畝二年而寡又三年而舅姑繼沒于是挈子依母家每遇展墓蒸嘗時必挈之以歸銜哀茹苦不遑寧居者二十年吁亦可憐也已今年春甫為子畢娶自今以始子其得時定省婦其得供珍鮭乎天道好還固宜爾也遐富原之地祖産也初未知可葬與否自君殁金氏切切謀卜藏宵感于夢謂兹吉地遍諏葬師其言悉符良佐敦手足之義慨割其半以完斯美且從臾亟為之其地去家可十里鍾秀萃美滃鬱環抱遂舉以葬斯役也桐岡公實主之金氏又捐置山資左右前後得之無遺將搆屋墓傍捐田榖淨侶以虔香燈期世世無怠也良佐之生母范氏事震齋日久蘭以不逮事大父母於所愛宜加之意擇先疇上腴五之一助叔父以養自戊申迄今不少怠此義之交相感應者皆可尚也庭芳痛目不識父而心切于報父不忍有美而弗傳將求文銘諸羡道以圖不亡之壽又以父之不年而未仕也恐不當得銘援昌黎韓子銘處士盧君于陵例以請今之昌黎而強委重焉此固報親之大者乎竊謂又有大者焉天生大賢有始厄而終昌者趙文子杜祁公皆遺腹子皆能亢其宗而昌大之匪直著親之美而已王逢原邢居實皆能詩文而早世逢原無子居實未之有考人所貴有子有賢子耳謂有文為不朽有子為不死不死必不朽矣仁者不必壽數也仁者必有後理也由此觀之理未始不可測也子能表父文傳父美孝矣能賢其身昌其宗尤孝之大者庭芳年未志學豫具知人之隻眼者已知之後十餘年果印豫言今年甫二十有三正晉子野所謂日出之光自日出而日中以暨秉燭鼎鼎未央寬以數十寒暑久大德業其何可量文子祁公當恭而三吾言豈有印于前而不印于後者朂哉庭芳兹豈非先君子所深望于子者謹狀友山處士程公行狀公諱泳字孟遊號友山世居休寧縣南之會里髙祖諱某尚書文簡公大昌母弟也曾祖諱律于樞密正惠公卓為從弟始遷居中宅祖諱以豐父諱用中又遷居汪圻下溪之傍即田為宅里人呼為田裏焉數世種德績學韜光淳祐五年乙巳實始生公公自幼神采英拔應對爽徹從孰師往往青于所出書得顔栁楷法習程文錚錚有聲晝之所誦夜夢多誦之至數十句不誤夜夜而然其劬于晝可驗也持所業請正于鄉先逹屢遭賞異衆謂父祖不耀委祉于公踵文簡正惠世科當不逺不數年科目廢矣公不但文墨超邁世事尤練悉清幹有餘少與兄臞山公友悌天至協力幹蠱率以用譽年二十有四丁父艱自是應門户接都保邑大夫侍史胥徒恭謹和厚稱明果公正實兼之事會難處一出言人無能異者倣佛王彥方陳仲弓之風丙子夏羣小逞謀害公愷悌君子神明扶持宗黨助順鼠輩隨以磔然疇昔所藏羽化不復完公劬躬貶用力訓子世其家不數年物力幾復舊適郡邑差為倉庫官歷數年時方難為坐是業又落公劬躬節適如初不數年又幾復其初方將含飴㺯孫啖蔗佚老而公謝世矣實大德甲辰某月某日也享年六十不為不壽而人無識不識皆惜之者以公德人也公所以為德人何也請索言之公事親孝少喪母事繼母如生母事兄悌與兄競爽怡怡切偲平生無間言處家整奴僕輩肅然待族厚聘孰師教諸子羣從附焉者不與校處鄉和事長者甚恭接少者略不倨待下焉者亦甚得體交外姻盡道公內同邑處士求邇先生范公孫女也求邇子司户公卒二子方幼公為謀屋于所居傍遷而近焉扶持之成立之惟力是視求邇公世業家聲賴此不墜公力也待孰師恭而有禮不豐不嗇終始十數年如一日周禮六行曰孝友睦姻任恤揆公平生於是六者無一不備謂之德人非乎且資性忠厚恥言人過聞人述里巷鄙褻事默不贊一辭兢兢畏謹無一髮可指可議或言某家今頺剝如許應之曰吾輩要如許甚不難慎勿取其覆轍駕之觀公一言一行悉皆可為世範太上首立德次功次言功言胥德乎出德在己功在天公雖不逢無功可述然處家處鄉是亦為政復何憾焉嗚呼世不復有斯人矣公之將化也得疾醫療閲兩月愈矣間坐觀摘橘微風襲之又疾臞山視之曰兄某不起矣只在明日訓子訓姪媳皆忘私盡孝等語言言切當至明日起坐索水盥潄如平日略不亂恬然而逝觀此亦聞見中所無公之內范氏少公一嵗其沒也以戊申某月某日後公五嵗二子椿楚皆學成行立一女適同邑趙某孫男幾人孫女幾人卜地於范公博村故君之園斯地也術人素云可公素聞之未言臨殁微及之范君素恨報德無所即欲義遜公內范君女兄也力辭不受必酌中直以酬議遂定椿楚將以年月日襄事謂櫟曰先人日月有時將葬矣欲刻志羡道必先以狀計當今大手筆莫如先生敢以詩櫟曰聞之沈隱侯郭有道漢末匹夫非蔡伯喈不足以偶三絶謝安石台輔時無麗􅍨迄乃有碑無文審如斯言則士傳世在有德不在其位文傳世在有文不在有碑僕于公自年十三得陪研席繼為八年孰師與公交前後四十年公知僕心僕知公志且文簡公母櫟六世祖之親姪女也我之曾老姑爾之髙祖母老杜嘗以是語王砯僕之于公亦略似焉乃不復辭謹狀恕齋居士汪公墓志銘士君子立身行世修天爵而人爵從者誠可尚天爵修而人爵不我從庸何傷與其得人爵而有愧孰若德行立而無人爵之為安知此者可以論恕齋居士汪公矣公德行人也姓汪氏諱士龍字潛叟恕齋其自號曾祖諱黻祖諱繹考諱祺世居休寧之芳塘四世祖始遷蕖濱實上祖質庫基也家嘗中否公少力學壯為通儒不拘拘章句之末實能明體適用貫窮理盡性開物成務而一之外嚴而內寬貌威而心慈肅恭勤儉再振其家而張大之古以六德六行興賢不敢諛公以全六德然強恕近仁由忠為恕亶為有之若孝友姻睦任恤之六行以全許公可也事二親盡歡每以欲飬不待為終身恨孝矣為兄善其弟弟殁愛從子伸老自幼俾同居育之誨之成人為之娶畀之田别居之屋友之推也待族一是以和為本雖好尚微不同者終心服而歸于同睦內族也以姻外親言之視一事可見其大者公娶霓湖提幹朱公孫女娶之五六年迎外姑吳奉飬之視之謹事之恭歷十有六年享年七十有三而疾不起喪葬盡禮有過無不及不寧惟是外姑之孫思義年甫十三俾侍祖母俱來撫飬成立之為之婚娶畀之田以租計者百有五十居之屋踰陸士衡之三間今表姪之子亦克家焉性如鄭當時之好客賢士過從必禮遇之實能以賢知賢擇孰師必謹以才其子若孫可謂能任于友也已至于愛衆尤鑿鑿可稽周急略無倦干求假貸者每輟食應之咸感悅而去尤樂施捨里之巨干暨上資干抵邑必經之途泥而衆苦之捐財募工石之凡數里以便永久他杠梁之修徑路之築指不勝僂又于本都創麻田堨溉田四頃而贏日督工成之風裂肌日黧面不顧既成兩岸易頺歷數嵗卒堅久之裒費有田之家十不逮二三一力足之而後止平生與物無競酷嗜詩書不驕不奢惟敦朴實賓至咸遊􅃧橘中之樂他雜事平生不挂眼吾故曰公德行人也以鄉三物之六行許之其誰敢改評人有德行如許而賓興不及之此權衡人物者之責公何愧焉惜公不用于世而僅于家若鄉故其實可見僅如是使得進而用世推其明體適用之學其所建置詎止如今所觀而已昔馬伏波征五溪見飛鳶跕跕隨毒霧始羡弟少遊之欵段下澤鄉稱善人由是而言進之不如退也出之不如處也信矣近世以來汪其姓而逹焉者宜莫如畫繡之相君然汪黃並稱公論弗之許極人爵而辱何如公無人爵而安之為得哉元貞初元乙未公革故居而鼎新之至大辛亥厄于王恭元之火尺椽無遺餘延祐乙卯子繼先志所欲為肯堂肯構面勢不易宏壯有加焉公生于淳祐乙巳正月二十有三日之子時沒于皇慶壬子十有一月二十有四日之酉時享年六十有八壽幾古稀豈易得者至治壬戌正月初四日之子時與孺人朱氏合葬江家丘去家才百舉步而天俾之佳城尤不易得天所以報善人也子男一人仲孫孫男二人德馨公之善所鍾訓所成皆賢敏謹願見者不問而知其為恕齋之子若孫也尤天所以報善人也某受知于公也深公待遇之也亦至己酉至辛亥公以孰師賓之葬之五年泰定丙寅秋七月既望仲孫示公事狀俾志銘公墓某也何敢以固陋辭銘曰終身何行惟恕一言何但終身裕後淵泉樂哉斯丘偕老之阡如公昭昭骨􅉎心傳廣東淘金副使滄洲金公墓志銘至德癸亥七月六日副使君卒于汪溪里第其孤天驥天澤告訃豫哭于外次尋往弔之孤將襄事集其族彥商確墓銘僉曰知爾父無如陳壽翁先生盍謁諸先生當無辭得銘爾父其瞑矣孤述以告余執述􅒣欷因嘆與君童年契誼白首久要君竟先余歸矣余尚忍銘君哉君諱玉相字清甫姓金氏按家乘稱博道公自桐廬遷休寧杉坑者其第一世祖也竦自杉坑遷梅結者其第四世祖也松青自梅結遷汪溪者其第九世祖也松青孫宣議郎倫倫孫國子學録忠忠孫茶𣙜提舉振虎振虎實君父也母吳氏君生有美質自幼即知務學誦習不休逮長究明經旨于制科文字能指摘瑕疵故鄉鄰治舉業者悉就裁正然君所自為文則根理道剗削枝葉雖至粹美殊不合于時俗屢試屢蹶竟不獲一第其豪爽負氣雄視一世憤鬱放為詩歌鏗鏘可入吟咏自是絶意場屋告所知曰吾終滄洲人也縉紳大夫有知君者在當路遂以懷才薦辟授廣東淘金副使捧檄笑曰官雖卑猶不廢吾賦詩况廣東佳山水經蘇長公欣賞嘗言入廣竒遊冠絶平生今可行吾志也及蒞任嵗有常課易足官以間散無事日載酒尋幽興至詩成翛然自得行役潮州謁韓廟有作友人曹𢎞齋稱為禁鼎一臠忽懷故都請致仕歸與族老宴遊賡酬笑傲積纍篇牘有滄洲集有古風詞韻遘疾卒距生寶祐丁巳七月六日享年七十有七娶會里程氏子男二人長即天驥次即天澤以泰定甲子十二月三日奉柩葬于果子市丑未向豫嗟君有才行至老不獲一試及出乃得所謂漫郎散秩又無所發泄信有宰之匪由人也銘曰壯而曳輪于時逍遙滄洲吟嘯以嬉老而稅駕于時逍遙滄洲吟嘯以嬉天不昌君之時而惟昌君之詩吾今以為君慰而弗以為君悲桐岡先生金公墓志銘桐岡金公葬三田原之六年嗣子南庚語其友陳櫟曰先墓羡道之石未立大懼有美弗傳子其為我圖之豫辭不獲敢托實以書謹按公平生立身行已興家裕後樂仁義之善敦孝友睦姻之行世居休寧邑西四十里之陽午洲曾大父文藻始遷璫溪大父修和迪功郎嚴州户曹參軍父革由右庠擢第授成忠郎主武岡軍新寧縣簿歷世積善鍾秀于公公諱應鳯字朝陽桐岡號也生淳祐丁未九月之二十五日自幼警敏種學績文簿公入學家事不遑理時公年甫十二三即幹蠱用裕務學理家兩致其力簿公借徑韜略本深孔壁書公熟庭聞以書經預計偕賸員問津壁流慷慨以功名自許未幾而鼎命遷科目停經綸志大時弗遂矣簿公官湖湘公母弟竹所公諱應貴侍親宦遊家事不暇過而問公留家儉勤自立始終不憚煩癸巳夏簿公年垂八十始捐館先疇視初倍蓰不啻合締創繼述一身兼之人以為難公弗自謂能也簿公訓子嚴公竭力順事奉母楊氏以裕蠱聞二親俱年髙而終謀窀穸惟謹墓所一崇道觀一營佛剎皆捐田榖其徒俾事焚修仁孝于親州里艷之與竹所公友愛天至平生無絲毫間言簿公卒同㸑二十年壬子遷居始析業公曾大父之與弟兄析業分當四取一甘辭多受少取七之一義遜也今拓先疇皆公力寧混同而中鴻溝焉曾大父立德曾孫篤之以友立言端可模楷當世擇師教子孫甚力扁書堂曰一經前貢士胡雙湖記之長嗣之仕古荆為巴圖爾民户副總管也賦詩速其行期以公謹廉勤戒以留戀家山子之能仕父教之忠信矣之官之月聞公訃戴星奔喪去家二千里十有一日而至本欲移孝為忠弗獲竟其忠還遂其孝子何愧公之教哉族蕃衍一是睦之以和長少欣欣然當傾洞初邑居良難公携長壻館榖家傍左提右挈之越十有六年完璧而返戴氏外孫蘭生而已孤公鞠之家教之成之遂為令器餘姻戚緩急可效之力者悉無靳親友或天水違行不降心以相從公不忍坐視力調劑之或代輸束矢鈎金或捐産毗虧益寡感公義彌罅圓橢歡如初綽有王彥方陳仲弓餘風待人儉恭處鄉公平世俗驕矜偏私態無幾微見于顔靣不怒而威睦姻也任恤也片言細行筆不勝書周官以六行興賢能孟氏以樂仁義之善為修天爵而人爵從之當公盛年使時與之逢世科詎足多遜然林泉自樂于鄉是亦為政于家付功名于子孫亦足以稱善人傳不朽矣何必身預賓興列人爵而後愜哉公三娶先二汪氏今黃氏子男四人長南庚次南仲後竹所次南呂次南周三女長適汪安次適戴杞季適黃瑺俱宦裔孫男五人震祖隨祖觀祖謙祖鼎祖孫女一人公嘗自云諸孫之母有四入吾家家庭惟見雍睦如一母然豫嘗對曰非先生身修家齊儀刑肅雍其孰能與于斯嗟夫此可以觀公之家政矣公之善行卓卓如此公殁于延祐丙辰七月之十二日享年七十葬于丁巳之某月某日鄉曰千秋里曰和化原曰三田墓之形曰匣裏明珠朱子感興比狀人心有曰珠藏澤自媚是方寸之心田與匣中之明珠蓋異名而同體皆自公之心得之櫟也素與公遊知公莫我詳無溢美無誇辭所以報知己也文成延祐壬戌七月某日銘曰縱觀八極詐暴欺孤禰觀以蟻石方之狐豈若林宗蔑勢與位有道一碑芳菲千古嵓嵓桐翁不爵而尊道行家鄉善樂行敦淵哉公心澤媚珠存埋玉匣珠方寸本根耕之無盡兮心為田孫曾繩繩兮掌珠圓世世生賢子兮即斯阡汪主靜先生墓志銘士君子卓然有志于成立者多本于家學相承有以見之真故其所行遂足以稱世否則逺非有所承學之無其本而畢竟克成厥志也者幾希先生諱深字萬頃號主靜姓汪氏丰神秀偉卓犖異常四嵗時孰賓授大學章句即成誦八嵗已涉獵經史及其長也發憤聖賢涵濡玩索為文落筆驚人十六七嵗時遂與當時有志之士講道于平山堂謂今學者之病在于未有灑然融釋處知所持守只是苟免顯然尤悔而已于是盡棄平日氣習更鞭飭于不及處脫然有自得氣象同志稱其人品甚髙豫少時已聞其為有道之士深欲負笈以從值祖母氏多難而已逮今猶以未獲及門為歉先生越國公後江南望族世居休方塘髙祖諱伯通仕宋判福州政聲沛然曽祖諱邦昌祖諱思懋仕宣議郎父騰坡老于文學隱德立言家政巨細皆條理之不以勤先生先生以故得専于學其成之者逺矣叔父從龍仕宋廬州判弟恕補太學生季弟椿分巡江浙以廉善見稱先生孝友剛正動中禮度不以勢合利交年十九領鄉薦屢試禮部下第以景佑元年將除職偶丁吳太夫人艱服闋遂授湖州安吉教諭于是先生之為教也慨然思有以作新其人匪徒從事乎文章博極古今辨傳注之得失逹羣經之會同極聖賢之閫奧推考禮樂制作刑政因革之文使學者有所依據以為日用常行之地每月朔日升堂召諸生環立講求斯道之要嘗謂古道修明人心純一後世文藝之工展轉沉痼幾于蠧蝕不存然而理之在人心者不容泯也國朝諸儒復振逺響斯道晦而復明吾州近幸翼之胡公教授誨澤尚新人之耳目爾諸生天資雖通塞不齊必求體用一源顯微無間之妙使高逺者不墜于荒忽循守者不流于滯固其功用豈不大哉諸生因而奮修前哲潛玩而服行之大小翕然歸仰尊稱為主靜先生湖州士夫莫不曰前有翼之後有主靜時位雖不同立教有先後者勢當然也至若用世之久速及人之淺深致效之逺近大小天也非人也時近臣以先生薦于國學而議者以主靜之學陸學也非朱子之學也遂罷其事嗚呼陸子豈易言哉彼又安知朱陸異同之所以然哉咸淳改元賈相専權誤國竟辭歸丘園以償夙志夫人金氏先公數年卒先生生于紹定辛卯以大德甲辰卒于正寢享年七十有四嵗先生存日嘗謂子曰葬者藏也欲人之不得見之謂也古之善葬法者莫如郭景純曷不逆善祖父之葬地以免子孫斫頭之禍觀胡淡菴楊誠齋諸公之言其不足信也明矣脫有不諱但求水深土厚足可以為朽骨之永宅子曰棠國學生也是冬吉日將奉先生柩與夫人合葬于黟縣黃陂中洲之旁坐亥向丙是園先生之祖思懋公創也棠具是情告豫以表銘先生墓櫟也深喜先生之見與豫合而先生之行髙出人一等故敢忘潘氏志周子之誚而學為之書先生女四人所適皆名族程梅溪張官舍朱館生星源金竹程壽卿是也孫男曰杰曰顯有學有守咸有德士也嗚呼如先生者克成先志啓佑後人真所謂豪傑之士也天下國家其可微斯人也哉銘曰汪顯江南孰浚其祥克世其武中選文場品節湖學德教馨香奕奕崇丘中洲園旁公安于斯我悼何忘傅巖處士汪公孺人吳氏墓志銘黟于新安為縣人淳俗古素稱小桃源隱君子樂居之宜傅巖處士汪公之先世自宣之新建徙而家焉初居黟之考川五世祖遷古舒父將自舒還黟道番陽以事留轍迹回環終定居黟之傅巖承先志也公汪姓諱元字元善自汪氏龍魚見張平子賦中代有顯人越國其尤彰彰者畫繡相君玉堂少師洎黃陂諸逹官指不勝僂獨公家數世以隱德稱曾祖諱某父諱某妣張氏以開慶己未夏四月二十有三日生公于番陽公四嵗哭母五嵗始侍父還黟冢樹依然蒼翠不剪數世積善鄉人不忍戕也公事繼母李氏以孝聞昆季三人公居次以友于稱弱不好弄長篤學研經史習賦詞庠序試多頴出鄉先生亟稱之謂將摘髭一第而鼎命革矣嵗乙亥丁父艱哀毁終制卜吉安厝喪葬無違禮自弱冠立身待人一是以古為師銘座右有曰謹畏行事怡間養神接物和柔理家儉勤終身力踐之纍世鄉稱善人公培之益崇重義輕利非其道一介不取鄉閭周急無倦于周官六行曰孝友曰睦姻曰任恤亶謂克全鄉人愛敬靡問戚疏至有望門息訟者有王彥方之風自幼迄老無一字入官府以故丙子軍變羣小竊發肆屠燎公所居鄉賴公安堵無虞公劬躬節用闢田十頃而贏擇師才其子成以學遺以安僉謂公無愧于龎德公焉公娶吳氏性行淑溫事舅姑孝處妯娌族姻和待下慈婦德母儀實兼之人謂公之拓業興宗內助之力居多督男詩書飭女桑麻內外肅然家法為邑里最至大己酉夏四月十有三日公無疾與家人訣怡然而逝享年五十有一自此吳氏綜理家務十有六年節適合宜家不墜益裕真與公嫓德合美雖伯鸞之孟光淵明之翟氏無足多遜生于景定辛酉秋八月十有六日沒以泰定甲子春三月七日享年六十有四子男二某某女二人某某子壻也孫男四人向學頴敏二子深以二親窀穸未卜為歉甲子冬青囊師指牛眠吉地在分水之原其地與二從弟共之議探籌決所歸一拈而得地旁近田若山皆輻湊璧完若神授天相然實公為善之報亦二子孝感也合葬自姬公以來未之有改謹遵之以乙丑嵗春二月十有六日襄事念公潛德如許有美弗傳不仁而不可為也四年冬丁卯十二月遂以行實介孰師倪君諉同郡陳某志銘之某聞公善于倪君也久今兹又讀事狀紀實不誣其何可辭然聞君子有二道出與處也汪氏之出而顯者如前所舉二公畫繡並稱汪黃玉堂以行李伯紀謫詞取譏出而愧孰若處而安出者難工處者易持尚矣古桃源隱者潔身不仕半山以有父子無君臣少之今小桃源公家居數世隱亦如之公之令子篤志勵諸子以學彬彬向成立未有久隱而不顯者昌黎韓子有言明天子在上可以出而仕矣願階庭蘭玉力學待時以印斯言趾畫繡玉堂之美而無其疵使人曰傅巖處士濟川和羮不在其身在其子孫不亦逺有耿光乎哉越明年戊辰春正月望始克謹志而銘諸銘曰小桃源霞蒸川原分水隱君阡配同穴劒雙潛永固安慶綿延青可墓表葬書非惟無益于人反深貽禍于人葬書非惟不靈于人亦未嘗靈于己郭景純以後之人迷于其説何其重不幸也景純忠于晉朝為王敦所殺然初焉曷不逆善其祖父之葬地而庇子孫免斫頭之禍乎自卜葬地後竟淪沒于大江心自謀如此何靈于人使葬術果可信也葬師紛紛曾無興其家者不過栖栖人門以禍福怵人誘人肆為欺誑而已葬者藏也欲人之不得見也昔之賢者謂死不害于人擇不食之地而葬我焉蓋欲擇無用不毛之地以不妨人之耕植未始欲擇吉地為後人利達富貴計也愚人惑于葬師見某家富實某家宦達必推其先某地出之此地遂有名于時名之以某美形盛之久必衰其衰也子孫挾此地以售于人貪者捐其重資圖之圖之未得訟而廢者何限幸而得之舉以葬焉此其有名之地遂如傳舍更代寄宿不保其家之久而不衰也衰則子孫又以售于人而後之寄宿者又來居于斯矣然後知不食之地果為朽骨之永宅而有名之地不保其不為貴勢所奪也葬有中道如楊王孫之裸葬固非矣過之者埋金自徇標所有以示盜或記之籍以示子孫又過為牢固以防之子孫貧而自發者不少為盜所發者尤多發之必鬻之未有不敗者敗者賣者必受禍夫始買者亦或遭誣厚葬之不特為身禍其貽禍于人若此反不如裸葬之不及者為無禍也昔之厚葬莫如秦皇始不免項籍之發末不免求羊之煙薄葬莫如五季周太祖懲唐十八陵之無不發掘也遂紙衣瓦器以葬孰為自禍孰為自全乎泥葬書以求福而不顧子孫之衰微而賣之以取禍與厚葬以自取發掘暴骨之禍者其為愚蔽一也蘇文忠公詩曰是處青山可埋骨逹哉言乎吾女兄適古墩吳氏其舅執敬公慕義好古君子也姊壻諱惟深字子靜與先姊同生于淳祐乙酉三子長曰昌先卒次曰彬不惟無力可圖風水亦雅不信風水葬其父母兄于所居之後山既扳當世先生君子各為志銘復諉母舅表其墓其家世之詳履行之懿志銘具今惟記生殁葬之嵗月昌生于淳咸壬申殁于至大辛亥享年四十嵗子靜殁于延祐甲寅享年六十有六嵗泰定乙丑正月葬父子同穴先姊殁于泰定丙寅享年七十有八嵗竟以是年八月祔葬冢相去一二尺許皆坐申向寅將取坡詩青可二字扁小亭于傍先取溪濱白石砌其冢擇石之稍大而勻者成青可二字于其上焉若稽古先賢之不信風水者夥矣章章者前有司馬文正公次有淡菴胡公繼有誠齋楊公胡楊二公之言比之司馬公尤為深切著明楊公之説見于答朱侍講書答羅必省先幹書與春雨亭記閲其文集可知不暇詳述愚尤于胡公之言有感胡公乞斬老檜逺貶海外其配沒於家公書囑羅甥尚志合季子泳同擇葬地只于水北一帶家山取其土厚水深足矣世人未有不死死未有不葬何患無地九經十七史老舅皆涉獵並不説富貴由葬地俗儒不讀書不見古人之議論溺于隂陽家説背孔孟之學戒之慎之若不從吾言勿踐吾門勿受吾教淡菴之于羅生戒其泥風水尚恐其信風水不免危言痛針砭之豈如豫之吳生能身不信風水與豫之定見吻合無問不待戒諭之費辭豈不加于淡菴之羅生一等乎遂喜而為之書第前之云云髙見逺識者寧幾人見而怒之者必多矣其慎無泛出之也哉至順二年辛未嵗丑月望日東阜叟陳櫟撰定宇集卷九
