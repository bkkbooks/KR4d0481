front:
  text: 欽定四庫全書集部五
  hash: sha256:91d391b03400458fe4b5406ed6606e69862a8e4f767c40fe8478f37cc3ae4e00
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0481_WYG_000-1a, image: WYG1205/WYG1205-0151a.png}
body:
  text: 定字集别集類四元提要臣等謹案定宇集十六卷别集一卷元陳櫟撰櫟有書傳纂疏已著錄是集為其族孫嘉基所刋凡文十五卷詩及詩餘一卷别集一卷則附錄序記誌狀之類櫟生朱子之鄉故力崇朱子之學集中如澄潭贊曰惟千載心秋月寒水儒釋同處我聞朱子附㑹齋居感興詩句以强合於禪未免自生疵累異乎朱子之所傳然集中諸文大抵皆醇正質實不涉詭誕如深衣考之類雖未必盡合古制而援據考証究與空談說經者有間惟詩作擊壤集派多不入格顧嗣立元詩選中所稱笑渠拄笏看山色容我扶笻聴水聲桞枝水灑一溪月豆子雨開千嶂烟諸句皆沙中金屑不能數數遇之也乾隆四十五年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀年表宋理宗淳祐十二年壬子春三月二十七日寅時先生生於休寜五城距朱夫子之卒纔五十三年保祐元年癸丑先生二嵗二年甲寅先生三嵗祖母呉氏口授孝經論語聞輒成誦三年乙卯先生四嵗四年丙辰先生五嵗入小學即渉獵經史十一月初四日先生祖士俊公卒年七十五五年丁巳先生六嵗六年戊午先生七嵗通進士業自七嵗至十四嵗侍其父復之公讀書公教之靡所不至開慶元年己未先生八嵗景定元年庚申先生九嵗二年辛酉先生十嵗三年壬戌先生十一嵗四年癸亥先生十二嵗五年甲子先生十三嵗度宗咸淳元年乙丑先生十四嵗二年丙寅先生十五嵗出為人師於團圓山九月十九日先生之祖妣呉氏卒年八十三年丁卯先生十六嵗館湖干始受學於五城黄常甫先生久而得朱子之傳四年戊辰先生十七嵗五年己巳先生十八嵗六年庚午先生十九嵗館於鄉族七年辛未先生二十嵗八年壬申先生二十一嵗九年癸酉先生二十二嵗始就方州試以書經與待補選十年甲戌先生二十三嵗赴江東混試以病不果二月迎婦於迴溪朱氏少帝徳祐元年乙亥先生二十四嵗館於江潭而科舉廢於是慷慨發憤惟以著書立言為務是歳先生父以五城笳鼓數驚因挈家還陳邨元世祖至元十三年丙子先生二十五歳館於詹溪程氏十四年丁丑先生二十六歳仍館詹溪程氏十五年戊寅先生二十七歳仍館詹溪程氏十六年己卯先生二十八歳仍館詹溪程氏五月十一日未時子照生十七年庚辰先生二十九歳仍館詹溪程氏至元十八年先生三十歳仍館詹溪程氏十九年壬午先生三十一歳仍館詹溪程氏二十年癸未先生三十二歳仍館詹溪程氏二十一年甲申先生三十三歳五月二十一日寅時子勲生二十二年乙酉先生三十四嵗二十三年丙戌先生三十五歳秋述㴱衣說二十四年丁亥先生三十六歳二月二十九日先生之考復之公卒年七十七二十五年戊子先生三十七歳三月書㴱衣說跋二十六年己丑先生三十八歳二十七年庚寅先生三十九歳二十八年辛卯先生四十歳館里中畢梧山氏六月和方虚谷上南行詩二十九年壬辰先生四十一歳三十年癸巳先生四十二歳三十一年甲午先生四十三歳二月二十八日先生之妣汪氏卒年七十五治喪不作佛事守曾祖遺言也成宗元貞元年乙未先生四十四歳二月上丁日曹𢎞齋為先生作論語口義序二年丙申先生四十五歳逰郡庠道過長林橋因謁曹𢎞齋大徳元年丁酉先生四十六歳二年戊戌先生四十七歳三年己亥先生四十八歳七月立秋日論語口義成有序四年庚子先生四十九歳八月二十一日先生以雲萍小錄呈曹𢎞齋為先生作㴱衣說跋五年辛丑先生五十歳六年壬寅先生五十一歳七年癸卯先生五十二歳館於江潭葉氏十二月五日書解折衷成有序八年甲辰先生五十三歳仍館江潭秋七月二十七日中庸口義成有序九年乙巳先生五十四歳十年丙午先生五十五歳十一年丁未先生五十六歳武宗至大元年戊申先生五十七歳二年己酉先生五十八歳館蕖口汪恕齋氏三年庚戌先生五十九歳仍館蕖口始解禮記五月十七日作増廣通畧跋四年辛亥先生六十歳在蕖口不戒於火書籍悉燼仁宗皇慶元年壬子先生六十一歳夏五月十一日禮記集義詳解成有序二年癸丑先生六十二歳延祐元年甲寅先生六十三歳在璫溪館是年頒行科舉先生赴浙江鄉試以書經登陳潤祖榜第十六名二年乙卯先生六十四歳春二月上許左丞書秋八月以書附嶺南黄清夫上秦國公李道復求學職三年丙辰先生六十五歳冬編書經蔡傳纂疏成四年丁巳先生六十六歳在璫溪館編四書發明作朝陽樓記五年戊午先生六十七歳在璫溪館六年己未先生六十八歳在璫溪館七年庚申先生六十九歳在璫溪館英宗至治元年辛酉先生七十歳春考評婺源院試卷二年壬戌先生七十一歳三年癸亥先生七十二歳在璫溪館六月作勤有堂記泰定帝泰定元年甲子先生七十三歳在璫溪館二年乙丑先生七十四歳在璫溪館三年丙寅先生七十五歳在璫溪館六月朔胡容齋為先生作四書發明序四年丁卯先生七十六歳在璫溪館正月望作書經蔡傳纂疏序古邢張子禹命工刋行閏九月考評黟川㑹友吟盟課致和元年戊辰九月改天厯元年先生七十七歳在璫溪館明宗天厯二年己巳先生七十八歳在璫溪館文宗至順元年庚午先生七十九歳在家塾二年辛未先生八十歳夏四月建安梅軒蔡氏刋行禮記集義三年壬申先生八十一歳在家塾順宗元統元年癸酉先生八十二歳在家塾二年甲戌先生八十三歳春二月十四日卒後五日配朱氏亦卒年七十有九是月癸未子照勲奉二柩合葬所居後山先壠之旁從治命也
