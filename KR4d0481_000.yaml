front:
  text: 欽定四庫全書集部五
  hash: sha256:91d391b03400458fe4b5406ed6606e69862a8e4f767c40fe8478f37cc3ae4e00
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0481_WYG_000-1a, image: WYG1205/WYG1205-0151a.png}
body:
  text: 定字集别集類四元提要臣等謹案定宇集十六卷别集一卷元陳櫟撰櫟有書傳纂疏已著録是集為其族孫嘉基所刋凡文十五卷詩及詩餘一卷别集一卷則附録序記志狀之類櫟生朱子之鄉故力崇朱子之學集中如澄潭贊曰惟千載心秋月寒水儒釋同處我聞朱子附㑹齊居感興詩句以强合於禪未免自生疵纍異乎朱子之所傳然集中諸文大抵皆醇正質實不涉詭誕如深衣考之類雖未必盡合古制而援據考證究與空談說經者有間惟詩作擊壤集派多不入格顧嗣立元詩選中所稱笑渠拄笏看山色容我扶笻聽水聲桞枝水灑一溪月豆子雨開千嶂烟諸句皆沙中金屑不能數數遇之也乾隆四十五年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀年表宋理宗淳祐十二年壬子春三月二十七日寅時先生生於休寧五城距朱夫子之卒才五十三年保祐元年癸丑先生二嵗二年甲寅先生三嵗祖母吳氏口授孝經論語聞輒成誦三年乙卯先生四嵗四年丙辰先生五嵗入小學即涉獵經史十一月初四日先生祖士俊公卒年七十五五年丁巳先生六嵗六年戊午先生七嵗通進士業自七嵗至十四嵗侍其父復之公讀書公教之靡所不至開慶元年己未先生八嵗景定元年庚申先生九嵗二年辛酉先生十嵗三年壬戌先生十一嵗四年癸亥先生十二嵗五年甲子先生十三嵗度宗咸淳元年乙丑先生十四嵗二年丙寅先生十五嵗出為人師於團圓山九月十九日先生之祖妣吳氏卒年八十三年丁卯先生十六嵗館湖干始受學於五城黃常甫先生久而得朱子之傳四年戊辰先生十七嵗五年己巳先生十八嵗六年庚午先生十九嵗館於鄉族七年辛未先生二十嵗八年壬申先生二十一嵗九年癸酉先生二十二嵗始就方州試以書經與待補選十年甲戌先生二十三嵗赴江東混試以病不果二月迎婦於回溪朱氏少帝德祐元年乙亥先生二十四嵗館於江潭而科舉廢於是慷慨發憤惟以著書立言為務是歲先生父以五城笳鼓數驚因挈家還陳村元世祖至元十三年丙子先生二十五歲館於詹溪程氏十四年丁丑先生二十六歲仍館詹溪程氏十五年戊寅先生二十七歲仍館詹溪程氏十六年己卯先生二十八歲仍館詹溪程氏五月十一日未時子照生十七年庚辰先生二十九歲仍館詹溪程氏至元十八年先生三十歲仍館詹溪程氏十九年壬午先生三十一歲仍館詹溪程氏二十年癸未先生三十二歲仍館詹溪程氏二十一年甲申先生三十三歲五月二十一日寅時子勳生二十二年乙酉先生三十四嵗二十三年丙戌先生三十五歲秋述深衣說二十四年丁亥先生三十六歲二月二十九日先生之考復之公卒年七十七二十五年戊子先生三十七歲三月書深衣說跋二十六年己丑先生三十八歲二十七年庚寅先生三十九歲二十八年辛卯先生四十歲館里中畢梧山氏六月和方虛谷上南行詩二十九年壬辰先生四十一歲三十年癸巳先生四十二歲三十一年甲午先生四十三歲二月二十八日先生之妣汪氏卒年七十五治喪不作佛事守曾祖遺言也成宗元貞元年乙未先生四十四歲二月上丁日曹𢎞齊為先生作論語口義序二年丙申先生四十五歲逰郡庠道過長林橋因謁曹𢎞齊大德元年丁酉先生四十六歲二年戊戌先生四十七歲三年己亥先生四十八歲七月立秋日論語口義成有序四年庚子先生四十九歲八月二十一日先生以雲萍小録呈曹𢎞齊為先生作深衣說跋五年辛丑先生五十歲六年壬寅先生五十一歲七年癸卯先生五十二歲館於江潭葉氏十二月五日書解折衷成有序八年甲辰先生五十三歲仍館江潭秋七月二十七日中庸口義成有序九年乙巳先生五十四歲十年丙午先生五十五歲十一年丁未先生五十六歲武宗至大元年戊申先生五十七歲二年己酉先生五十八歲館蕖口汪恕齊氏三年庚戌先生五十九歲仍館蕖口始解禮記五月十七日作增廣通略跋四年辛亥先生六十歲在蕖口不戒於火書籍悉燼仁宗皇慶元年壬子先生六十一歲夏五月十一日禮記集義詳解成有序二年癸丑先生六十二歲延祐元年甲寅先生六十三歲在璫溪館是年頒行科舉先生赴浙江鄉試以書經登陳潤祖榜第十六名二年乙卯先生六十四歲春二月上許左丞書秋八月以書附嶺南黃清夫上秦國公李道復求學職三年丙辰先生六十五歲冬編書經蔡傳纂疏成四年丁巳先生六十六歲在璫溪館編四書發明作朝陽樓記五年戊午先生六十七歲在璫溪館六年己未先生六十八歲在璫溪館七年庚申先生六十九歲在璫溪館英宗至治元年辛酉先生七十歲春考評婺源院試卷二年壬戌先生七十一歲三年癸亥先生七十二歲在璫溪館六月作勤有堂記泰定帝泰定元年甲子先生七十三歲在璫溪館二年乙丑先生七十四歲在璫溪館三年丙寅先生七十五歲在璫溪館六月朔胡容齊為先生作四書發明序四年丁卯先生七十六歲在璫溪館正月望作書經蔡傳纂疏序古邢張子禹命工刋行閏九月考評黟川㑹友吟盟課致和元年戊辰九月改天厯元年先生七十七歲在璫溪館明宗天厯二年己巳先生七十八歲在璫溪館文宗至順元年庚午先生七十九歲在家孰二年辛未先生八十歲夏四月建安梅軒蔡氏刋行禮記集義三年壬申先生八十一歲在家孰順宗元統元年癸酉先生八十二歲在家孰二年甲戌先生八十三歲春二月十四日卒後五日配朱氏亦卒年七十有九是月癸未子照勳奉二柩合葬所居後山先壠之旁從治命也
