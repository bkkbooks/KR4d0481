body:
  text: 定宇集卷一元陳櫟撰序書解折衷自序周禮外史掌三皇五帝之書楚左史倚相亦能讀此書蓋伏羲神農黃帝之書是為三墳此三皇書也少昊顓頊髙辛唐堯虞舜之書是為五典此五帝書也至孔子始斷自唐虞以下訖於周去三墳五典所定者二帝三王書凡百篇焉豈三墳五典簡編脫落而不可通邪抑孔子所見但始於唐虞也今不可考矣及秦坑焚禍作百篇之書無敢藏者漢孝文時聞濟南有伏生勝能讀之生時年九十餘欲召之不能行詔朝錯往受生又老不能正言其女傳言教朝以意屬讀所得僅二十餘篇耳先是孔子逺孫有犯秦禁密藏竹簡書於其家壁中者至漢景帝子魯共王壞孔子舊宅又於壁中得尚書數十篇皆蝌蚪書後世遂目出於孔壁者為古文出於伏生者為今文合古今文共五十八篇即今行於世者是也外四十二篇自此時已亡矣篇各有序或曰孔子作然序多與經戾非孔子作也自孔壁初藏時已有此序百序共為一篇武帝詔孔安國傳書安國始分序各冠每篇之首即今所謂小序而亡書四十二篇之名尚賴小序可見焉三皇五帝之書自孔子時而已失二帝三王之書遭嬴秦氏而不全今所存五十八篇學者可不知其㫖哉書體有六典謨訓誥誓命是也今篇名元有此六字者固不待言矣其無此六字如太甲咸有一德旅獒無逸立政訓體也盤庚戡黎微子多士多方君奭周官誥體也𦙍征誓體也君陳君牙吕刑命體也雖其間不無簡編之殘斷字語之舛訛然上自堯舜之盛下逮東周之初二千餘年之事猶賴此可考焉兼諸經之體多已見於書中舜皋之歌五子之歌三百篇祖也周官六卿太平六典之綱也洪範之占用二可以見易之用舜典臯謨之五禮可以該禮之名自虞迄周二千年之史筆在焉下逮周平王秦穆公正與春秋接矣諸經各得其一體而書具諸經之全體又朝覲巡狩祭禮即位喪紀等禮書多載之又道理之淵藪在四書而四書之宗祖往往出於書堯典之克明俊德以下大學修齊治平之所出也康誥之克明德作新民大學明德新民之所出也禹謨之精一執中中庸明善誠身時中之所出湯誥之降衷恆性綏猷中庸命性道教之所出也語之言仁孟之言性亦於書之克仁恆性出焉它所本祖遽數之不能終治經而不盡心於此非知本者豫幼習此經老矣猶心醉焉諸家之解充棟汗牛啄啄心心孰為真的蔡氏受朱子付託惜親訂僅三篇朱子說書謂通其可通毋強通其難通而蔡氏於難通罕闕焉宗師說者固多異之者亦不少豫因訓子遂掇朱子大㫖及諸家之得經本意者句釋於下異同之說低一字折衷之語録所載及他可採之說與夫未盡之藴皆列於是惟以正大明白為主一毫穿鑿奇異悉去之噫講姚姒核灝噩而至此亦勞矣爾小子其尚懋之舊嘗述尚書大㫖繼成書解折衷屢欲序之未遑也大德癸卯十二月五日始取大㫖略改冠於篇端云尚書蔡氏集傳纂疏自序凡例附書載帝王之治而治本於道道本於心道安在曰在中心安在曰在敬揖讓放伐制度詳略等事雖不同而同於中欽恭寅祇慎畏等字雖不同而同於敬求道於心之敬求治於道之中詳說反約書之大㫖不外是矣况諸經全體上下千數百年之治迹二帝三王之淵懿皆在於書稽古者舍是經奚先哉孔子所定半已逸遺厥今所存出漢儒口授孔宅壁藏錯簡斷編當闕疑者何限自有注解以來三四百家朱子晚年始命門人集傳之惜所訂正三篇而止聖朝科舉興行諸經四書一是以朱子為宗書宗蔡傳固亦宜然櫟不揆晚學三十年前時科舉未興嘗編書解折衷將以羽翼蔡傳亡友胡庭芳見而許可之又勉以即蔡傳而纂疏之遂加博采精究方克成編今謀板行幸遇古邢張子禹命工刋刻以與四方學者共之泰定四年丁卯正月望日一標題此書云尚書蔡氏集傳法朱子刋伊川易傳標曰周易程氏傳尊經也首卷有朱子訂定四字不忘本也自二卷起無四字紀實也一今采朱子語録不書録者姓名法近思録也併在纂疏內依趙氏四書纂疏例也然語録必居諸說之前尊先師也一朱子語録發明此傳而不可無者載之傳意已明無俟云云及非說本章經㫖者皆不泛載務謹嚴也一一部尚書朱子於闕疑諄諄言之今遇可疑處姑略存舊說然後明云當闕疑焉論語訓蒙口義自序讀四書之序必以大學為先然綱三目八布在十有一章初學未有許大心胸包羅貫穿也論語或一二句三數句為一章照應猶易啓發侗蒙宜莫先焉朱子集注渾然猶經初學亶未易悟坊本句解率多膚舛又祇為初學語豈為可哉櫟沉酣四書三十年餘授徒以來可讀集注者固授之唯謹遇童生鈍者困於口說乃順本文推本意句釋筆之其於集注􅇽者發演者約略者廓章㫖必揭務簡而明旬積月纍纍以成編襲名論語訓蒙口義自集注外朱子之語録黃氏之通釋趙氏之纂疏洎餘諸儒之講學可及者咸采之廣漢張氏說亦間取焉櫟一得之愚往往附見或有發前人未發者實未嘗出朱子窠臼外丙申春質之𢎞齊曹先生一見可之􅂌之序勉之刋賴同志助之歷四年始成自揆晚生懼賈僭踰罪抑不過施之初學俾為讀集注階梯非敢為長成言也昔程子傳易猶曰只說得七分而况晚生又况為侗䝉計哉櫟數年來又有讀易編書解折衷詩句解春秋三傳節注增廣通略批㸃古文之類嗣是有進尚敢漸出與朋友商之觀者其毋以小兒學問只論語哉大德己亥立秋日中庸口義自序程子曰中庸一書始言一理指天命謂性言中散為萬事指其中說許多事如達道達德九經祭祀鬼神之類皆是末復合為一理指無聲無臭言放之則彌六合卷之則退藏於密其味無窮皆實學也其言約而盡矣朱子分為三十三章而復截為三大段其言曰首章子思推本所傳之意以立言蓋一篇之體要其下十章則引先聖之言以明之也以性情言之曰中和以德行言之曰中庸其實一也此是一大段至十二章又子思之言其下八章復以先聖之言明之十二章明道之體用下章庸言庸行夫婦所知所能也君子之道鬼神之德舜文武周公之事孔子之言則有聖人所不知不能者矣道之為用其費如此然其體之微妙則非知道者孰能窺之此所以明費而隱之義也此又是一大段二十一章以下至於卒章則又皆子思之言反復推明以盡所傳之意者也二十一章承上章言誠總言天道人道二十二章至三十二章分言天道人道卒章反言下學之始以示入德之方而遂言其所至其性命道教費隱誠明之妙以終一篇之意自人而入於天也此又是一大段朱子之區别亦已精矣至其揭一誠字以為一書之樞紐則或問詳焉尤學者所當熟復而貫通者也朱子又嘗曰中庸之書難讀初學者未能理㑹中間多說無形如鬼神如天地等類說得髙說下學處少說上達處多今按說下學固少而其中說下學處則甚切如二十章擇善固執一條及二十七章尊德性道問學一條是也且朱子亦嘗於序文提出擇善固執以配大舜精一之言以見道統之相傳不外乎此矣學者誠能據此以為用力之方而以誠之一言貫通之復如朱子所分之三大段以區别之則所謂始言一理末復合為一理者理皆見其為實理中散為萬事者事皆見其為實事而所謂其味無窮皆實學也者的為實學而非虛言矣言下學處雖少而皆提綱挈領切要之言言上達處雖多而亦豈渙散無統𤣥渺不可究詰之論哉愚每患從學者未嘗精通夫大學語孟之三書而遽欲及夫中庸之書授以朱子之章句或問往往難入不得已紬繹朱子之意而句解之復述讀此書之大略於此云大德八年甲辰七月二十有七日禮記集義自序凡例附櫟自少讀禮記多有未究頗習朱子大學中庸竊有聞焉即其所已聞推其所未究不無所得未浹洽也大德丙午始見衛氏集說乃得因衆說之紛紜而折衷去取之至大德庚戌始融㑹諸說句為之解一得之愚亦見其中昔朱子為詩傳不及載諸家姓氏當時如張宣公亦未然之今安知無執宣公之說以見尤者然銷鎔百家鑄之自己亦安能逐字逐句一一標題以自取破碎斷爛之弊哉乃若所采成段必不可不書氏名者已謹書之矣名之曰禮記集義詳解云皇慶元年壬子歲五月十有一日一儒家以大學為門庭中庸為閫奧入其門庭造其閫奧由是而讀戴記之四十七篇大本立矣宜無難者大學中庸固自程子朱子而後拔之四十九篇之中尊之四庫數萬籖之上然宋仁宗天聖五年丁卯王堯臣之及第也賜以中庸篇寶元元年戊寅吕溱之及第也賜以大學篇於戴記中表章此二篇以風厲儒臣豈非已開四書之端乎一聞之先輩古禮記以月令冠經端或謂毋不敬一言得禮經之要㫖遂移曲禮冠之范氏祖禹因論詩三百而言曰學者必務知要知要則能守約守約則足以盡博矣經禮三百曲禮三千亦可以一言蔽之曰毋不敬一鄭氏𤣥康成之注禮也當其好處辭簡意明其所未悉缺之未為失也乃遇解不通者必強改之讀某字如某字如宿離不貸急繕其怒改離為儷改繕為徑之類是也只從本字自有證據理甚的當何可輕易必如大學親民之為新民命也之為慢也始為當耳然鄭所改亦有當從者今諸解者又必盡非之而盡翻之又不可也姑舉其略以聽明者自擇焉一此編成多取之者或謂不合為句解人將以幼學書視之勉令全段書經文而成段解焉豫初欲從之既而重改作兼句解多省字成段解增字必多世豈無具眼者試一開卷當自見之豈但有益於讀此經者以此經應舉決科者亦未必無補云詩經句解序詩部分有三曰風曰雅曰頌所以作風雅頌之體亦有三曰賦曰比曰興詩有六義此之謂也風則有十五國風雅則有大小雅頌則三頌也風有正有變周南召南正風也邶􅅠衛王鄭齊魏唐秦陳檜曹豳十三國之風變風也雅之大小亦有正有變自鹿鳴至菁菁者莪十六篇正小雅也自六月至何草不黃三十八篇變小雅也自文王至卷阿十八篇正大雅也自民勞至召旻十三篇變大雅也三頌周頌魯頌商頌也風風也民俗歌謡之詩也雅正也朝廷燕饗朝㑹樂歌之詩也頌美也宗廟祭祀樂歌之詩也直陳其事曰賦以彼喻此曰比託物興辭曰興六義之略如此而已詩之作或出於公卿大夫或出於小夫賤𨽻或出於婦人女子乃人聲自然之音自古有之康衢之謡是也今見於書如舜臯喜起明良之歌即虞詩也五子之歌則夏詩也商詩多亡今商頌五篇乃未盡亡者外此風雅二頌皆周詩也二南雖國風已有進而為雅之漸見周之所以盛王黍離不復為雅乃降而儕於列國之風見周之所以衰王詩降為國風而詩亡詩亡而春秋作矣以詩為教自古已然舜命䕫教胄子曰詩言志周禮太師教六詩曰風曰雅曰頌曰賦曰比曰興是也至孔子删詩為三百篇始列於六經而尤以為教人之先務視他經尤諄諄焉曰興於詩曰誦詩三百曰小子何莫學夫詩謂子伯魚曰汝為周南召南矣乎他日過庭所聞亦先問學詩乎子所雅言詩亦必在書禮之先而提綱挈領教人以讀詩之法則曰詩三百一言以蔽之曰思無邪蓋以詩雖三百篇之多大要不出美善刺惡二者讀美善之詩可以感發吾之善心讀刺惡之詩可以懲創吾之逸志皆所以正吾心而使無邪思也學者識比興賦之體以讀風雅頌之詩而一以無邪之思為主焉則詩之一經可學矣詩序之作或以為孔子或以為子夏或以為國史皆無明文可考惟後漢書儒林傳以為衛宏作詩序傳於世今考小序與詩抵牾臆度傅㑹繆妄淺陋常多有根據而得詩意者常少其非孔子子夏所作而為宏所作明矣諸序本自合為一編至毛氏為詩訓傳始引序入經分置各篇之首不為注文而直作經字於是讀者轉相尊信無敢擬議至有不通必為之委曲遷就穿鑿附合寧使經之本文繚戾碎破不成文理而終不敢以小序為出於漢儒也獨朱文公詩傳始去小序别為一編序說之可信者取之其繆妄者正之而後學者知小序之非聞正大之㫖至矣盡矣今述文公之傳為句解以授幼學又以序與詩異處不便觀覽乃依毛氏序列各篇之首但髙下其行以别之庶使序之得失開卷了然而詩之意義易於推尋云百一易略自序六經莫先於易亦莫難於易初讀易而遽欲通易之㫖尤戞戞乎其難哉孔子教人之常言惟詩也書也禮也於易未始一言及之其自言則曰加我數年五十以學易可以無大過易之難學可見矣今欲使其略知蹊徑姑述百分之一焉老子節注序道德經亦後人尊此書之名耳觀屈原之離騷詞人尊之為經則可見矣老子之言道德與六經孔孟之言道德不同所以韓文公曰道其所道德其所德非吾所謂道德也今姑以老子之說讀老子耳蓋老子之學愛說道體而不的見夫道之體欲窮道原而不精探夫道之原其論道本於無頗似周子無極之說其論不欲以靜頗似周子無欲故靜之說而實不免乎有病也無不與有合體不與用貫故其論有弊而其學終不行學者未精透六經語孟周程朱子之學而欲讀老莊自是難事只如老子體道無源二篇若非精透周子之太極圖說亦安能燭老子之非識老子之趣哉莊子節注序愚謂莊子多寓言寓言者寄寓於事物與人而言也故凡所言之事與物未必真有此事物所言之人與其人之所言未必真有此人此言虛誕奇譎可喜可嘆可怪可愕讀者惟以意㑹之批㸃古文序或曰今選古文即以李斯上秦皇逐客書次於楚辭其文雖美如其人何曰不可以其人廢其文也且以離騷壓卷以忠臣為萬世勸也以此書次之以姦臣為萬世戒也勸戒昭然讀古文而首明此豈無小補云太極圖說序此篇周子所自著太極圖說道學之精語也不特道理淵永文亦簡重正大粹然聖經賢訓之文焉今選古文而終之以太極西銘二篇豈無意者蓋文章道理實非二致欲學者由韓柳歐蘇詞章之文進而粹之以周程張朱理學之文也以道理深其淵源以詞章壯其氣骨文於是乎無弊矣此愚銓次之深意也增廣歷代通略後序通略者通鑑之大略也所纂記者皆前朝歷代之事皆古也初不曾記今之事或以古今通略名之殊不可解宋史講義吕氏中所著議論多詳明文辭亦條達然成於理宗朝猶有隱避而不盡言者今可無忌矣遂采其善補其缺多述平昔所考訂與所聞於父師者而申之以管蠡之見焉理度二朝無史可據今姑闕之金事廷芳胡雙峰先生雖略述亦以未見其史不敢輕筆悉以俟後之君子云至大三年庚戌歲仲夏十七日夏至兩都賦纂釋序律賦鑿之以人惟古賦鳴其天科目次場有賦以古不以律丕休哉離騷賦之祖降是舍漢何適矣孟堅兩都有餘刃無窘步漢賦舍班又何適矣寅科諸省取賦僉謂湖廣較優得非天馬歌出禮樂志熟班書故歟銀峰金君尚絅盡一生精力纂釋二賦既沒二十年其嗣子謀刋之屬董君季真求豫序豫退步也奚僭之敢季真曰子知科文事宜其無讓豫方與季真研書經精義不遑他及浮生半日安能盡尚絅平生所熟乎然其條疏有序歸宿有所學古賦者能以尚絅之熟班賦為監則幾矣遂書以辨其首自得樓詩序自得之說何昉乎其殆昉於鄒孟氏蒙莊氏乎自得之則居之安其論正得人之得而非自得其得其論奇趣若異歸則同也中齊趙君自營夀藏搆樓其側扁曰自得欲豫詩之豫未讀樂章未可詩也請辭或曰不得韻語序之奚而不可遂勉強一言夫道可受而不可傳中必自得外至斯能受否則如珠玉投於暗而責其不吾受如之何其可也是故必有胸中之丘壑而後能得丘壑之丘壑有胸中之風月而後能得風月之風月中齊閒靜深逺君子也閲閒中之今古希物外之神仙將優哉游哉以適其天年殆欲自得之者乎自得之􅃐如人飲水冷暖自知非人所能與亦非人所能窺萬象滿前一天領受注焉而不盈酌焉而不竭供吾受用真無盡藏彼不能自得之者我自我物自物雖建齊雲落星之樓則以目力所極疆界之吾懼萬象之偃蹇驕莫隨也中齊亶謂深造自得之者矣萬象皆實虛以受之孟氏所謂自得而居之安不特今日為然將俯仰於宇宙其安居也何莫不然莊生所謂自得其得者端在是矣若得人之得者安得不九萬里而風斯在下乎自得主人以為何如當必曰子之言可謂得豫之所自得者於是乎書定宇集卷一
