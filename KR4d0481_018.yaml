front:
  text: 跋自庖犧氏乾坤二畫筆萬世文字之祖厥後六經四子炳垂天壤凡君公至于士庶莫不崇奉率由他若騷賦詞章名家代有雖其菁華藻采亦自蔚然可觀而究不足以法傳者則以文乃載道之器學者苟於聖賢之道未聞文即極工終若玉巵無當也新安篤生子朱子由周張二程上接乎孔孟之統一生著述不下百餘萬言無一字一句非闡發聖賢理道者故其為文朗如星日沛如江河屹如山嶽堂堂正正顛撲不破逮子朱子沒新安士大夫幸生其鄉得聞緒論宋末明初名儒迭出一時競稱吾郡為東南鄒魯而吾邑陳定宇先生首推子朱子世嫡焉蓋先生生於子朱子之後僅五十有三年世邇而居近知真而信篤見當時人士浸淫子靜之學術厖雜同甫之事功反覆辨析不遺餘力一生著述亦不下百餘萬言亦無一字一句非闡發子朱子理道者堂堂正正與子朱子先後一轍如四書發明書傳纂疏禮記集義讀易編讀詩記三傳節注等書其有功於經傳不具論即其隨録有云象山之學實流為禪専以覺悟訓學者而詆斥濓溪伊洛有禪家呵佛罵祖意明眼覷破已使陸無遁形而吾邑後起名為宗朱者尚有云儒者曰其學似禪釋者曰我法無是為象山分解者更有著道一編迷惑學人者藉非先生勤勤懇懇羽翼紫陽後之人雖欲聞子朱子之說其孰從而求之况今之學者更不可問矣目未覩子朱子之書樂姚江之便捷信其晚年定論一編反以為朱之初尚不逮陸雖明季陳清瀾先生著有學蔀通辨考其年月紏其顛倒足破誕妄之奸然辨駁頗多發明殊少則人猶未知子朱子之所以集諸儒大成而上接孔孟也邇年崑山徐司冦既刻先生尚書纂疏于經解中而先生族孫毅軒書崖二公今又梓先生文集行世遂使千百世後之學者讀先生之文確然深信子朱子之所以當遵異端之所以當黜而由濓洛以遡洙泗無岐途無迷津則先生祖孫均有功於聖賢道統之傳顧不偉歟抑儀十三世祖仲翔公諱龍生宋咸淳乙丑少先生十四嵗潛心子朱子之學元至大中為青陽教諭崇祀名宦詳載郡邑志及家譜實受業於先生之門兹毅軒公又以先生文集見委跋尾而儀末學小子亦得掛名集中是又寒家祖孫之私幸不僅為千百世學者幸而已也
