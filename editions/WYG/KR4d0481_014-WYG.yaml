body:
  text: 定宇集卷十四元陳櫟撰考評祭文祝文明經書院文㑹考評考塲屋之文易評課㑹之文難鵠袍戰藝不持寸鐵各専席舍一影無儔寸晷風簷忙無善歩失而失耳莫知其所以失司衡鑑者出大府公差秉青銅鏡持玉界尺以黜陟多士多士倉猝應試髙者信有之其不能記憶不得要領不善摛繪者往往十人而九考者且數十人有初考有覆考有主文衆智互叅優劣易見落卷試者不得見賢者不怨勝已不肖亦不能尤人夫奚難今以文㑹友何書不可閲何師友不可資旬鍛月磨大肆厥辭考評之責強諉之一夫且病者力孱懼壓膽薄懼譏與童生吾伊来客頫卬餘閒蓋無幾合經疑經義以卷計者三百五十若之何能以一夫之目盡之况司盟司紏名卿老儒尤未易出手小有謬誤出惟衆口難齊寕不負兹隆委乎辭之不獲窮日夜洗眵昏讀之没川采珠鑿石求玉戞戞乎其難哉初讀賦既懼繼讀諸經義又懼何懼也懼無以塞責也最後讀諸經疑不覺驚喜過望焉炤乗連城頓獲三數恨賞不足酬之耳嗟夫此豈塲屋寸晷之所能為哉何當刋之書肆可為天下作經疑者之式既以自賀且為同㑹獲歴觀之益賀而尤為司盟司紏二公賀云燕山八景賦考評燕山八景之名其昉于何時何人乎以瓊島太液二名觀之想起于中統以後黄氏賦所謂因内海以為池即瓊島而為圃者是也名出何人未之能詳意其倣瀟湘東陽鳳翔古䖍等處而標此名京師衆大之區凡山川疆域宫闕觀寺城池苑囿倉廪府庫天下之巨麗大觀咸在焉何往非景何景非勝今以景標非七非九恰亦曰八愚意其有所依倣也舊聞方公詩重行易水三關路為欠燕山八景詩求其詩無有及聞此賦題訪之久遊燕山之君子訊其説既未詳訪其圖亦不可得登髙能賦親登覧而後能也然且難能矧未甞登覧而欲賦之不過想像焉耳宋玉想像而賦髙唐乃述夢境本無實事徒肆虚辭如画鬼神孰從而究詰之今欲以虚辭賦實景識者茍摭實景以非虚辭不待離婁子吹毛議之而知其不可矣昔東坡據孔宗翰南康八景圖而詩之後得親覧方知前詩未能道其萬一此不過謂按圖不如親見之的必不差也今兹八景一景自是一題乃合八景而總賦之親見尚難况臆度乎遍閱諸作幾于遭困雕虚画空喙喙争鳴想家家自謂升屈宋之堂人人自謂入揚班之室矣一様手段誰分優劣者凡數卷謂超出耶無可㸃謂不逮耶無可疵賞僅五名棄捐不可也前列亦不可也反復參校難得一魁磏字號效晉問體者氣雄識髙辭騁力贍惜改金壺為金䑓白璧之瑕端在乎此愚聞金壺夕炤本曰道陵夕炤劉太常此景詩曰陵前髙樹樹前山山外秋天日向殘草帯餘暉侵石馬水逢廻影下銀灘平時只道雄圖遠身後那知刼火寒今古行人欲廣路不堪回首重悲嘆又閲宋梅洞槀賦燕山八景之六缺不賦者二景自謂薊門飛雨道陵晚炤懼渉悲慨不足以鳴今日太平之盛以是觀之葢如殽南陵夏后臯墓之類不過以金壺替道陵二字而其地之勝景未始易也何得自以金臺并其地而易之燕昭之臺安得今尚留遺跡如相如琴臺比乎強行指射且圖好説可不可也又按范公致能北征集有盧溝一首註云盧溝去燕山三十五里此河宋敏求謂之盧菰河即桑乾河也今謂之盧溝河詩曰艸艸輿梁枕水低玩此語則其時無今時之壯麗可知又燕賓館一首注云至之日適以重九伴使酌酒相勸西望諸山皆縞云初六日大雪讀石湖此詩方略得盧溝西山二景著落遊京師者必能如范公之辭章大家有眼力有考究方得諸景之實逐逐軟紅塵中實未甞著意觀覧攷究而漫曰吾甞遊甞見可不可也躊躇累日不得已仍以此號為冠如廣厦一區材木間架規模實壓諸屋見屋中偶有窗壁不完好處乃因此以次焉之屋完整者壓之何以聳過者之觀瞻乎此公能服義而勇改焉斯為無瑕之璧矣其次碩字號音調擬騷良不易得非靈均之賦千回萬轉于胸次口角未易辦此㧞以為次然後以次品第之極知僭踰惟諸公恕察焉幸甚黟川㑹友吟盟考評休陽東阜叟陳櫟辱小桃源君子寄聲謂將興詩盟求一詩題併委以考評辭不獲見今秋滿眼有豐稔意遂以大有年為題以復命葢為今日之願也按春秋二百四十二年而有年僅一書見于桓公之三年大有年僅一書見于宣公之十有六年公羊氏曰有年何以書以喜書也大有年何以書亦以喜書也曰有年何僅有年也曰大有年何大豐年也僅有年亦足以當喜乎恃有年也何休註恃頼也若桓之行而元年水二年耗頼得五榖皆有使百姓安土樂業故喜而書之不足于桓公微意已見至泰山孫氏著春秋發微始有紀異之意實自公羊之傳而發之耳伊川春秋傳遂明言之胡氏傳又申言之是固然也而不必泥也朱子效春秋為通鑑綱目一千三百六十二年中大綂之世以大有年書前纔一見于漢顯宗之永平九年後又見于唐太宗之貞觀四年亦以為紀異可乎以是知大豐稔之祥自虞周盛時土榖維修綏萬邦屢豐年以後真天地間希濶之逢不常見也不常見而獲見心天地命民生之大君子安得不深喜而樂道之此葢願豐老杜之心未易與區區事仄仄平平者言之也兹承示及吟盟一宗以篇計者二百三十有七披閲連日惟重嘆嗟豈不欲體主盟君子之盛心多㧞其尤尚凛凛于一名之難得而况其餘乎詩以時言未易言也陸山隂得之曽文清曰律令合時方妥貼工夫深處却平􅆥今求妥貼平正者何寥寥而粗鄙疵纇者何紛紛也就中銓次凡如干篇各見于後幸有當行詩翁如存菴胡先生相與同考評審訂之庶幾免于戾乎惟平心服義之君子恕察之泰定四年丁卯閏九月書於璫溪寓館丁祭孔子大成至聖文宣王文恭惟道統逺自羲軒集厥大成允属文宣立天地心太平萬世學校通祀聿嚴牲幣春丁釋奠禮嚴故常教行淮甸烈烈耿光丁祭顔子兖國公文聖徒三千疇居其一惟吾顔子好學無匹樂在陋巷生窮一簞没胙兖國上公萬年春丁從祀公為之首誰云絶塵瞠若其後丁祭曽子沂國公文單傳聖道卓哉沂國省身則三貫道以一想當童冠從浴乎沂没逢聖明胙土享之從祀春丁公居其次有司告䖍籩豆之事丁祭子思成國公文大學户庭始師曽子中庸閫奥卒光先祖𤣥聖聞孫道頼以傳錫土成國從祀萬年是祖是孫相為悠久齊明承祀洋洋不朽丁祭孟子鄒國公文洪惟亞聖道繼闕里言必稱堯功不下禹生為鄒人没封鄒公謂没不傳傳永無窮丁祀先聖四公並配公踵三公洋乎如在祭越國汪公文惟公秀鍾乳溪生禀間氣保鄉井也以仁歸有唐也以義生為英雄作牧六州宜其没為明神而恩封八字也惟吾古歙公父母邦功德所單厚於他方烏聊之外行祠相望苦竹叢祠威靈孔彰有禱必應在上洋洋吾里焉依多夀而康合兹四民降之百祥衆心蟻慕其何敢忘兑秋奉迎厥有故常神馭遍遊爾界此疆成始成終豐年穰穰有牲在爼有酒在觴七獻既備明徳薦香我民報事兮嵗復嵗自今兮欽于世世尚饗祭曺宏齋文延祐二年嵗次乙卯五月戊申朔越十日丁巳契家姪陳櫟謹以絮鷄之奠致祭於判簿宏齋先生曺公之靈嗚呼吾郡鉅儒方公萬里疇其亞之曰曺夫子三百餘年沚莪豐芑長育涵濡式克有此止齋之大晦菴之理萬選萬中刄游肯綮已未别闈以次名擬官題小誤暫尼芳趾戊辰髙科筮仕方始使早十年明堂杞梓豈近鼎革勾稽而止此何足言言聊爾爾倦仕養親蘭膳嘉㫖僅長紫陽爰淑多士元祐全人無瑕可指方之方公節尤竒偉不為公惜翻為公喜學者宗師斯文統紀永棟孔堂願何窮已忽乃風傳公疾不起驚呼失聲吾願已矣年開九􅐆夀筭誰比孫枝六人家聲演迤立言不朽名垂千祀知足不辱公無憾只櫟也仰公昉自稚齒四十有五始獲望履一見賞識極辭褒美昔人悔恨無一知己知已有公一焉已侈奉書必答答書盈几僅僅去年疎奉尺紙一再留札疎此之以念欲哭公香裊一縷覊縶未前愧汗如洗除喪来前越人可恥徐稚絮鷄誠哀其菲公乎如生奠觴應主嗚呼尚饗祭胡雙湖文嗚呼儒者明經莫難於易先生家學易乃世習易百十家不輕所宗啟蒙本義獨宗晦翁晦翁十八以易薦鶚先生亦然可覘家學晦翁著書以身之退先生著書以身之贅大肆其力幾絶韋編附錄纂註海内廣傳玉齋為父雙湖為子啟蒙通釋並傳濟美景伯父子俱註左氏名傳書亡豈公家比又以餘力明晦翁詩雖未拜讀以易可知晦翁忠臣先生其一以儒明經功孰與匹方夀斯文棟孔子堂訃音忽傳有淚其滂嗚呼我侍先生自丁酉嵗邇年以来罕得聚首泰山北斗心常瞻仰自京南歸書問屢傳近者秋孟先生賜訪留僅七日莫淹歸鞅期以秋季為我再来將一月留方賦歸哉僅辱遣書賜一經紀忽忽奉答尚邀再至十月下旬董君走伻報公捐館臨没寄聲欲托以孫来我家塾平生于人諾無敢宿葢恐来春之官古荆尚俟商略方報芻靈髹漆之諾兹用掛劒表平生好將以薄奠嗚呼先生之夀垂及古希先生之書千古昭垂乾坤若毁大易方己名與易俱可無憾矣下見玉齋心事昭彰父子相繼為脩文郎吾文不文寫先生心先生如生褒如欣欣尚饗祭倪元甫文昔倪公寛西漢名卿近倪公思詞科之英千乗名家久望吾邑潛而未躍世有隠徳惟君之生鄉稱善人當躋上夀以庇族姻夀僅中年天不可必日月踰邁祥琴倐及君身雖去君家自昌北堂主婦成立諸郎久潛將耀天終可必君之家聲當振他日芻靈之撤先罔聞知庶饈欲奠已恨後時蔬素一觴率焉是愧寄哀斯文用開君意先妣撤几祭文維元貞二年太嵗丙申六月戊戌朔越七日甲辰孤哀男櫟暨媳婦朱氏孫炤姪孫勲女孫某娘等謹以薄奠敬祭於先妣孺人汪氏之靈而言曰嗚呼哀哉甲午二月母棄其兒二十七朔倐忽遇之世人處兹追薦凡幾悠悠癡兒乃止如此固吾家法世不用僧子孫謹守不敢不行然念吾母一生行善可必逍遥奚事追薦所以此等一切掃除惟極哀慕遽越居諸奉親居鄉迨今無屋廹窄隘陋容膝不足以故几筵無所於安雖強安之䙝慢弗嚴擬于今秋建廬墓側不免先時几筵是撤髙祖之墓考妣祔蔵餘地可廬或云允臧先考存日謀居此地今焉卜居實承先志几筵更留能幾何時指日廬墓朝夕瞻依吾母隂相使即就緒畢世守墓報親其庶撤几薄奠母舉斯觴附我祖考百世蒸甞嗚呼哀哉尚饗先考卒哭祭文嗚呼父棄諸孤若昨日耳日月迅速百日倐臨以日辰言雖曰盈百此心哀慕則如初焉聞之儀禮古者士三日而殯三月而塟塟而三虞遂卒哭以此知百日卒哭士喪禮也今皆知百日卒哭之期而鮮察三月而塟始行卒哭之禮去古既逺古禮不明非一日矣吾父之生允為吉人天實相之宜得吉地三田之塟明年始宜厥今三月已逾雖未能襄事然將以下元後一日祗奉靈柩出殯新亭是亦酌古禮而權行之也蔬素一奠惟吾父鍳之尚饗小祥祭文嗚呼人子喪親期而小祥練冠縓緣儀禮昭彰雖腰絰之猶在而首絰之已除葢其除也以漸此古禮也去古既逺禮制不明其除之也以頓不以漸雖按小祥之期不復講練冠之禮惟追薦而已矣恭惟某鄉稱善人備全衆善力行終身其生也逍遥其化也亦逍遥理之必然者也日月迅速轉盼期年時序雖遷哀慕罔極無沉淪之于下奚假于薦㧞自臨之在上奚待於超昇蔬素一奠以表哀悰惟鍳之尚饗大祥祭文嗚呼某居廬讀禮有感于戴記之言曰三年之喪二十五月而畢先王為之立中制節賢者不得過不肖者不得不及又二十五月之外加禫服二月此禮家所以有二十七朔之説也今諸孤遭先君之喪亦既二十七朔矣雖猶不忍除而不能不除者實以㓜妹之于歸故也古禮女二十而嫁遭大故則二十三而嫁㓜妹年亦既二十有五摽梅及時可復緩乎此先君存日所切切于懐者今兹所以黽勉於祥除葢欲盡先君未終之事也又有感於戴記之言曰直祭祝於主索祭祝于祊不知神之所在於彼乎於此乎先君既没為神為靈新宅祖宅俱安几筵今即禮記之言求古人制禮之意幽明道隔不審先君神靈其的在新宅歟抑的在祖宅歟此孝子求神所以不厭其備也所以既祭於祖宅又祭於新宅雖蔬素之奠不一祭其表哀誠則唯一耳尊靈不昧其終鑒之尚饗祭社祝文天下通祀實惟社稷古禮僅存此乃其一枌榆壇壝何里不然簪纓之族况我藤川詩歌載芟又逢春戊牲肥酒香告䖍敢後祈榖夲意願大有年更祈神休福祉綿綿正初拜墓祝文竊惟善積餘慶德盛流芳祖宗之燾乎後既垂裕而愈昌後人之承乎前宜永久而不忘惟我髙祖與妣同蔵鬱鬱佳城數世相望前巨石之對峙嫓日月兮齊光子孫近乎百人迨九世而無疆嵗初拜掃厥有故常醪羞將誠明德薦香春社祝文時惟孟春雨露既濡履之怵惕逺焉是追恭惟祖宗流家徳厚子孫綿綿先訓克守實藉餘慶宅宅田田四時祭祀敢有不䖍享于克誠粢盛葷茹錫兹福祉春風和舉尚饗秋甞祝文匙翻白雪秋祭曰甞先祭後食獻豐年香恭惟祖宗締創已久子孫所殖先疇田畝殆無一飯非先所遺秋必甞新何敢忽諸啄黍鷄黄浮觴蟻綠永言無斁千秋儌福臘祭祝文古者嵗祀在冬曰烝士庶報本此尤匪輕祖宗積德以有今日謹身奉公何敢不力三時勤勞幸及嵗終隂相黙扶頼吾祖宗粢潔牲肥薦兹祀事無怠其始欽于嵗嵗藤溪社迎新祝文嵗且肇新禮宜謹始遵迎景貺仰藉神庥兹爾上辛用昭常祀牲酒既備詞祝謂何一嵗之内一鄉之中願無水旱無蟲螟而農事以登無灾沴無疾疫而户口以寕俾畜而繁俾求而遂俾謀而成俾作而利俾㓜而慧俾學而明俾士而逹俾祿而夀俾閨門之怡怡俾族黨之秩秩俾子孫之䋲䋲俾福嘏之穣穣而神其長享定宇集卷十四
