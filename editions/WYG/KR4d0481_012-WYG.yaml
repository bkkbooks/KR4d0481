body:
  text: 定宇集卷十二元陳櫟撰記銘贊賦謙齋記謙之象見於易謙之說見於書伏羲畫卦於艮下坤上名之曰謙未有辭也人未知謙之益也伯益賛於禹曰滿招損謙受益時乃天道雖非論易謙之益明於此文王為彖辭始曰謙亨周公為爻辭始於謙上三爻皆吉利餘六十三卦則六爻未有純吉利而不凶悔吝者夫子為彖傳始曰天道虧盈而益謙純用伯益之辭之意不過以虧代損以盈代滿而謙之益於是大明謂非祖書之說以賛易之象可乎同邑謝君益字謙甫儒家稚弟以儒習吏退食燕坐之書室扁曰謙謁記於余余辭謝久之請不懈則諗之曰謙之理具見易與書中先儒發明無餘藴何用後學重下註脚君其書伏羲之卦伯益之贊於齋壁而潛心焉漢名卿自酇侯而下多由吏進身君能心謙之理而充之無一念不謙無一事不謙今日之習為吏謙之卑而不可踰也他日之由吏以進身謙之尊而光也全受謙之亨吉利而無他卦爻凶悔吝受益孰大於是謙人道也益謙天道也人道盡天道見矣謙甫以此為予之言乎非也予聞之先儒先儒聞之伏羲伯益文王周公孔子伏羲伯益文王周公孔子聞之天養心堂記養心之義於軻書屢見養心二字於寡欲章特見周子究極孟子所未言至矣婺源王君澤逺揭二字扁其堂寄聲徴記於予予學素昧重以存菴胡公之言敢不勉為之言竊謂寡之又寡以至於無周子不欲學者僅至寡欲而止故以大賢以上之無欲望之無欲故靜尚包涵説無欲則靜虚動直遂究極説非可泛責之學者也孟子欲學者之養心必自寡欲始故以寡欲而心存望之存即養也心為性之郛郭欲為心之蟊賊養心不自寡欲始不可也孟子本章辭不待贅竊謂寡欲養心在大學属誠意正心盡心知性在大學属致知格物非知性盡心以致其知誤認人欲為天理者有矣其於欲也雖欲勉強以寡之東窒而西流朝薙而暮茁求寡其欲戞戞乎其難哉必知性盡心以致其知則見善既明用心必剛更加誠意正心之功庻㡬欲可得而寡矣勉勉循循而不自已寡之又寡以至於無未必不由此而進者㸃雪不容於紅爐氷澌自釋於旭日非寡焉而猶留其根也蟬脱人欲之私春融天理之妙是心也始焉操之而後存今焉不待操而自存矣堂不在堂此心即堂升髙明正大之堂入藴奥精深之室是由孟之寡進周之無於以養心其至矣乎既以復王君且以自勵云朝陽樓記朝陽樓子西金侯之所創也其先君子桐岡公捐館之一月侯聞訃自江陵官所奔歸水陸三千里以十有一日而達又二月即其祖宅之東建為樓三層髙明宏敞不二三月竣事亟為之者何承先志也其名若何標先字也祖居西澗澗之東可一樓其地數十弓犬牙入隣壤樓㡬無地起兩世數十稔欲之未得侯以大義交相感樓址甫完書所云考作室厥子構者此樓之所創也朝陽之云見於卷阿桐岡公字實本諸此自雅號熟齒頰字鮮克知樓巋然宅東大明東升樓先受日公之音容日逺日忘登斯樓也旦旦寅賓思親而不得見見朝陽如見其親焉揭而彰之示不忘親此樓之所名也澗之西瀕澗舊有亭侯鼎新之夾澗有梅益増植之取其尊先大父主簿公之舊扁曰春先者扁之主簿公遊國學登上第春先事業受用未盡標以遺後之人侯不忘祖訓復揭以期子姪朝陽之樓不忘父也春先之亭不忘祖也雖一樓一亭而倫紀關焉斯亭一澗隔之欲登樓由宅門度夀安之橋不翅百舉步始克蔇乃横一橋屋其上為舟形以通之扁曰横舟雖狀形紀實亦不無意云等慈菴記休寧於新安為縣縣之南有黄原原有等慈菴菴之僧有碧菴上人永寧以其出倫紀人而其事關倫紀可尚也已菴肇基唐貞觀間實臨溪方興寺支流久為祝聖道塲燈燈相傳宗風克振今菴主心菴潛上人碧菴師也碧菴出率溪何氏先世宗博公昂為時名卿其後仕者相踵父原清文學世其家享年六十有二母程氏合美嫓德享年八十有四碧菴生官宦儒家十有三嵗出家等慈二十六而祝髪附方興南院籍身出家心不忘家也葛藟之本根蓼莪之生育切切於衷苦心劬躬銖累分積買田十畝以兄次子本中純孝嗜學可託也祝之收所入永為烝嘗資又買田入菴之常住囑其徒為奉先世祀畝數亦如之僧俗表裏相交期為悠久其用心亦宻矣自大徳九年秋九月肇此謀至十年春正官有㫖僧續置田土許歸併元籍中甫克立文册謂竞其志詎知事有不然志猶未竟延祐元年春閏三月不戒於火庵燼焉二年夏午檀施重構規模視前益崇以敞衆緣所不逮倒鉢囊足之又自建鐘樓於門之東偏妥何氏神主其下前所云嘱其徒為奉先者始有定所又懼久而易冺也将鑱之石而属筆於予奉先之田皆詳諸碑隂庻竟其志吁其用心亦逺矣予竊謂凢佛所宫一是皆祝萬夀為本尊君也君身所自立也鮮聞以報親為務如碧菴者親身所自出也謂事關倫紀非與此固儒家説也而實亦佛家説按四十二章經有人事天地神祗不如孝其親二親最神也㫖哉言乎儒佛有異教教以孝無二理天典民彜人孰外哉然不於他寺若菴乎見惟見諸等慈何以故碧菴儒家子故耳昔墨者􅆥之􅌾其親厚孟氏質之引儒道以對先儒謂其援儒而入于墨予謂非儒家子濡染倫紀之教不能因􅇘而通於儒碧菴何宗博之裔其墨名儒行也亦宜予故曰以出倫紀人而事關倫紀可尚不可尚哉表而出之非徒為學佛者勸亦使儒名墨行者媿矣事勒堅珉世謂不朽然石可泐碑可仆其文章不可磨文豈不夀于石矣乎若予者非老于文學且自棄於時其能壽於石以垂不朽乎抑昔東坡與維琳同生寄之詩曰與君皆丙子今予於碧庵有劉白同壬子之宿緣此遂不復辭云延祐五年六月十日星洲寺記星洲寺以地名名寺也溪南涯數鉅石怪竒突兀旱不趾露漲不頂漫寺門靣之相距約百舉武嘗聞地之石天之星也證之春秋傳邵子説地理書靡不合金華仙之詩尤切曰星宫著地化為寳坊是也今寺獨擅此勝非得地歟寺始創於唐太宗貞觀十年丙申立公開山僧也三代而下最稱太平未有及貞觀者此寺之建首逢此時非得時歟始建迄今六百八十有九年嗣而堂構代不乏人寺僧一榮自咸淳癸酉祝髪劬躬節用為寺出力三門寢堂土地神祠鼎新為之佛殿鐘樓則蠱壊而葺之他如塑繪圬鏝鑿築甃砌等殆不勝書亦既完美延祐甲寅不幸燬於火僅存藏殿寢堂又能硬着脊梁心弗退轉經始于乙夘陸續於累年佛殿重營厥費頗夥倒已囊鬻已田用潰于成塑像制噐種種漸備用鈔以錠者千計持鉢所獲者居什之一其徒大椿則創鐘樓永慶則創齋㕔皆與有勞焉所未有為者亦既䂓度且将不愆於素今夫千金子萬石君世豈無之一再傳之或三四傳王承福不免歎為􅇕則李師道欲贖其所質矣今寺隨燬隨創金地清凈木天髙明赫奕如昨何以故有人如榮公與其徒者乎非得人歟昔温彦愽與馬周俱告太宗曰願常如貞觀初則善矣易曰神而明之存乎其人有人焉則地以人重時以人来苟非其人地由是弗興恐不免鐵爐歩之嘆矣榮公紹徃開来燈燈相賞常得其人則此寺常如貞觀初豈非善之善者乎又况寺将崇成國家改元方新重逢今之泰定即如初逢古之貞觀也榮公将匹休立公焉抑榮公所可書又不止是撥已田若干畝入常住贍其徒詳於碑隂慈也榮公本藏溪汪氏二親􅌾長干創屋一區于墓傍近墓田亦若干畝屋則徃來居之他日付其徒繼居焉又孝也孝于其親亦四十二章經所教也事關倫紀尤所宜書予㓜家五城經寺門望茶烟絫矣今委紀之倘續後游償金華仙晝吟山入座之願庻不為寺中生客榮公者叢林老宿嘗為都綱云睂夀菴記歙石門靜軒吾宗也構菴於所擬壽藏許扁曰睂夀述生平大概得吉始末徴記於予予櫽括潤色書之公㓜嗜學長益淹該亶為克紹箕裘歴江湖持門户露宿風餐鮮有寧日宜其蠱裕先疇鼎新石庫増鄉閭壯觀望粹珪璋氣凌雲霓胡可涯涘乃能鍳老氏知足知止之戒超出世之沉溺不休者其於先世窆事孜孜不能怠固異乎漫不警省者庸術是聽而但苟簡尤異乎覬覦榮達者膚學隂陽而墮因循天誘其衷地呈其寳祖若考若妣之吉兆壹是逢之不寧惟是公配程氏嫓德偕老亦預獲擬藏雙劍之所于戴邨流抱峙環朝揖天造雖獻者名術相實自天何以證之公效傅修期司空表聖自營繭室由經始迄就緒動罔不吉此豈偶然哉諏所以名菴之義則曰天其鍳我夫婦方寸契造化而錫以齊睂朋夀乎按詩曰睂夀以表夀証今取其辭異其義此公所願也又以田三百而贏永入菴中贍守菴人戒子孫無違辭併詳田畝勒碑隂此公所慮也予謂公仁孝人也仁莫大於愛親孝莫大於襄事以報親公於祖考妣允為仁孝之子孫天必生仁孝人以為公子孫此理昭昭可信不誣公所心得躬行子孫将是則是效謹守先業又可大焉公夫若婦齊睂朋夀此福之在其身者佳城之應如羊叔子之登三事陶士衡之督八州此福之在子孫者不待必之天而必之此心之天朱子曰天即理也以理知天公之所願必遂其所慮者必無心即天也天豈逺哉公名一德靜軒號也又號梅忩生前丙辰今年六十有五配生前庚申今年六十有一其夀方隆未艾云洪氏閒雲堂銘水泉雨雲坎象所共雲為雨體雨為雲用未雨之雲似閒非閒既雨之雲閒也真閒出雲降雨學非忘世雨齊雲歸學非狥世君雲其心坐閒雲堂休時閒閒與雲行藏書燈銘義所讀書檠令予銘之因書其罩銘曰雪平跧牕月仄踞屋昔人無燈如許勤讀今我有燈篝幕熒熒不􅂋其光用晦而明非雪而炤不月而曜陋彼囊螢徒千其爝敢有不勤籟沉更深燭奸雄膽洞聖賢心家傳祖硯銘族姪孫贊子襄捧其髙祖十九省元所留付佳硯求予銘謹序而銘之吾祖通判公以詩經擢鄉舉官終三山倅貢元公公其親弟也亦以是經冠鄉舉復會諸侯于東都至駕言徂東之題其文至今膾炙人口所謂自東其駕以東諸侯之駕者謂之絶妙好辭非歟将赴南宫不幸賫志以逝平生用一龍尾佳硯東坡所謂無田食硯者用之不盡留以遺後之人有二曽孫學紹祖鉢文傳祖燈迨其𤣥孫亦好學不倦猗歟美哉食硯田而不墜有能四五傳而䋲䋲者豈非世之所鮮有乎余甚嘉之言之不足申之以銘銘曰無田食硯東坡有云髙祖一硯五世所珍學鉢文燈䋲䋲善繼永言寳之欽于世世敏齋銘三衢徐南塘登楊龜山之門番陽明善程公實師之星源王拙齋登朱文公之門明善之孫可菴實師之今敏齋君名時敏以敏名齋者明善之六世孫可菴之曽孫也父雲巖以數名儒之後志道據徳依仁而遊於藝精工醫術敏齋繼之儒家閥閲穹崇如是誰能或之先以儒飾醫匪業岐黄之術而已世居饒德興之程邨雲巖始遷婺之中平敏齋今寓歙城予未之識族姪實卿與之稔轉為求予一言録示董盤澗所為明善堂銘且云斯堂也程去華實記之予於諸公師友淵源聞之久矣遂為作敏齋銘云程朱之學上泝孔孟南塘拙齋其傳也正敏齋之先實師徐王儒學承承累世昭彰雲巖繼之志道游藝迨至敏齋匪專方技六經學字始見傅岩遜敏與懐三義相參學自遜入濟之以敏豈徒謙退汲汲勉進勤敏不已允懐不失修者乃來來者乃積顔實若虚進未見止拳拳服膺脗合乎此豈惟儒學醫學亦然真積力久藝宜精專匪直良醫可逹良相以敏啟沃時來毋譲處善齋銘邑居劉長卿以處善齋記文等求予文予閲之有張士元一記儘平正略云善之所在先知所擇而後安所處知行之學自有次第紫陽闕里講貫已熟劉君于行處用力不患不知所擇矣余不復架屋上之屋也餘皆閒言語緊要只此十數句而已餘人之作皆可無也余為作一銘銘曰安于處善天人䇿語先師語註亦嘗採取善雖本性未易審處處且未易安尤難遽處之云乎止而不去不先明善善在何許明善伊何必自學始學以明善見善明矣擇善處焉故士得已居之而安純熟方爾元善之長曰仁是已終當處仁為安宅主明善其初處仁而止處善而仁善斯純至處仁而安希聖地位忠愛長卿諛吾所止作此銘詩卿其朂只族譜贊九族之云昉於堯典釋者謂父族四母族三妻族二歐陽文忠取斯説朱子韙之昔齊晏子不隠君之賜固猶是也世之譜族尚矣未聞兼譜異姓之親今伯英為髙曾世譜而解呉王三氏皆有記焉其惇九族厚彜倫之義尤篤敬為贊禹疆徐州姬祚徐土族蕃括蒼班班綬組哲人伊何錢塘歙浦觀光用賓奉母視女月溪令子曰伯英甫學紹箕裘筮仕孔膴養終者代敬宗尊祖自流泝源江淛修阻昭穆益遼塗人胥覩取則歐蘓聿親乘譜次圗懿親若姑若母卓哉伯英親仁好古九族義明由兹惇叙奕奕雲仍繼志䋲武拭目華編豈云小補畵馬贊驄青其質龍文在脊匪渥洼産胡爾神特冠帯緋衣懿何人斯靿履揭裳徐引長覊豈伊僕臣職典天廏馭馬千里敬供萬夀龍馬不世良御應星妙寫天真何代丹青孤竹贊見墨竹二軸其一孤竹上有贊云睂山老人題孤竹君其一雙竹上有題云清獻公雙竹吟因和其韻竹竹孤竹國君此其遺族獨立亭亭與誰同緑龍想單吟鳯難雙宿應契特立獨行者之心不動羣趨旅進者之目千畝不見其有餘一竿不見其不足竹竹似魯狷士不見親厚之凉凉如衛君子斐然有文之郁郁月來影自伴琅玕風至聲能戞珠玉特操何假于依附髙節了無所阿曲嗟彼朋邪之徒豈不有愧於孤竹宋彌章自號蓮舟贊異哉運乎生華峰頭飄十丈花為一葉舟廣平苖裔太一之儔帆無盡風泳餘波流吾道正派絽孟者周愛蓮誰同心今與侔身艘心柁聖涯是游由濓泝洙勿虗勿浮風月無邉穆穆颼颼良不偶然来從吾游頌中有規子領也不澄潭贊長汀聖公上人號澄潭今年夏五邂逅瞻其頂相惜怱怱未及交箭鋒機兹承寄聲需余為下一轉語思韓之于文暢栁之于浩初皆為下筆今亦何忍答以不語禪乎因為澄潭贊寄之贊曰傳燈要妙性海心源有澄斯潭淵淵其淵禪定有素湛然止水如珠在盤盤定珠慧澄不在潭而在心珠現水月中寂炤空虚惟千載心秋月寒水儒釋同處我聞朱子扇贊昔張無垢紙扇三年自誇其儉我将倍旃人無好事我無長錢一裘閲世可希此賢和不求人贊不求人贊曾大父唱之通判和之唱者不可得見矣幸得見和者而知曾大父之嘗為此贊也曾孫不肖想像先世意而僭補之癸亥十月初四日晡時疴癢切身倩誰搔之斵木為手具體依稀天賦風騷芒刺背貞一搔一快勝呼醜婦噫報落金􅁫兮截盛金盤思麻姑仙爪兮豈不利夫麻頑孰若此手兮木居士女借名李衡家兮木奴以命汝噫雖不求人兮未免求木奴之指孰若反掌以自搔兮君子求諸已和五六公不求人贊梓人揮斤刻木成指雖乏纎纎可侍君子搔我疴癢及我背膂爾力所至不仁者止我有㫖酒只可養氣我有詩書只可適志予美亡此誰侍巾櫛醜婦之功頼有爾耳爾予相親俾不求人無忝名義婺源李復初字贊婺源李復初兄館寓頗相近淳雅可敬然過從亦疎丁未冬十月晦來言别索字説甚勤予念坡頴名説老泉自為之晦菴冠子祝辭屏山為之非父非師誰其僭之敢請益堅予曰説之不可也贊之可贊之曰人同此性性同此初性者安焉奚以復為聖降而賢復焉不免復之奚在曰在明善明善属知復之属行舜曰精一思曰明誠聖門善復莫如顔子不逺之復能復于禮孔博以文知之于先又約以禮行之次焉以復其初至於亞聖沙澄水清塵磨鏡净復初學顔亦顔之徒入百聖域守三字符庭芳字贊戴兄蘭字庭芳雲坡公之曾孫震齋公之孫杞山公之子好學不倦翩翩佳公子也嘗從予遊屢以其字求説竊謂名二子説老泉為之文公冠子祝辭屏山為之予不欲僭以贊易説辭美之之中寓勉之之意云騷集衆芳首蘭是稱晉人謂蘭宜生階庭託根幽深無人自媚欲秘其香風不汝秘根培愈固芽茁愈萌培根安在重席帯經揚於王庭自家庭始侍中裔孫流芳無已程與京草蟲手巻贊草卉昆蟲造化生成精微竒妙豈力所能一以貫之實大巧流行爰有良工妙奪造化若艸若蟲逼眞非畫小巧云乎哉天機呈寳無價體仁主人手卷横陳能事擅塲出戴子淡雲雲行無心淡然任天眞偶泄天巧不彫琢謝鋤耘采芣苢菁莪在中沚芥菜方紫納須彌待其子矍麥亦著花亶謂四美蝶洵有情蜂如有聲雍容閒雅可尚乎蜻蜓蜥蜴昂首若寄奴所驚蚱蜢折臂蛾子臘遇之将舁以行我聞周子庭艸交翠觀生物氣象謂同自家意思張子厚聞驢鳴亦謂如此又聞詩家以畫為真今諸艸諸蟲生意津津勿微小視之囿大化無垠體仁主人一披翫之養胷中生物之仁夏君文藁贊文氣所形尤貫道噐氣信豪放道更精詣集義生氣氣配道義道氣合一文響天地風雩亭賦判縣先生創風雩亭𢎞齋曹先生記之至矣盡矣然昔張宣公風雩亭詞之餘意猶有可言者里晚學陳櫟敢發宣公未盡言之藴而賦之雲屋趙公風雩有亭家世琴鶴其風最清不此焉以為足上泝沂水之曽慕彼舞雩之風適樂意之舂容觀㸃也之所懐與三子兮不同龍見而雩壇壝聿崇爰有茂樹䕃蔚可䝉當春和氣風景恬融見天理之流行欲無芥乎其中風來自天風之者人淡蕩適至偶披其襟風此春風宇宙吾心宜聖師之所與獨喟然其賞音㸃也雖狂其心不泯春風無窮千古常新坐風雩以乘風諒何古兮何今大儒先生椽筆作記窮深發微巳詣其至今復賦之毋乃或贅辨不厭明敢獻所疑㸃之見處深契聖師行有不掩以狂獲譏既曰與之曷又狂之始超出于由求卒僅儕于牧皮昔子張子已慮及兹初新岳麓之亭特繫風雩之詞謂尋㸃心之所造當究顔氏之深工防外誘務敬恭浸私意之脱落斯樂意之内充今究顔氏深又安在非在乎他克已復禮㸃見處之雖髙惜行處之未實使徒慕其氣象而未知所用力寧不荒于過髙致有體而用虚必以克復之學補曾㸃之所無克去已私復乎天理匪徒見此地位必實致其踐履倘私欲之蟬蜕得春融乎理趣迨顔樂之不改庶風雩之無弊惟雲屋公卓哉先覺豈惟風曽㸃之風葢以樂顔子之樂亭扁翠侍克己睎顔翠不于其蛾于其山侍不于其人于其巒不復陽臺云夢興入蒼翠之間已克兮禮復欲净兮理純儼儀刑之相對為樂山静夀之仁人吹面而受和風披予襟兮欣欣臨風雩兮長嘯如唳鶴而鼓琴木貓賦惟木貓之為噐兮非有取于象形設機械以得䑕兮配貓功而借名諒哉貓之字䝉貴兮實依人以寢處豈貓之偏可愛兮見䑕之深可怒䑕罪不可勝數兮大罪在害夫吾書聖賢所以心天地命生民兮多噬嚼而無餘外嚙衣與毁噐兮并穴倉而盗肉難僂指以盡其惡兮惟良貓漸可殱其族奈良貓毎難畜兮食不可以無魚或鈍庸而不捕兮遂謀設夫穽機外匣板以四周兮柱雙峙而梁横懸重木其若砧兮下簞盛夫羶腥妙在分釐梗之活繫兮微有觸而轟擊䑕行而冒入兮危機動而微命畢聞響而再設兮或一夕獲禽之三四䇿竒勲其若兹兮名木貓其奚慚然我以機心為彼械兮彼亦因機械而觸夫機心海鷗之閒雅而防猶深豈黠䑕之不能初用之多中兮再三用之則否毋乃指禍穽以相告語兮儘機張而餌誘木砧暮懸而詰朝兮羣黠跳梁于外而不入其中得非機械之有窮兮豈若良貓之有常功或者因貓之難畜兮遂抑貓而揚此使木之貓果能盡用兮則貓可以盡死患彼不捕之罷鈍兮豈不可易夫銜蟬譬之因望庸人之失職兮乃遂併衆君子而舎旃也耶梅花主人賦古舒牧伯耶律相公禀受間氣生于遼東鴨綠平壤地靈所鍾期梁棟乎宇宙榜一軒兮以松松之所友允矣梅花以髯龍之欎鬰盟玉葩之横斜與素兄為主人免其覊孤於天涯搜清吟之千首盡發舒其英華梅見詩書實焉是取公取其花豈同兒女惟此梅之嘉實與商鼎以和羮何以有雨肥之紅綻花乃實之所由生三冬閉塞萬木韜精獨此花之先春耿氷雪而惟馨似君子之特立殊弱植之彫零公取其花乃待其實豈作牧之能奄行作相而爰立森萬松于軒外棟明堂而當屹摘梅實以調鼎葢權輿于今日斂大惠於一州豈獨私乎舒民寄語灊岳與皖公汝安能久留此梅花之主人春先亭賦溪山種德與梅俱深亭扁春先延佇清吟吟不足而酣賞炤疎影以頻斟陋茅亭兮儀曹嫓蘭亭兮山隂有善繼之賢孫念太父之手植毎見此而敬恭忍等之於枯枿冀紅葩之有實取白賁之無色儼若靣乎公槐匪直同于卿棘一枝具一乾坤陽動根于太極慨彼有唐㡬昧履霜貌肖蓮花惟愛六郎豈知愛梅臨風一齅廣平一賦不㤀者夀年方廿五秀發華滋見已卓然挺特不疑陪立樹花厭厭醉夜笑彼江總何哉僕射尚此孤根陽囘凝閉偶㸃宫額豈屑街髻見魏徴兮嫵媚鄙令德兮温柔宜曉角之悲壯任吹笛於髙樓當髙齋之索笑異成蹊之不言仁權輿于微酸認生意之存存玉堂何喜竹籬何怒貫榮悴于一視恬窮達而默悟玉質兮盼倩逺違兮鶯燕日遶樹兮十廻朝廵簷兮百遍暨作相於開元搜杞梓與棫柞鼎和傅説之羮籠儲梁公之藥贊化調元燠寒時若接詔使而談默辭璫宴而疾託儼如斯梅隆冬不痿力能斡乎造化香不隨乎變衰衆木方槁横枝獨妍早占魁于春規忘司冬之執權特立萬物之表覺在羣䝉之先嗟襲美之與元輿賦艶葩之啾喧豈若公之賦梅大音希聲而鳴自然之天刻之屏間妙擅竒絶廊廟之姿豈淹巖穴振七葉之貂蟬將主知之早結觀我尚之如斯不愧文貞公之節既増光於大父尤景行乎先哲想後山翁神遊而喜之曰子孫德輿萬物氣吐實與梅兮同素相時來兮則奠皇圖於鞏固大禹惜寸隂賦昔者聞之乾道行健一息萬里君子法乾自強不已自古列聖㒺有不勤堯兢兢舜業業所以為聖人舜之稱禹以克勤于邦耳克勤于邦之實尚且惜乎寸隂惟聖希天固自強以法行健之運惟賢希聖所以有惜乎分隂之心賢哉陶侃孳孳不息以勤自勵朝暮運甓俯視寸隂之移寳有同于尺壁紛紛學者不知自惜惜青春之不再忍悠悠度夫白日嗟夫視寸隂而猶競此聖人之所以益聖等光隂之隙駒此愚人之所以益愚黄山堂賦維大好之山水昔專美於新安大好中之尤者孰有大于黄山峙古歙之西北髙戞日而摩天四千仭之蒼翠三十六之峰巒上峻極之絶顛下無底之深潭既白懸于布水亦紅盎于砂泉信山靈之都㑹嘗此煉乎神丹峰標名之各異事稽迹而猶存曰容成與浮丘更昭揭夫軒轅竒名六六之内此鼎立而為三黄帝二仙以嘗游宜姓山以黄而永傳欲識山之眞靣目奚必親履夫巉巖凡宦遊于此邦惟閒眺而遐觀擇郡治之勝地搆髙堂之數間納逺翠於軒楹數天際之烟鬟凭闌干而俛仰若再生于雲端自清濁之既判何山不屹于人寰孰以此山當三皇之世来神聖之躋攀繇皇而帝與王覇孰能廻世運之濤瀾睠新安之古郡欲醇古而弗諠鮮嚚訟之珥筆多岌嶪其儒冠以靜重而涖之将臥治兮非難惟字民之良牧又觀風之大賢登斯堂而送目見太古之山如見太古之人焉彼盖公之明黄老猶避堂見舎於曹參何如黄山之在望常若挹黄帝與羣仙法黄山之作鎮仁心靜而常淳涵法黄山之興雲仁潭霈而蘓惸鰥儼威刑之靜對送萬古以無言存古意於胷中心見山而常安噫嘻降古而今時固為之返今而古理可固然嘗望黄山而無愧于黄帝坐見太古淳風之挽還漢林賦予聞周南之詠六州王矣乎德化有源修身刑家厥所廣及江漢之涯宜廣漢之詩人必推廣而讚美謂德廣之所及能感化乎遊子世有豪傑之士雖無文王猶興苟欲適乎正道何可外文德之純文所以文純亦不已德廣所及其用兮之德之純其本體維南兮喬木德化兮膏沐喬木分參天森森兮林麓豈果漢濱之木眞寒緑成林自有不林之林兮種德末茂而根深彼儒林與書林非眞林木之可見矣所種之林林兮蔚盛德之符騐呉君本市隠兮當蹔焉而山棲今又舎山棲而市隠兮此林隨此身之所之十年計種以木兮百年計種之以德德愈廣而林愈茂兮身所至即江漢之域燕山八景賦粤自昔之京師稱為衆大之區今大業之覆燾亶亙古之所無建皇都于燕山信廣大而超卓稽載籍之所傳跨亳殷與京洛仰景致之佳絶殫泓頴而難窮味綺名之有八恍莫措其形容仙凡隔于苑墻邃深而瓊其島天未縱夫春陽花命長而鮮好池雖仍于古稱木蕖艶其佳色與景秋而最宜凉颸生夫粼碧瀦為瓊玉之漿㡬萬斛之珠滴嵗釀萬夀之觴横晴江之下垂愛一壺之天成金知出于誰鑄待夕陽之炤出色黄明而自媚山屹峙于兌方席花種而崢嶸市烘黄綿之襖夭現白玉之屏津趙北與燕南鷄呼兎而澄澈銀螮蝀之髙臥玉狻猊其如活軒轅裔之薊封雨飛門而河翻妙勝廬阜之瀑高出龍門之灘史嘗紀夫居庸名列三關之一山雖皴而萬疊翠欲滴于一色是為八景之略愧其詳之未知彼瀟湘與鳯翔亦人題之昭如兹偏方兮下國何皇都之足齒中涵葢其無極豈八景而但已山水自于西北景清淑之所鍾地廣漠而深厚極域闕之宏崇合官府兮市里暨民物之富庶孰非可觀之景顧觀光之猶未將究極而論之曰在徳不在景山川以人而重徳與景而悠永亳殷京洛之區今視昔而依然謂愚言之不信何一盛而莫肩如宋玊想像夫髙唐蘇子親見夫處境雖鋪張恐渉于虚無知初詠未得其要領也定宇集卷十二
