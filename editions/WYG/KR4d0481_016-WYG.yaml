body:
  text: 定宇集卷十六元陳櫟撰五言古自咏百七十韻祖宗世種德生我異羣兒憶當五歳前教者祖父慈未識蒙孝字先誦蒙孝辭詹兄曰梅哥厥母吾母姨先父加之冠專為脩百芝句讀熟魯論徹章葢冬初冬仲大父殁舅翁弔繐帷愛我撫我頂聽我誦學而琅琅盡鄉黨繼誦尚忘疲舅翁謂之止稱是天上麒六歳所從怪飯罷出遊嬉謂我頑如石不教專扑笞七歳侍先父三載臨溪湄辛酉從仲黄五月學破題進進待解盟小冒漸能為壬戌至甲子隨侍東復西詹溪友四程英才推一時幸甚相切磋愛我深相期臞山謂有子延我為塾師初聞賦戲言馬耳東風吹先父習麟經授我孔壁書謂徽後洙泗四書教令披丙寅年十五遽為饑所驅束書團圓山童生八人隨孜孜不敢怠夜檠逮鳴鷄次年館湖干老稚荷提撕請題草忩翁許我文鮮疵朱書勉精㸔程文教力追是年槐花黄祖母服未除先父不及試族叔同旅厨一筆了三塲不遭曳白譏庚午亦失解鋭氣能不萎故鄉處族館族弟汗血駒麗澤用其名先登蝥弧麾四經巻巻悉清言書巍巍鉅公汪溪陽文衡省監持氣象許宏濶辭意稱豐腴謂雖在廣場亦當先列龜此文與此批見者誰敢非自此有餘力書外兼寄詩小敵見必勇輩儕避旌徽癸酉書題難立説及者希考官勾龍户勾龍震子一批擬指予清才不易得斷題無可疑但分前後聖不合襲省闈次年赴混補萬人塲並馳二十三後生難得人信諸吳君託以巻日中文摠摛非此三百緡何以贍其歸壁流既問津謂将濶步趨豈意三百年科目止於斯屠龍成無用躍鳳蔚何施昨雖舉業習畢力不在兹古文壮氣骨性理窮淵㣲乙亥館江潭諸友交見推刺口讒吟哦閧如喧蜜脾我獨黙其間抱葉寒蟬如不屑涉淺流尋源浩無涯風雅騷選降唐宋星秋輝凡諸大家數一一加嚌嚅然詩有别才天分終較卑經膏與理髓聖賢示我規精力詩中盡母乃一生癡心不能兩重此昂彼必低定見下退轉江潭而詹溪臞山踐前言聘幣及吾廬所幸有子姪皆有受道資一坐閲八年膠漆久不渝藉其綱維力數畝買山畬惟此八年中哭父衰厥衣終喪采泮芹泮師林岩居其人數傲睨見我加稱譽月書季考文許我白衆睂以啟䞇兩馮交答壎應箎繼此諸教官見待略等􅆥殿謁不我責羮墻見宣尼辛卯客梧山一紀方别栖厄哉館渠口書衣焚無餘壬子否欲泰燠身陽岡曦甲寅科詔頒鳶魚均躍飛科停四十年壮晳已老黧行年六十二可喜亦可吁甲戌别西湖一舫重漣漪簪筆漫入塲誰識兀孤羆已過田光年老醜亦如之理精文亦熟執餅啜茗甆游戲日中了跳出門限危吾友謂必中不答笑支頤歸過菊節後風傳鶚横颸是時未揭曉無乃鬼揶揄既而果爾中厠我濫吹竽一朝省檄下初欲推病軀勸駕者張侯自枉五馬車敦請上長林急下亦筍輿下馬握手語滿面春熙熙次日燕之泮禮意逾勤渠刻日再詣府歸辦衣糧齎豈謂不後先主有鼔盆悲行無或使者止泥莫陽機筍輿官給送杭解姑委蛇謀之鄧與王鄧善之司業王誠甫書吏云子退何居進難退奚難稱病告録司坊正騐然否執牒還鄉閭一一如所教衆人皆笑􅅓同榜有六人買舟浮泗沂二黄林盧王張子最後期五人恬是我平山獨嗟咨謂公機難逢自棄與人殊彼如翔雲鴻我如墮泥鴟作序送之行命兒餞解維得者惟黄張失亦恩不虚我倘與此試一得如摘髭萬一或失焉横經亦臯比然亦何足恨一笑返釣磯念彼得馬者箠辱臋無肌何如天爵尊玉返避湼緇青紫耀目前老矣竟何裨退無治生計耕經培根基丹鉛畢此生初志酬桑榆糠糜從自飫道義甘前肥詩非吾所長世自有人竒亦嘗印老方属和枯蒙嘘謂讀陳君作如見上天梯和公上南行選刋尾瓊琚方公上南行詩予嘗和寄𢎞齋𢎞齋逹之方公公選五首附刋于集吳甥伸文曽見刋本亦如岑髙作得附杜拾遺終焉小剞劂巨刄自有宜朱書天地心泝洙沿濂伊顯固日行天奥難氷釋澌坊本纂諸家動是醇雜醨後生為所衒望洋入無蹊不用聖賢力天大難井窺不用朱子力海深測以蠡十五已勵志熟誦精思維鑽研五十年熟考洞毫釐不獲一時用遂欲百世垂四書精發明妙處繭抽絲如舉標月指出彼黒暗迷纂疏蔡書傳饒董編區區厥子以委我搜羅加補苴成書付之刻謬妄刪支離附益諸異説秋蘭著薋葹四海有具眼喜想繼以嘻樂善胡雙湖愛我志朱愚我有廣通略史纂蒙摘竒宋略摘最多亦欠如貫珠此外所編述盈箱困毛錐詩記皆句釋記尤其思攄十翼與四傳二經究麟羲近撮六典要略如孔孟姬嘗以夜繼晷古文圏㸃批杜詩亦冩註鑿鑿皆有稽吳某借不還執以為已私五子節註評散落無依稀四書與書記羣玉之璠璵三者倘行世豈曰小補與無力可辦此有力将投誰生者不我重殁也應我思朽骨相後人東坡豈吾欺知更幾寒暑了却老頭皮間氣更誰鍾我亦自惜之當為百世士何但今布韋骨朽此心傳腐寧草木俱從彼啄腐䑕舉頭嚇鵷雛年忽及先聖七十加二朞使其止于此藉手見先儒使不止於此天錫何敢辭三山林樂天談命當杭衢許我八十六此言倘契繻教有最㓜孫亦當挺梧枝到此反其真大笑與世違上白湛淵提學名珽字廷玉東坡慕香山今古不並世幸今遭人師演迤香山裔湛乎靚深淵淵深漾㣲瀾匪直紹長慶殆将登社壇豈曰詩中傑道脉紹先哲手提斯文柄模範示江浙侯泮幾芹宫邑校幾花封書院又凡幾於公綂有宗卓哉儒宗主非公誰玉汝教雨而豈徒行将霈霖雨次馮秀石遊水西詩韻人生無東西所歴貴適志辦與客遊山便是仙行地謫仙所經過景物猶嫵媚壤壤為利往寂寂誰肯至蜀珍非九流水西亦名寺人景盡雙清古今端一致文取意氣合年忘少長異詩愛索髙古理窟探幽䆳麈尾屑霏㣲兎絲墨漸漬諸友武庫森一老靈光巋戰㤀大敵勇見匪小巫懦安知馮長公非即李十二快飲頻張頤髙吟時擁鼻鍛鍊指獨敲曠望足雙企汲古綆垂深抽闗鑰開閟如聽簫韶鳳肯比蘭苕翠于時桐始花纔社秧半蒔幽尋客正閒勤動農将勩花光目懶寓松隂身所庇山僧氣如玉野樵色俱瘁倦坐席或爭佯入舍肯避茶甌時復啜困魔詎能祟飽遊可無詩分韻各有字是則摩詰畫何必栁州記我雖慙曽唯亦頗發顔喟朗誦敢辭頻把玩不忍置實多句中眼兼審象外意靜閲神已馳忘言必有醉僭和白雪調難抽亂雲思恨不尾清遊吟成祗自愧和方虚谷上南行十二首虚翁上南行實庚寅十二月詩也辛卯六月客有自曹君菊存所來者始傳而誦之絮羮久要之義聚星過從之勝漢人不得專美於前矣雖恨不獲親聆其一時談麈之詳然聞風興起亦可於此詩具姟兆之一二焉二三先生中某所識者惟北山王先生兹敢不揣愚陋僭􅆳元韻賦一十二首寫其平生景慕之私奉呈王先生或可以轉聞於方曹二先生云濟世萬古航乃今横野渡由此訪故人勝著沙隄步我傳紀行作冠珮與􅅔露何當叅詩禪一澾石頭路右古航渡又過分流岑行行足聊休流品分良難感此胡分流大雅久不作梁棟儕薪槱蜩鳩笑鵾鵬一是逍遥遊右分流嶺南山得宣平名字可千載世無死仙人花瓢今定在家山有此逢何必跨瀛海下視白雲衣蒼狗須臾改右過南山疇昔飲雙橋獨木寛法程如今過雙橋無復糟床聲橋外吏人稀飲徒常二更追詠承平事略此記西京右過雙橋舊官𣙜酒去城十里始飲村醪雙橋酒稍佳今復無有扁舟泛古航昔常閲此竒盤屈公詩中眼明再見之二孤恐飛來或乃巨靈移甚勿訛為姑又須訂荄兹箕子二孤右岑山渡杏花冨趙邨佳名昉唐代酣酣紅雨春芳葩誰不愛轉眼鐵爐步發問莫能對杏村無杏花趙村亦安在右過杏村坡覓牛矢路公渡牛矢嶺遂令汚穢地居然化清境今代曹子方陳三延癩頸何時躡吾履迢迢山路永右過牛矢嶺我未讀公詩久矣知葉有地非産此人人知此地否當與君子鄉俱傳千載後風饕閟春陽髙節且堅守右過葉有嶺和方虚谷二首後漢袁與楊世公五或四衮衣茍有愧不如安楚製我不識斯人聊復視其世不有此翁賢安得賢主器又天壤一虛叟見之夢寐中豈必真及門私淑恩何窮易説曉欞白詩編夜檠紅終然欠叅請小草依松風寄曹𢎞齋我不識𢎞齋識之文字間古風久蕭瑟一筆獨追還恨如東魯人未得登東山振衣不自勇路亦非阻艱寄王教授書堂名博士得見未恨晚發揮紫陽論登峰造其巘仕得四十强程方九萬逺北山勿移文秋桂芳風遣送汪希道入都并引浮溪逺孫汪希道嘗為海北海南道亷訪司照磨沿檄鞫洞蠻獄察註陷賊黨者千七百餘人直其枉悉縱之幾以失出獲譴阻仕進餘十年今本心雖獲辨明而歳月坐成晚矣抑又聞之古人一日養不以三公換希道家貧親老以八十餘歳之夀母將待栁下小官之寸禄以養之今將犯寒暑走萬里以求之豈得已哉司銓衡之諸貴人仁也明也公也必將鑒君之本心憐君之不得已君之得除得歸也有日矣臨别哦古詩十八韻以餞行行觸秋暑勇往觀國光脩途或濡滯一瞬北風凉不仕餘十年養親竈罕煬将謁吏部選寸禄願少償庶略助甘㫖贖其不遑将不仕果何因憲幕嘗翺翔驅馳海北南訊獄主慈祥詿誤陷賊黨詰問加精詳活千七百人解縱還善良幾以失出譴究竟靡濫臧久之天日開歳月坐荒荒濂溪范參父議獄俱慨慷殺人求媚人母乃欺穹蒼活千人有封君後必當昌安得當吾世而不蒙薦揚當路願鑒之萱草癯北堂俾得早言歸為養及夀康臨期重叮嚀白雲遥在望次吳子靜韻惟深霜葉色偷韶風林聲借商秋清挾春熙君詩宜可方喚醒十年夢栩栩延陵鄉富貴來徐徐春秋去堂堂魯鄒二祖師身世猶遑遑吾道行何時魚目爭夜光次韻子靜破靴待漏靴滿霜履聲振雙闕行映火城紅不用掛殘月得意彼何人步雅視亦濶豈知失意者紏紏履霜葛君其但固窮祝阿迹将發破靴不須恥此恥㑹可刷朝靴三尺脚穏向雲梯躡聽履上星辰押班晨賀雪雙竹吟瑞竹非凡物猗猗超緑緑昔者清獻公家園有雙竹雙竹比兄弟永歌嘆不足因念世之人詡詡相笑逐誰似孔融讓誰似姜肱宿鴒原與鴈行人反愧禽畜萁豆同根生相煎如泣哭豈復念兄弟同氣出父族何如此二竿驚雷拂雲速雙清儼􅆥齊對立空洞腹墨君有此竒可使食無肉大勝雙頭蓮不减同穎榖豈不見明皇遊園感雙竹文丞相三百年社稷痛哉尤此公偷生皆負媿既殺即褒忠不屈􅆥箕並罹殃廵杲同題梅菴圖即汪御史詩書暨春秋於梅著其實捨實多言花後世富篇什花耿氷雪面實藴乾坤仁獨步衆芳中允矣菴中人勿徒於其花名嫓花御史實調相君鼎天下歸仁裏贈葉君訥定山葉君與余同生於淳祐壬子君侍其先君子逰學五城余已識之既而君館東閣余館葉村相距宻邇交好不薄聞其有賢嗣尚未之識余子忽得其所贈言來徴余一言􅃘付之黙黙乎泰定三年丙寅日南至放言易欲訥力行難欲敏孔訓朱子箋辭簡義淵永得禄自有道言行俱當謹敏而濟以訥當言豈終隠取信在言前何待矜口吻君子慎樞機相可冠班笋君家顒與鼎前後作䋲凖發軔吏警曹勉旃推素藴四美堂詩為悠山宗人作夀富禄皆福壹是可言美意願本何極分限貴知體嘗聞海中國太倉一稊米天莫限量我惟在此德耳德則仁而夀德則富於義德則禄在中德則福順止德為衆美基如堂必有址悠山吾宗秀厚德與山擬樂山夀如山由夀享福祉富葢不待言饑人望公庾禄為仕者奉鯤化程萬里溢美公飲聞瞽言述其理吾聞諸詩人箕子子思子愛助良區區山甫已能舉七言古題春先亭春先亭初成胡脩存篆宋公梅花賦於其上櫟嘗和宋韻成賦一篇今數年矣兹同敬存觀梅亭上復賦古句贔贔寒威薄穹昊摇落千林跡如掃受命獨秀除松栢餘木僵立疑枯槁犯此祁寒敢着花先天下春梅獨早姿氷質玉面嚴冷我見魏徴殊媚好為花作賦宋廣平鐵石心膓本堅貞胡為乃作流麗語欲踵庾信肩徐陵聞有此文莫能得僅見皮子加褒稱近世李君使交州得諸塵壁輕連城未壮之年能賦此字抵珠璣辭綉綺老宋賞其善體物比况㑹粹古羣女襲美傚之賦桃花前作後述工摹擬繁華而有妖艶姿方之女子亦宜爾我觀梅花如大賢天地閉時全其天羣表獨立超衆甫髙標孤絶無比肩孤竹伯子聖之清聞風凛凛頑皆廉獨步戰國性善翁次庶幾焉魯仲連衆醉獨醒湘纍屈苦節雪窖蘓属國三國無儔葛武侯有晉徴士陶靖節作者七人梅花徒賦中曷不勤招呼頼有永保貞固語宋公相業兹為四字符寄鄭耕岩昌江鄭君耕岩戊申歳託余妺壻葉子轉詢朞閏說余研精寄似今九年矣延祐丙辰二月甲申客至自古舒出一緘不省為何人寄久之方知耕岩也耕岩小阮子謙僕忝同榜今耕岩索詩題其岩石栁隂卷誼不容諉因賦柏梁體三十韻應命古來隠士多躬耕身将隠矣焉用名巢由以降名著稱皆違本志非真情真隠充隠分偽誠終南㨗徑招譏評隠而無名妙不勝詩之衆聵将驚霆君家子真當哀平五侯霧塞黄冥冥此何如時可軒騰宜哉掉頭呼不應遂使谷口聞西京名掛法言聲鏗鍧君其裔耶良錚錚幾載龍舒以道鳴岩居髙尚追芳馨時哉不同逢文明胡􅃘被褐韜連城鄭公鄉想多豪英仲容方奮青雲程曷不彈冠濯塵纓天風再秋鶚孤横春浪紅暖翻飛輕幡然堯舜君與甿他年身退當功成法疏廣受辭恩榮明農岩下相携行世有畫工傳丹青與今手巻雙合并呈呂雲石提舉在地為石天為星乾文爛然石之精一巻石山亦一體况兹盤石雲倐生斂為膚寸舒彌大㸔作兜羅錦世界時時敷布吐芳心靉靆崔巍相映帶相門出相世有人暫司茗課槍旗春起為皇家壮柱石出雲為雨蘇民生答汪静齋北辰所居環衆星動中閒靜義尤精浮溪先生富孫子名齋以静惟先生天地中間理最大理欲須當明限界無欲故静叅濓溪窗草不除緑書帶且陪嗜學賢主人搜膓千巻憑先春起佐明時開夀域願在域中為一民黄山水閣畫壁為金子範作自有宇宙有此山相傳黄帝嘗躋攀山以黄名端自此標出六六竒峰巒太古名山鎮吾歙連跨三州里三百縱能多辦謝公屐費幾光隂幾跋涉何如圖向素壁間隨意卧遊仍坐觀俛仰之間如登峰胷吞雲夢同寛閒容城浮丘古仙子揖之為賓軒轅主對山如接太古人勝與俗人相爾汝主人樂山希仁人識此名山面目真何山又復古於此三王之世傳斯今六六洞天何足數此六六峰最竒古日觴佳客此亭中醇醴陶陶盎淳風蠟梅梅屋叔長示順安劉公蠟梅詩軸且令續貂伏讀啟發多矣謹􅆳韻拜呈蜜蜂三生有花癖獵遍梅兄與礬弟釀花為蠟蠟作花吐向梅梢真蠟底蠟梅有詠首蘇黄絶唱後人誰敢詆今代胡曾劉禹錫唱予和汝吟毫泚春風吹來珠玉篇嘗鼎知嗣元和體恍然生我梅香前有味如醺百花醴折花因復細端相山麝臍熏薇露洗萬木如槁梅獨春太極初呈品彚抵此又梅中别出竒滴蠟緘封春信啟翫花又復誦公詩喜佩服矣勤拜稽非花毋乃真蜜脾我將求古君臣禮蠟是真耶却又非别花有眼眼幾眯呈董掌書董公仁義陳兩言基開漢劉四百年仲舒天人對三䇿格心正論千載傳公家家聲塞宇宙江右儒林推海口蘓黄帖刻志君堂晦翁新授盤澗叟以儒飾吏固可人願推家學蘓生民豈惟近效著蓮幕行將大用垂朝紳次韻呂周翰教授景濓亭觀蓮附仲文呈之春桃飛盡紅雨繁夏槐更禪緑雲屯此時泮宫蓮萬柄一一生自七星根愛蓮夫子振絶學道脉灰冷還以暄翫花扁亭景濂字一洗紅粧象縐裙大者錢塘十里湖小者齋外一瓦盆㸔作六郎見何猥此曹毋乃迷禽門子非愛蓮愛君子一寸膠清一寸渾對此水光晚色静如挹光霽醒神魂髙出太乙真人舟坐祛大暑酷吏寃如使徒于蓮景濂見道猶隔幾塵昏景濂真處在何許夫子自有圖書存文公訓釋揭日月價重趙璧并魯璠池蓮窗草皆寓爾圖書難盡意與言我徽文公舊闕里𣲖濓泝泗窮淵源君豈不見后山叟尚于六一稱嫡孫宗朱祖周在吾黨景濓當作如是論甥其呈似呂先生何當叅請師模尊夜聞織東隣西舍織燈明萬籟無聲此獨聲我何安逸彼何苦軋軋未終雞已鳴目似鰥魚因不寐安知我煖因彼成五言律和汪監察梅菴詩間氣所鍾聚兼由積善餘身閒知地勝神動覺天隨日謂幽居好人疑大用遲浮溪家集裏盡與和諸詩􅆳放翁有叟韻有叟居東阜辛勤亦數椽文燈空照古筆耒不逢年我已窮愁慣天無賦予全校讎與評議猶秉一朝權壬辰十月初十日聞萬一叔以九月五日死于淮出涕之餘賦此邂逅遇所識歸來不奈愁時聞前輩死轉覺此生浮世界空花夢乾坤落葉秋追思黄父語今日淚空流予少居五城叔毎以苦語鞭䇿之枕上用子静冬夜韻夜今六十刻熟睡若為謀髪秃已無本情恬忘莫愁樹雲空憶李茶月孰驚周不寐集方感心期墮繆悠次韻俞崇節和乃弟飲酒詩有酒身無事多君與弟斟老猶具慶子閒作太平人讓果同初意燃萁異􅃤吟終身思聽雨富貴不如貧孫次臯寄示呈方公三詩用韻奉寄學海𣺌烟浪泳游無盡期誰非鑽蠧簡鮮有辨雞碑力量公誠到聲名後必垂孟張匪韓子定有不卑卑又石鼎彌明老可孫劉與侯年光弦外急景物巻中留髙𣺌蘓門嘯雄空赤壁舟吟邊風韻似一詠一消愁又我與公相識俱當緑鬂初蒿㣲僭松倚枿槁愧陽嘘往慨悠悠别今方續續書箋馳當簪盍自此不宜疎次韻酒限濡首起濡唇初慳後絶倫勿耽雙玉酒遂溺萬金身豢豕流生禍烝豚已泣神古人多惜福惜福始全真又寧自三緘口從渠九醖觴道中臻樂地酒裏覓仙鄉勿以清明在而云發出狂卿卿我自我醒醉兩相忘次韻月卿姪藏曽祖硯幸異元賓硯傳為子敬氊一生曽受用四世尚磨研玉喜在山潤雲因不雨全文章無極盡餘澤及曽𤣥遷新居有桃符曰自樂巷無陋由勤屋不華十餘年矣炤壁未漆堦簷未砌丁未春始克為之乃足前十字成一律自樂巷無陋由勤屋不華桃符今幾載藜徑只貧家唐世土階是虞時漆器奢門髹簷復砌於我事何加哭方虚谷先生丁未嵗正月十四日卒于杭目深窺理窟身獨據詩壇偏得古猶少兼全公不難槐柯千里幻椿筭八旬寛癖愛湖山好郎君侍闔棺夀逹觀五月五日初度天然巧端陽不後先良辰逢五五夀算祝十千不羡宫衣賜勤鋪角黍筵安期蒲九節更可引髙年穿井按官厯十二月某日宜穿井是日開日也且井宿直之吾家用工巧逢此日深二丈餘而得水喜而賦之戊午歳作井宿值開日逢兹應再難真能九仭及頓覺百憂寛地冷冬方煖冰湍夏更寒子孫又孫子啜飲有餘歡有賦假儒真儒者今賦二首儒立三才命其何以假為但矜麟作瑞已昧虎為皮氣見大巫索才非男子竒誰司人物柄明辨勿遭欺又世固伸知已真儒始識真學将開百聖才可進千人卜夏母為小賈山猶未純卞和明著眼席上果何珍挽畢觀竹三首家學淵源接人豪湖海稱問津遊璧水從宦到金陵蟻夢炤千幻燕詒明一燈方将儀後進仙去理難憑又相觀惟有竹竹外懶凝眸早播無雙譽髙交第一流裕齋明藻鑑虚谷並英游知已陂龍化公宜不復留又我忝登門客悠悠十二春鯉潭隨步屧馬鬛􅃘攀輪域近從先正神安䕃後人天晴表公福雨㸃不霑塵挽洪簿二首名炎祖歙城虚谷後猶幸有斯人學問師鄉老勾稽子邑民丹鉛充庋閣朱墨泥車輪夀僅幾重卦遺文頼不冺又抱甕教多士于時識景星多年嗟判袂幾度聽横經郡乗椽揮筆男邦刄發硎賢郎專行状不朽慎鑱銘代石養蒙挽周醫教逹豈為良相君今逹以醫祖宗興自我杭歙迭為師二䜿逃無處三皇祀有基蒙成并盛德誰不涕漣洏寄吳子静君家吳季子炳炳著麟經繼世誇睂白持身尚鬢青字能齊逸少才更嫓𤣥齡翰苑揮椽筆垂紳步帝庭羡子西造朝陽樓氣勢薄蒼穹樓髙百尺雄屏維山聳翠鉦掛日升紅真可卧餘子端如見乃翁胷中梓人傳相業在胸中汪氏雲林堂雲林朝市逺恐負一生豪不仕疑無義隠居何自髙作霖膚寸合搆厦斧斤操科第湖州始超宗紹鳳毛芸儲芸壁書魚蠧為防魚蠧書須将雙眼㸔匪直萬籖儲磊落腹能載昏迷心悟除金根猶恐悞負訓惜居諸用韻贈别隆興劉君睂宇挾翠氣西山簾轉晴未嘗前日識似有故人情醇比周瑜酒和如傅説羮相逢遽相别去去太忙生賀金桐岡生日七十古稀有公今尚一年君心安以樂家政老而傳隠逸雖三逕恩封自九天勲名付蘭砌閒適夀綿延挽李髙甫祁門浮溪人李愿隠盤谷古今名並垂箴能規冢嗣贊自許男兒兩世夀髙甚八旬年近之外山埋玉處執紼總漣洏又庚癸濟民餒豈求榮子身大朝交止信初命報行仁咬菜戒持已思蓴尼省親詎知成永訣哀慟徹穹旻又李愿盤旋處名微隠更張大才真濟世小用僅征商救斂富公弼息爭王彦方遺言遵古禮踰月即謀藏五言排律經訓乃菑畬試題學用菑畬比精由粗乃成譬諸農父事訓以聖人經習戒成紛白披母舍殺青情田加種耨性地即郊坰倘匪道耕熟翻慚畝稷馨金根校讐誤詩禮愧趨庭賀戴庭芳誕男譙國家祥應充閭消息真掌圓珠的歴頭峙玉嶙峋肇始中元節真元㑹合辰鳳儀先驚鷟駒駿必麒麟九畹芽初茁一枝芳正新乾成來豈偶震索積方臻祖德潤彌浩孫謀蟄更詵他年重坐席有日搢傳紳親為含哺悦賓沾分果均此郎騰踏早郎罷尚青春挽郡城周醫教姓與平原共相良醫亦良少嘗宗孔孟長始世岐黄救命光宗祖仁心起瘵尫杏林何足擬淳意足相方神效誰能企隂功詎可量帥連居兩郡殿首祀三皇復户為人計論堂傾已藏校官成赤立道貌想清揚創始君無靳蒙成後敢忘德髙天必鑒位下我何傷竹野自標雅棣華相並香頃田今友愛斗粟古慚惶何啻千人活行㸔五世昌蒙荘埋玉處送者淚應滂七言律次金滄洲病中九日韻丙辰縱不龍山孟萬年合如陶令醉籬邊雖云物物皆詩料誰解時時與酒錢我輩白頭多間濶菊花青蘂劣芳鮮喜公勿藥将簪盍同泛金英倒玉船次滄洲喜替弓手韻塵土弓刀未是癡紛紛刻木久難欺王恂時復揮椽筆樊噲從渠飲斗巵絶異一兵新解甲併祛二䜿好舒睂出羣老鶴雲天濶啖蔗光隂日日詩汪靜軒木假山嘉祐集中知木山蛾睂盤屈小烟鬟三峰想墮虚無裏一記長流宇宙間巒岫遊魚今突兀豪酋蟲蟻久躋攀老泉坡潁皆人傑古意蕭蕭力挽還擬呈張郡守中原文獻接前脩毓粹鍾和自鄆州金馬玉堂真學士花屏練帶古諸侯近為姑孰規模在逺紹曲江功業優宰相青氊應可復徽民有幸且淹留與黟尉王長卿名元少府河汾夫子後小桃源裏日吟詩錦囊儘富句皆好綵棒雖懸威不施平易近民民父母謙恭待士士宗師體仁未展長人志庭滿槐隂㑹有時與黟簿楊雲海蜀珍從昔重乾坤三鱣家聲尚可言朱墨勾稽今弛擔紫清凌遡即騰軒睂山焦木秀重萃黟邑甘棠恩永存鄰壤書生辱多問何當一見以文論奉答齋諭先生俄驚耳順過三年顧後瞻前愧昔賢自笑説鈴辭枉費誰云經笥腹空便歸鄉漸慨交朋少為客焉依行輩先多謝新詩過期待悠悠歳月漫推遷次劉知事和荀廉訪見寄詩韻知事名德温斯人磊砢更英多㢘善㢘能志若何劒氣懾姦鋤故態丹心救世起沈疴且添集上詩千首不愛車前印幾窠凛凛道将風烈在真如清濟貫黄河賀金子西誕第二子十一月十三日天知欲益讀書子第二雛今得得來家世孝忠為命脉扶輿清淑所胚胎存心耕雨一犂地積德凌雲百尺臺三日食牛氣如許貂蟬當復映公台和竹山月臺韻我今想像賦髙臺超出塵寰亦快哉人物風前臨玉樹朋儕月下倒金罍但疑夜種白榆少豈必秋延丹桂來斟酌嫦娥四時好眠遲何惜與徘徊次韻贈王竹庾竹庾精青烏之學天地儘寛行路難何如不出户庭間家雖棲鳯多栽竹身却尋龍飽㸔山到處為賓省造次數竿誰主自蕭閒青囊囊取青蚨去歸翫穿苔虎豹斑上鄧善芝提學仲華不遇劉文叔所志願為芹藻師苗裔今提江浙學風霜待相聖明時萬家夜月燈俱炯滿座春風物自熙教雨行将濡霖雨召歸當軸未應遲仲華鄧禹也上焦總管棠䕃前曽芘武林馮熊展布䕃逾深東坡通守無為守黄覇初臨喜再臨豈但州麾持皂蓋㑹當鼎鉉鑄黄金孰先一郡後天下卷起西湖大作霖上倪杭教湖州人湖學生平藴蓄竒聲馳杭泮據臯比定知遍受諸公賞豈但專為儒者師洙泗淵源歸誦課湖山景物入歌詩家聲善論中和極歸贊明時封禪儀上浙西道㢘訪使去天萬里逺乗驄寄命司存肅政中廉吏清汚湛秋月訪民疾苦盎春風鎮浮德與吳山重鑒試明還浙水同攬轡何須外庸記秉鈞終屬黑頭公和王宏翁韻二首似山子傳家有子端不死恍惚王充疑再生君擅詩聲如伯起我慳飲量似公榮相逢客裏自多感各在貧中更愴情王粲陳琳如可作歳寒氷雪眼雙明又馬異盧同孰異同年雖逾壮似成翁芙蕖尚喜不朝日松栢何嫌經朔風網掣珊瑚滄海底篙撑舴艋急流中吾言雖直不無意何惜乗時急用工次汪稱隠府判退休言懐并序士大夫仕而能致髙矣七十而不得謝雖賜之几杖以安之然不得遂其高於心未必安也年及而致仕者循其禮不待年及而先焉者尤見其髙今府判稱隠汪公去七十尚七八禩能先告老且得遂焉上以褒表其親下以成立提擕其孫若曽孫愚也傳其休官言志五詩讀而髙之而慕之遂僭繼其聲奉賀五首早歳先彈貢禹冠喜公早退謝身還三千水擊溟茫外七十車懸感慨間自覺飲氷纔冷淡如何啖蔗儘清閒宣尼也發歸與嘆幸也詩書得定刪又公負文章錦繡心祗須蓮燭賜恩頻退歸期不慙先世大用姑将付後人陶菊一籬存晚節傅梅二季俟陽春文宜為誥席珍待藴美浮溪代出綸又逸軌超然逺市塵畏愁囘首幾悲忻形同鶼鰈不期合顔異鶚鸞定自分對越心還昭若日舒徐迹似懶於雲易陳九卦稱而隠額手公能尊所聞又無事出門適意行忘機安得遣鷗驚笑渠拄笏㸔山色容我扶笻聽水聲萬百入塲惟日醉三千成刻幾春晴不拘年及方辭禄試授歐公自細評又竹馬翩翩娛放翁美哉異代與同風一門四世福良實萬户千鍾事亦空人自風波鳬上下我能味道蜜邊中𤣥孫得見無難者十載曽孫花炬紅和程伯玉遊普陀韻櫟兒時聞諸五城黄提幹公謂大丞相訥翁先生程公事母至孝與黄公同肄業郡庠見其毎日行朝供之餘必一歸奉母未晡又至此說藴諸胸中七十年矣兹䝉季澄教諭逓示槐府伯玉程君謁普陀大士為母祈禱一宗詩案知君訥齋從姪孫也孝行如此無愧家風良用起敬因和韻奉寄侍母何須羡洛濱訥翁純孝世持循普陀瞻望鄭花曉東野符同寸草春寳婺夀光寧有極白虹玉德本無塵海中仙果千年實採獻知君已問津晉汝南王亮兄弟三人侍母伏太妃祓禊洛濱並持節鼓吹一時榮之東坡詩洛濱侍從三人貴京兆平反一笑㸔山礬花即鄭花觀音宴坐處有此大樹花見山谷山礬花詩註題歙人程叔固字説後乃槐堂丞相吉國公曽孫騷人橘頌説曽枝相國曽枝有此竒固守一貞能用易頌兼四始必興詩滔滔桃浪春還透鬱鬱槐隂晝尚遲志學有常致而力丙辰衣鉢竟傳誰戴廷芳立尊人南山公碑用高四叔祖韻一生不被北山移隠德俱登羡道碑揮染筆鋒推逸少雕鏤文采羡公垂孝誠永永終身慕盛美彰彰百世知既固既安尤利後必然何待問蓍龜送畢永仲遊姑蘓省親兼訪虚谷永翁氷蘗仕蘇州玉潤今兹省侍遊緑浪紅欄多勝槩清風明月一扁舟在家雖好閒非計行路良難謹自謀須念椿萱頻僂指歸期莫待近新秋又四海九州虚谷老見之不用覓階梯父書呈徹能求教世契敦崇定指迷非過南京叅待制是圖北斗仰昌黎片言隻字如相贈歸袖光芒萬丈霓賀汪稱隠夀藏五首少壮幾時俄已翁速如馬耳射春風槐庭縱極三公貴蒿里終歸一穴同生也有涯那免盡死而不朽豈真空地行仙舍公誰是只合衣冠貯此中又自述公真善自知我生觀處孰觀頤耆英初過馬君實銘筆早逢王獻之王仲儀為作生前誌銘着脚家山真覺穏囘頭宦路始經危先時不利後人好永宅脩期畢自為又栩栩蘧蘧夢不驚退藏於宻漫經行夀藏名退宻菴歸來松栢非無徑仙去芙蓉豈有城九卦三陳深易學萬家千户擅詩聲誰能得與公家似五世文庭震逺聲又以下二首借韻自述也知難久愛吾廬自卜生墳去歳初五患但遵程子戒一毫不泥郭君書桐棺似趙貧非病石槨如桓密反疎死後不忘方是夀太虚如室了空虚又自笑那能免罰觥古稀過此竟無成此君辱與偃松友太白尚分殘月明客燕尋巢嗟寄託老蠶作繭自經營率然未覺摧頺甚青眼猶因緑醑横呈鄧匪石名文原字善之庚申年五月分司自黟過婺源屢問賦跡于子西因同迓于溪口柯邨渡廡車兩度過山城攬轡澄清素志行學道愛人春坱圠詰姦刑暴月分明􅆛貅斂戢知嚴律雞犬安恬免震驚甘雨隨車契天意政聲休洽聽歌聲黄秋江母有孝節門之錫命贈之詩者盈軸索予賦一首稱未亡人六十年恩光褒表節通天栢舟堅苦母心遂蘭膳甘飴兒志專九鼎名端由相重一絲風不被官纒事闗倫紀非他比宜入新安郡乘編丁未元旦試筆雨當元日奈何天甲子欣欣兩日前五十六翁成老境百千萬輩望豐年癡繙竹簡心皇惑饑搗薇根生接連我不自憐尚憐彼燈花如笑恰為然辛亥元日分嵗杯醺已遣愁鷄聲呼起攬衣裘椿年浪説八千永花甲今逢六十周白首惜春猶冉冉朱顔愒日􅃘悠悠曰耆指使将誰使愁亦徒愁一笑休和東松菴岳王遺像詩韻朱仙鎮上據全兵萬里中原不足平棘寺銜寃真枉死松菴遺像尚如生中興四将尤芳烈大節千秋擅令名可恨張循阿老檜却令同傳玷忠貞賀張玘齋得第四孫并序昔徐卿二雛少陵歌之穎濱第四孫東坡詩之今者恭審祖徳深培孫枝又長在令嗣則為徐卿之第二子在先生則為穎濱之第四孫森森蘭玉衮衮公侯良深健羡賦詩為賀聊寫私忱充閭瑞氣鬱葱葱蘭玉孫珠現掌中第四孫今似蘓子無雙譽定嫓黄童編傳圯上家聲逺網舉儒流祖德豐復泰臨餘陽用壮棟隆逺照曲江公次光姪詩韻誤子窮途計已疎擇棲所恨匪岡梧酉申乞捨傳書鴈庚癸呼馳汗血駒儒術謀身慚杜甫老農請學合樊須細思金亦何勞躍陶鑄從諸天地爐次葉郎賀張仲白夀藏詩韻應笑姚崇憂墓碑生前枉費計謀私何如只付青烏記未到同藏黄石時借箸待将陳八難羡輪直可頌三斯内敭外歴多餘暇安樂行窩儘賦詩賀仲白兩旬得兩曽孫用葉郎韻橘頌孫枝慶疊重河清盛事有誰同客來且伴竹為馬母教期吞膽用熊連覿太翁兩旬内㑹呼髙祖廿年中夀過一百公家事前有張蒼後有公次唐長孺兄見寄詩韻海外馳神大九州何如弭節且椒丘非熊尚父晚猶逹射虎将軍竟不侯朋友倫中交有信山川阻處鬱相繆硯銘世擅筆鋒鋭秋試朱衣定㸃頭唐子西有硯銘又世路風波不足驚山林深宻適吟情十洲三島果安在一聖九賢能再生夜月明眸思菊枕春風轉盼卧桃笙蟾宫有路君當往筆陣縱横在此行次鄧善之五月菊花詩韻俗呼滴滴金忩前來伴蹙巾榴滴滴圓黄㸃徑幽不待臂萸添醉興且隨腰艾動騷愁金明難辦一朝費花早㸔成五月秋浥露掇英真菊否名同實匪暫淹留吳甥為程醉經求和孝隠堂詩廬墓從來闗大倫人心萬古理常新隠餘夫豈更求顯孝外元非别有仁天地範圍大郛郭雲烟環遶近比隣須知心醉六經士不是尋常横目人次韻祈雨相公湖上老詩仙一語纔聞便格天霡霂已蒙千畝雨霏微方裊一爐烟潛憑象教小乗力好紀麟經大有年田野歡聲入酧唱周詩直見夢魚篇雨數日不止又用前韻莫是陽臺行雨仙未知民以食為天半篙碧已添清漲全幅練宜拖霽烟稻總低頭收有日禾如生耳恐無年憑誰為我箋天闕喜雨詩成苦雨篇賀陳竹牖生孫與令嗣月日時同幾日名駒産有媯中秋圓鏡始蛾睂清鍾桂子初三月秀挺桐孫第一枝舉世淡然如嚼蠟於家樂甚自含飴魯荘生與父同日不似今同日與時木犀珠岩樹初開金粟明纍纍如貫耀人睛非生蚌殻圓還皎若比龍涎馥更清分種元從天上落粉身今捻掌中輕莫言合浦光常在斂袖歸懐夙有情寄黟邑胡伯翔應薦小桃源本是仙宫先輩風流想像中文富固将儀瑞鳯詩窮那肯弔寒蟲半巖烟雨梅花落一夜陂塘春水雄若問近來成底事箋詩註易夜燈紅次黟舒君濱韻久悟文章為小技聊於詩律辨寛嚴巧思信斡無中有至味須知淡處甜練帶索雲千里濶筆鋒抽月一同尖何時得着黟峯屐桐火松窗雨半檐呈徐學録茂林玉山人與徐教同姓不同族紫陽里得兩徐侯分據臯比共細籌古歙書生宗北斗上饒髙士冠南州象山要㫖期叅攷鵞寺遺言願講求老幹将收作樑棟茂林豈但竹君脩次吳正夫賀余中鄉試韻二首聖代崇文科目興鳶魚飛躍一機新楩楠喜得賢能士樗櫟何須老病人天地正交雖遇泰舟車所至未逢春仕途廣濶無能往畢世甘為草莽臣又同志同經辱與遊迂疎未到學而優敢言才過千人俊安得詩輕萬户侯我似北溪老漳郡君如季子重延州年當六十云遲暮縱使為公匪黒頭和愛山叔端午韻方喜槐庭日影移蕭蕭雨忽濕柴扉略傾蒲酒滋顔面急倒蘭湯浴瘦肥湘水恨長騷尚在綵符髪短髻難圍竹林安得頻相聚坐對南山晚未歸金子西新創朝陽樓三首忽搆巍樓甲第傍知公報本意難忘無邊秋色千巖列不斷溪聲萬壑長面面玲瓏宜夜月心心精爽在朝陽有時慨嘆憑欄久如見前人舊草堂又髙敞崇樓面勢宏遥瞻東日上蓬瀛故人把袂春如海野客論詩墨作城幔捲山光飛瀑布樽開檻外聽新鶯脩桐㑹見隂逾宻過者皆興仰止情子西尊人號桐岡又朝陽髙額聳觀瞻登此樓臺意欲仙一面虚明先受日三層兀突欲攙天從渠餘子卧其下常若乃翁瞻在前東望扶桑如咫尺藥欄花嶼自年年寄廻嶺汪景周叅軍龍魚芳裔閲千年奕世生賢豈偶然景慕姬公勤握髪遭逢漢武侍祥筵春風桃李門墻麗晚節松篁籬壁堅疎略如予稀見面幾時重叩五雲邊答張叔黎笑談直欲覓封侯投我新詩湛似秋不向夢中仍説夢當于樓上更安樓學精要法斯文孔道妙須叅太極周雲影天光涵映處方塘活水㸔源頭題洪氏西園隠㣲舘并引洪君昭父袖詩過予謂其家有隠㣲之館旁闢西園好事者多詩之余謂隠㣲之義實本於中庸莫見莫顯之􅈲何詩之者之不一言也昔君家文安公以小隠自命彼不過謂得山林趣耳自君隠㣲之􅈲視之盖有得於聖門之理趣文安又譲一頭地矣敬演此義當必有印可之者隠㣲之義自淵然標揭中庸在目前更闢西園供獨樂肯隨北里漫爭妍窺人新緑深深隠背澗殘花朶朶眠小隠君當超祖躅鳶魚飛躍摠由天出處出處行藏豈偶然機縁盡處自應遷浮屠桑下無三宿博士虀邊偶四年外物未須多悵恨中扃幸巳略流傳一時不得如吾願久逺相㸔不愧天次韻儒户蠲徭蠲征芝墨幾畨新實慮陵􅆥賦子衿聖學相傳千載逺君恩不隔萬山深蠧魚文字誰勤閲野馬塵埃日暗侵好是自鞭勉其實不然何以服人心和成此詩無帋可冩姑以此藁與仲文甥一觀但後一截雖吾儕自勉之言恐或者不察人不樂聞不必轉以示人也吳執敬生曽孫應午盛事喧傳閭里中古墩佳氣鬱葱葱一門四代孫生子萬口詞同誰似公曽又復𤣥身易見仁而能夀道無窮客來莫訝出迎懶竹馬駸駸伴放翁次程鍾山所寄詩二首淳所雖濶鷗盟蝶夢通不然何以見心同故人有感舊時雨後學因觀前輩風安得一團和氣老共浮百斛酒船中願公書勸歸來㸔鬱鬱無云只欲東又詩無斧鑿竟通仙慣閲興亡休問天文字藏山河注海功名蓋世黍炊烟大槐為國徒成夢短䇿㸔花屢易年我欲携琴孤棹訪堦前書帶已芊芊易巾偶與子靜同日同様同價戲成一首與君同日換烏紗愧我頭童髪并華難復脱來頻漉酒祗宜籠去自煎茶側時嘗得詩中味敝矣曽如足上靴貧不儉期頗類儉屢将墊角漫相誇再用易巾韻隨處聊慿製漆紗豈其官様必京華竹皮最古今苴履椰子稱竒亦貯茶椰子可為冠亦可為茶瓶見山谷詩禿髪已知頭似筆笑顔底用面如靴小冠子夏時方尚岌嶪凌雲敢自誇三用易巾韻緇布如今儉用紗比升三十此非華尚𤣥何惜頻拖拂滃白須防自磑茶存古鮮能端與甫趨時誰不笠和靴誤身儂已悔無及破㡌多情莫漫誇四用易巾韻人情反覆薄如紗終歳清愁鬂欲華先苦半生真食蓼囘甘晚景異嘗茶無錢歳僅易新㡌有線冬猶補破靴如此兩窮詩作祟尚拈句字向人誇五用易巾韻月移梅影上窗紗恰讀新篇對月華和似鵞黄盈盎酒清於兎褐半甌茶金身漫説蓮生座汗脚何妨霜滿靴選佛選官俱是幻詩名不朽待人誇次子靜九日韻良辰何事故遲留知我臨風逺想不黄菊傲人籬一帶紅萸入琖酒千籌衣裳暮染山雲白樓閣朝開客路秋俛仰之間尚陳迹今年宜不去年侔九日見流民又次子靜韻節日登髙眺八方奈何蒿目竟荒荒觀渠蟻國民頻徙感我牛山涙數行樂土可依宜嚮慕愁城無計轉悽傷黄花似有撩人意一笑相携入醉鄉呈曹𢎞齋戊戌秋丁參陪入城别後寄之龎公元自入城希陪祀芹宫禮不違虚設肩輿惟拄杖懶持手版只深衣前朝進士見髙躅南極老人瞻逺輝亦步亦趨我何幸飽聆清論透精㣲答樵陽地理熊心泉處仁只道尋龍解識真豈知詩亦盡驚人胸無塵俗方名世心有淵泉可潤身相地眼高江月午穿天句好野花春景純以外誰兼此五字遊仙萬古新用前韻答婺源許屏山士元未識蒼屏面目真名章先肯寄塵人長吟月琢風追句想見泉流山立身蛟劒一揮那復怪花瓢常在永如春神仙孫子非凡骨尤喜詩成字字新次月卿姪韻三首族祖當年負大名如今願子振家聲語非泣鬼未為險義必入神方見精三徑梧桐雲影翠一池荇藻夜痕清著書不少前賢樂髙閣研朱字字評又鴈挾清風送子詩政當籬底採花時見山安得如彭澤迷道方将問具茨更篤先賢前聖學求為㓜婦外孫辭數聲漁唱斜陽外定有人來説項斯又萬樹松篁繞屋長喜君座上墨花香夜鐘獨釣溪頭月曉雨親耕圃外桑歴落詩篇秋更健紛披菊瓣老仍黄年來異地悲萍梗何日相携返故岡賀毅所生男壬辰九月十日六十年當天運復祖孫恰遇兩壬辰只今有子萬事足喜與當時一第均夀菊正花香未晚蟠桃遲實景常春此人的是逢辰者曽祖青氊付此人次韻吳義夫營夀藏有引義夫吳君預卜夀藏於先隴之旁不問隂陽拘忌賦詩以祛諸郎之惑徴和於吾甥仲文仲文轉以示予余謂塟書之惑人深矣吾儕之勘破易欲兒曹之不惑難隂陽拘忌自固不問然未藏之前或既藏之後子孫惑於浮言其若之何此等皆非人力之所能為惟有靣見先人於地下留方寸地遺子孫耕於身後以天感天使其自不至於此可也載􅆳一章以當請益髙明其可之否乎蠒室預謀身後居誰能終始愛吾廬深長覺世伊川説竒怪迷人郭氏書得覲先顔斯已足但留寸地便堪畬何拘白虎青龍説走徧雲山問故墟題望逺樓江天樓閣列遥山雲物相期日往還心逺本超雙目外身髙聊寄一欄間王孫芳草當前出遊子花驄到處閒欲送飛鴻忘久竚從來俗慮盡行刪圍獵昆蟲已是蟄藏時獵騎紛紛繞翠㣲勿謂火攻為下䇿略同兵戰寓危機仁心誰去網三面殺氣似環城四圍乾豆元來因報本充庖豈但愛鮮肥寄題唐叔重敬養堂名鉉歙人吏於休寜菑畬經訓世其門貭肅公家幾葉孫駿驥寧辭聖路逺靈犀肯受吏塵昏代耕雖鮮官中禄敬養自怡堂上尊戴記㫖哉思弗辱守身慎重過璵璠七言絶句贈項松山嚴州人精地理嚴陵風物壓山隂晦老遺言尚可尋最喜一翻新雨後山南山北在君心又久客天涯不計年青烏妙術自仙傳景純去後唯君繼滿室松風奏管絃送梅岩浙游二首誰識梅花岩下人香中堅坐十年春如今一出縁何决瘦影横斜致自新又吾道難行且試行感今弔古眼雙明乘閒一訪孤山老印我寒香半㸃清九月十八日立冬是夜大雷電繼以風雨今日𤣥㝠行令新轟雷掣電駭人心天公想做開爐節電是火光雷鼓音促織翠羽迎風清夜幽催人機杼替人愁聲聲恤緯有深意我唱新詩不勝秋晚蟬秋早梧桐颭晚風鳴蟬無數樹隂中斜陽似假渠聲勢只是斜陽不久紅秋後蝇夏日營營遶案飛秋來引類欲何為從教羣集秋瓜上落蔕秋瓜能㡬時贈臨溪程𤣥𤣥子名道真同邑𤣥𤣥子程君精專修鍊兼善丹青伊川詩曰我亦有丹君信否用時還可夀斯民此君之家學也君但留意於伊川所有之丹而可矣二十八字用寫此意妙門深入造𤣥𤣥游戲丹青不足言吾道真丹紹程子遇時端可夀元元庚午歳七月讀離卦有感日昃惟當鼔缶歌餘年不樂更如何時行則行止斯止隨處無非安樂窩屢有傳予死者戲拈二首可笑人頻傳我死其如天自永吾生惟無可用故能夀豈苟然哉櫟字名又生也有涯終氣散死而不朽此心傳豈真無用大有用羽翼聖經或勉旃夀汪盤隠又號竹逸戊午四月二十九日首夏清和六月暘蓂留一莢喜稱觴延長氣象為公祝化日方長夀更長又竹溪六逸是前身固蔕深根保性真我謂大椿如竹茂八十嵗月益蓁蓁又樓標盤隠在花叢夭矯千松盡作龍一𣲖濤聲鱗鬛動此君真箇有仙風又桃花千尺有汪倫李白相逢意最親今日竹間髙逸在十洲三島属斯人夀惠山壬戌四月十二日金佛浴來先四日玉蟾圓處後三宵此為岳降生申旦鶴露添杯喜氣饒又清和時景㸔将半五福箕疇祝更全燕子日長方進進瞳方鬂緑不知年青子亭植梅為亭故名以下二首為悠山宗人作摽實和羮今鮮知爭吟水影月香詩似梅人既公家有㑹見成隂子滿枝長春亭植月季為亭故名竒葩滿架月盈盈不是臙脂態自輕寄語亭中讀書客春光如許好聞鶯詩餘浣溪沙夀汪盤隠盤隠誰云必太行神交李愿躡遺芳今朝南極一星光野處襟期尤順適退藏滋味更悠長歌中元説夀而康清平樂寄惠山壬戌四月十二日惠山蒼翠逺與毗陵嫓彼處錫泉標第二此更鍾竒毓異年年初度浮觴醉餘新瀹茶香山下氷濡雪乳淡中滋味悠長又夀彬齋四月二十八日清和天氣三莢蓂猶翠恰喜先生初度至近迓薰絲佳致幾年人物彬彬文華貭實惟均夀宿臨之在上龍溪文脉常新西江月寄汪梅菴御史御史乘驄剛直廡車攬轡澄清先聲應播五羊城一道凛然尊敬菴外疎花破玉枝頭佳實調羮催歸不入秉鈞衡豈但動公詩興玉樓春和金滄洲新篁摇翠添波緑粧㸃璫溪深一曲青衫司馬緩來遊卜夜清歡孤繼燭江心挑杖聊開束更好着鞭馳駿足樽前頗有遏雲聲劣可纎纎扶藥玉又庭槐鬱鬱雲屯緑新霽彩移階砌曲麗詞入手可絃歌想是咄嗟成刻燭牙籖髙閣應難束黄妳有時誇睡足覺來課讀愛諸孫他日登金仍步玉臨江仙次月卿賀生日韻吾族英才常接迹年來似曉星稀子言秀逸未嘗巵老夫拍案起不覺漸舒睂青佩次孫欣得與樊川小姪名宜香分甲午月宫枝各當傳祖鉢教養願觀頤時竒孫從學于月卿滿江紅賀金子西生日十一月初十日乾鵲鳴簷殷勤報主人生旦端巧遇迎長添線的堪稱讚律轉一陽葭已動復來七日梅初綻符羲經數迓新祺綿髙筭萱春永斑衣絢蘭房煥琴聲衎盎一門和氣流霞深泛世濟忠貞貂珥七年登强仕鵬程萬正小春佳候敵神仙閒遊翫滿庭芳送陳德翁標格冲􅆥聲名洋溢德人泰宇春融一團和氣還與伯淳同成就燈窗弟子今陞擢論鑄顔功彈冠興依稀貢禹應聘教王宫公家梅澗老臯比戚畹聲振江東矧詵詵胄子得坐春風自此先生升矣班玉笋文補山龍充德量薰陶宇宙和氣一團中水調歌頭賀汪覺翁受吉水州判殿閣㣲凉迥吹到勅書新定知盤谷深處草木煥精神帝念水紋成吉合得卷阿吉士州政佐經綸婉婉幕中畫行矣細敷陳除書至喜氣溢列朝紳志伊所志将以斯道覺斯民家有青氊鈞軸振武接芳塵自秉浮溪筆畫錦記逢辰水調歌頭夀金滄洲天遣東萊呂丁巳端南州秺侯芳裔如此生嵗嫓前脩僂指六旬踰一過眼流光兩世花甲又從頭浩氣塞天地吾道付滄洲日未暮宴初列九霞流齊睂偕老如願桂子播芳猷孫禀箕張雙宿祖付詩書千卷此外復何求但願延椿算燕翼更貽謀金菊對芙蓉夀金桐岡九月二十五日夀宿騰光夀香裊碧鬱葱枝上梧桐記紱麟令旦門掛弧蓬今年東閣郎皆侍懐章綬拜捧金鍾榮華富貴眼前誰似堪展睂峰秋髙景物俱濃正堦前金菊巧對芙蓉愛菊名夀客夀與公同醉蓉初瑩凝脂面酣天酒芳臉潮紅何妨判飲與花雙醉醉似花容金氏園有醉芙蓉滿庭芳夀縣判梧山先生僂指中秋齊頭十日後庚玉兎初弦當年此際天恰生賢自旦駸駸至望清味永翻勝規圓髙掛在碧梧山上清絶緑生烟懐中梧月炤天知心事銖視貂蟬綵衣無價寳樂自無邊此去古稀近也長生籙世世相傳慈萱側金盃滿泛梧月吸年年滿江紅送朱姓吏滿歸只説琳川精吏道恢恢餘地元來是深衣儒者将儒飾吏傳世四書端實學待人一縣皆和氣及芳辰解賦歸來真堪醉肩已息心無愧青鬂在蒼顔未符君家翁子朱買臣年當貴九十月終行鶩退三千水擊摶鵬易豈有材如此不超遷行知遇水調歌頭夀朱子章七十古稀有今喜見先生紫陽家學淵奥場屋舊家聲鶚薦西風早歳豹隠南山晚節天爵自尊榮桂子蘭孫擁南極老人星杜陵老多酒債羡脩齡豈如夀富兼得熊掌與魚并八十老翁為将九十武公為相不足為公稱鶴算與同文道重藐公卿沁園春夀張起齋四月十一日首夏清和望前三夕天現夀星恰先庚三日釋迦浴佛後庚三日呂洞賓生慈佛神仙引前導後來作人間瑞世英今耆艾久提綱諸道幾萬儒燈金甌行覆香名天再遣留侯佐太平㑹榮封萬尺編符黄石筭綿千歳經誦黄庭從赤松遊足知雅尚好待他年功已成如今且向夀星明處滿捧霞觥定宇集卷十六
