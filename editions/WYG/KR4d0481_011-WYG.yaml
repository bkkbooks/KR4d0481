body:
  text: 定宇集卷十一元陳櫟撰啟疏文發解謝路總管張公啟并辭㑹試學生陳某啟右某伏䝉頃給省府解據叨中郷試第一十六名者伏以鳯詔天頒初試紫薇之省鵠袍星列兆分丹桂之枝若僥倖然有綱維是竊唯科目久行于歴代弊端莫甚於邇年經穿鑿而不根文浮華而過實士鮮學問國奚取於若人世蔑事功衆遂疑於吾道誰謂昊天之不復必待聖人而後行洪唯我皇作新多士舉祖宗欲舉之典豈唯發第以决科善海宇本善之心教以明經而修行鳶魚飛躍鵰鴞横翔戰藝江浙之郷闈餘三十路登名賢能于天府纔廿八人自笑衰頺敢儕英彦如某者箕裘舊業簪紱寒宗心繹四書何待今日腸搜千卷已迫暮年本無一毫欲進之心忽際千載難逢之㑹庠序不令其知覺名遽報於亷車縣路遂見之施行據例申於省戸無僕而挈子以徃乏輿而行陸以還嗟樗櫟之散材勞桑榆之晚景艱辛萬狀病足甫瘳驚忝一名驚心愈甚單薄敝緼敢言觀上國之光羞澁空囊何以渉脩途之阻顔駟已老揚意徒逢加孟德頭風之忽纒似王式逿地之時作兹䝉敦禮亦旣優隆分今膳學之資倣古續食之意然癃病之勿遣具載漢書雖俊造之同升有慙國士况衆人方勞於競進而小鳥獨倦於知還是惟不聞當䝉見憫知感知自以謝以辭兹盖伏遇總管大叅相公先生政比龔黄名齊召杜親迂熊軾之貴斾特出於邦郊俯憐鮒轍之窮恩不垂于江水豈忍下士之危苦願申大府以保全倘沐矜存曷勝欣幸某敢不隨其未没之齒欣兹尚在之心雖不能如晁董公孫芹君父而廣千言之對或可以紹周程朱氏模弟子以綿一脉之傳感德彌深脩辭祗淺謹奉啟事躬詣台階塵獻伏惟台慈俯垂鑒念不宣答黄求心賀發解啟眷契弟陳某右某啟伏以試紫薇省浪戰千二百人之塲分丹桂枝濫滿一十六相之数未謝切磋之益先厪慶問之貽衮褒過情圭復増愧恭惟府愽翰林求心先生江夏望族紫陽碩儒州麾制閫之世科早宜青氊之繼繼季考月書之都選纔立赤幟以頻頻此行偶魚漏於網中髙舉仰鴻㝠於漢外新聞長道價而倍收實效豈比冒文聲而徒竊虚名因傳末交亦與後榜諒為吾徒而增喜亟令子墨以騰緘君實景仁有如同氣而異姓王楊貢禹何當在位以弹冠好切于心如出其口不覺脩辭之過遂㤀執禮之恭某壮志已灰衰髯盡白近既行而中悔懼冬仲而逺征旅館之題欲塗烏本心可見文卷之成僅塞白同志所知餅不可餐而雷殷于中衣雖徒掛而日逼其上初殊苦甚後略如之蔑春蠶食葉之從容騁渴驥奔泉之迅速使力嘗盡復吉不分未必癩頸之陳三遂逺舉首之王十今亦幸矣尚何言為然汗顔浹背之時至越南而尚病當堕指裂膚之候詣燕北而豈全兄尚為憂我寧不懼惟冀斜日得保餘年其譲諸子以歩瀛州踵晁董公孫之對尚與先生而宗洙泗翼周程朱氏之書權謝臯稽鑒融榮幸謹奉啟事申謝伏惟尊慈俯垂鑒察謹啟代竹所賀呉教諭南忩發解啟伏以司泮宫而發解歸去来兮謁吏部而超遷自此升矣喜初囘於繡嶺信増耀於錦鄉足為深欣矧䝉造就恭惟州来季子之裔紫陽闕里之英倚元亮之南牕卓然素志仰退之之比斗頼此羣心起長泉壑之堂兼教桑梓之郡望近孚于青佩聲逺播於金臺又據臯比乎兩州凡新鳯厯者十載處士星照少微之閣既書檠之分光嚴灘月流子陵之臺復詩囊之爭響博士凡三為矣天池其一飛乎雖墨綬雖朱幡徒發勞人之嘆必粉省必黄閣始究真儒之功庻㡬可文學之鄧元侯逺紹若敵國之大司馬敢述輿頌豈曰私言某樸􅈪㣲材葛藟同本實三生之厚載荷一見而垂情久慕客星因束書而来訪䝉庇宗老葢倚席之懐慚孤金鑄而倐去倐来伏玉成而善終善始豈無他人不如同姓非徒藉提挈于今兹先收棟梁次拾桷榱殆又頼帡幪于他日其諸贊慶㒺既敷敭賀呉竹所授本邑教諭啟伏以花縣比子男之國有序有庠木鐸振父母之邦善教善諭劄頒藥薇之省譽馳芹􅇨之濱位雖淹于三年歡已騰于萬口恭惟儒林先覺侯泮名流華胄遥遥世不乏于季子竹香細細日何可無此君推經笥之素充羡筆鋒之最鋭圓文嫓陳君舉讀之若盤走珠講篇肖陸象山聞者将汗流雨衆瞠其後多瞻在前沿泝紫陽四書之源漫潤嚴陵七里之瀬業講魯齊之㑹聲在梁楚之間盍自此而横飛乃不屑乎躁進兹受知于當路遂職教于家山喜氣播殷雷之聲迷途望標月之指臯比肆展新青衿多出舊青衿麈尾重揮昔絳帳宏為今絳帳矧初新于品式值首飭于冠裳手板雖槐璧珪攸始身章方褐金紫所基更兼樸角之横烏換却深冬之立鵠觀瞻聳若模範偉然竚聽横經之精微頓洗倚席之塵陋新媺士習不愧盤洲之學碑大振家聲盡發端翁之詩藴某蘭交素比相悦尤深僭成四六之鄙辭畧寫萬一于盛事先生自此升矣将收為明堂之棟梁小子其何述焉更願紹中林之蘭蕙鋪棻㒺極悃愊徒増寄馮伯田先生啟伏以清新庾開府久慕詩聲聦明大馮公今瞻道貌不得拜於席下殆虗生于世間謹脩函丈之恭略紓方寸之悃恭惟路教察判秀石先生儒林老宿喬木故家由鴻石以来接東魯淵源之正自蠶叢而出禀西州流峙之英文章鎮于東南學問根乎家世紛若麒麟楥幻海市以誰存詭然蛟龍翔巋靈光之獨在莫施所藴大肆厥詞平生幾千篇近不屑西江之𣲖挽囘数百嵗直逺追唐世之豪萬户可經三公壓盡妙哉吟卷長流天地之間偉甚聲光若引星辰之上聿敦棠棣言觀泮芹遂令萬仭之屏盡識二南之範天開幸㑹人頼作成向者味先生之詩僅得諸虚谷之序芬芳一臠何如列鼎之全珍清泠半瓢孰愈飲河之充量今願竊有請也不識可得見乎某硯鉄未穿鬂霜已染假鄒君之館餘二十年補魯泮之員才三兩載幸入大聖爐錘之造略聞中原文獻之傳塤箎之吹式和金石之音復振子由之為陳教適復遇坡老之来文潛之事黄門要亦為長公之客倘與其進敢昧所傳寄吕教授求移籍啟伏以效顔淵之潛心素知尊於聖道如子春之傷足恐或戻于齋䂓謹殫拙訥之辭仰致圓融之懇竊惟州縣立學雖有逺近之殊國家待儒初無彼此之異惟自嗟于困頓難常窘于奔波必将適百里而宿舂糧始能毎一月而陪釋菜貧寧辦此病復謂何如某者少也不如老之将至秃鶖可笑久如韓子之頭童鷓鴣見憂復類叔山之趾兀名久掛于學校身樂就于範模業在芸人事難由己無東家蹇驢之可借惟南阮犢鼻之自慙與其默默而遭譴訶孰若拳拳而聲悃愊謁殿稍近姑願附于邑庠醫療随常容再還于郡泮尚冀蛾子之時術豈終鷁陣之退飛矧在邇年爰多舊例如金同舎葉同舎之有請蒙楊先生鮑先生之見從引援以言凌兢曷已自非明哲父師之在上孰養疲癃弟子之不中兹盖伏遇允矣儒宗蔚然夀俊鍾竒廬阜傳道學于一燈擢秀橋門振文聲于六館屢趍泮水聿来富山鋪張白鹿之遺䂓訓迪紫陽之闕里遂令礦質亦累鑄爐今兹憂病而憂貧㡬若自踈而自外然異世能啟洙泗之堯舜而一時難化唐虞之共兜豈邇之云乎亦心親而已倘許其便寧昧所傳某敢不鏤骨銘膺銜恩報德益加鞭䇿不負甄陶豈必朝夕于旁在楚猶在晉也誓将心目常見于墻復于羮焉毣毣有懐詹詹㒺既謝曹𢎞齋撰族譜序啟伏以族冷如氷名愧舊爐之鐡文華於衮價増敝帚之金聿降錫類之仁辱取敬宗之義榮實均于同派感豈獨于私衷竊惟本支所貴于有圖文行豈容于無紀故族譜法明允自先世而已傳然事状效履常亦後人之當務不量輕率略效編摩非印正于名公難灼示于来裔因輙過門而弄斧豈期閉戸而造車兹盖伏遇某允矣儒宗蔚然夀俊為貞元之朝士不愧初心聞正始之遺音樂傳晚進致令狂斐獲遂依歸悔不早于擔簦詎敢云于傾葢謁臯比而䝉倒屣揮麈尾而許對床因出汗牛之書俾遂窺豹之願乃知家乘正續三編爰篤宗祊已先一著自厚葛藟庇本根之愛因興草木同臭味之憐不吝温辭増輝寒族褒嘉過矣慙竦若何拈䇿第之相仍使其知本乎祖悼决科之悠邈勉以不慚乎天藥石意深珠璣辭溢某敢不益加刻勵期稱奨題不亢身焉亢宗惕若綿力薄材之懼自成已以成物侈哉殘膏賸馥之霑感刻何窮鋪棻㒺既賀金滄洲六十啟恭審欣遇夀辰有殊常嵗六十花甲從頭喜于又新八千椿年偻指延于惟永稱觴莫遂揮楮以陳香雲想繞于滄洲歡聲更殷于京兆族茂而貂蟬熾競觀戱綵之重重春歸而櫻筍来且樂傾盃之灧灧芹贄良眇莞頓為榮賀山泉汪氏娶溪南呉氏女啟蘭階喜溢梅實吉臨在户三星光照山泉之下盈門百兩来從溪水之南召不果于鳬趍誠略将于燕賀延陵禮樂已先傳世世之芳内翰文章定永紹猗猗之譽甚慚輶瀆所冀莞存復襟兄賀生女啟昨之甥館幸親炙于譚私兹辱管城特逺貽于谷扎剝封荘誦隐几懐慚乃以蝸廬遂符虺夢既殷勤而慶問復璀璨以寵頒下拜周章中藏感激彭澤慰情之語雖則云然茶山少盗之吟寧無可笑亟兹展謝尚需嗣陳賀趙巽齋生曾孫啟恭審于門善積謝砌瑞重託橘頌之曽枝孫又生子表萱叢之豐本髙遂見𤣥三日氣見于食牛盈月標覘于峙鵠某莩盟有忝相悦惟多采彼香芹列諸副楮聊申燕雀之賀用慶鸑鷟之竒踰九􅐆望百齡頻稱觴而上夀誇一門聚五世想含飴之開顔盛事誰肩菲辭難罄賀呉南忩授婺源州同知啟名夢炎解篆花封䟽恩芝檢牧文公之闕里風月平分比彦章之鄉州城郭至重民方歌于来暮公暫賦于閒居某初忝莩盟尤深相悦謹脩尺牘用表寸衷衣錦何殊本新安郡之疆域把麾甚樂紹江南守之治平賀汪溪金清父孫成婚啟兹以震子成婚冢婦協吉自延陵之華閥兩小無猜配滄洲之聞孫二美允合花燭燦燦桃葉蓁蓁禮漫存羊賀已㡬于後至傳誇占鳯昌必應于先占輶瀆甚慚莞存斯幸賀古墩嫁女啟玉愛之歸及時桃華正灼金屏之開有日蓉褥将門矧肺腑以連姻宜手抃而交慶夫以月上之宜室何殊靈照之在家遇采鸞之仙想沸歡聲於韓土得乗龍之壻應多喜色於吳門寓敬茶香儌榮莞粲賀呉子靜娶冢婦啟恭審二陽之月三星在天詩詠摽梅属長子之主器禮嚴采􅇨迎爾相以承宗向平之畢債将新蒍賈之稱賀敢後彘肩初解巽羽先嗚有媯逺育姜宗婦道豈殊于臣道呉氏世生季子今人何遜于古人期望頗遥涵容是幸答吕竹忩納幣啟忩繞子猷之竹市隠甚髙居同謝安之墩山棲自適好允諧于二姓盟實定于一言伏承魚書之雲絢鴛錦之霞明味叶蘭金榮深葭玉申國教法嚴甚定成令子之達材處默嫁具蕭然敢援昔人之佳話權謝不恪揆叙未央賀汪覺翁授府判啟恭審芝檢榮膺竹符分佐江西地千里推吉水為名州斗南公一人枉髙材而俯判勅書星耀喜氣雲蒸賀敢後于常倫分况居于世契莫将尺楮爰采半芹以斯道覺斯民志本同伊尹之志佐天子相天下堂期新伯産之堂贊頌罙深涵容是幸楊學正啟載道脉于南紀濟美龜山續詩派于西江齊芳誠叟喜正始遺音之尚在嘆貞元朝士之無多漫仕而不擇官分符而居為正趙學錄啟大雅不羣英材無敵演迤天潢之舊派公子翩翩壯觀星水之新州人物表表將縉紳于朝著姑領袖乎儒流發軔仕塗弭節鄉校謝送蟹啓伏辱郇雲特貽郭索好詞嫓白既誇虀臼之辛半殻含黄雅稱橙醯之釅居然䝉此何以報之愛公子之無膓固合蹣跚于湯鼎非吏部之左手安得拍浮于酒船得之若驚言不盡謝約族人葺鬲山祖墓䟽伏以人本乎祖年代逺而易忘精至于神祠墓存而可攷惟我陳氏實望他宗粤從唐末之時来自嚴陵之郡居藤溪里歴世熾昌􅌾嘉善鄉一方尸祝為潁川之始祖號鬲山之府君廟貌雖嚴丘墳漸圯夫以總總林林之里社尚致敬于鷄豚豈有䋲䋲蟄蟄之子孫乃不如于豺獺雖嵗年之已久然地里之非遥今當大德甲辰議就季春榖雨敷青蚨之現鏹標白蝶之寓錢因葺眠牛之岡瞻遺像洋洋如在庻生下馬之敬覘吾宗世世常興凢預兹行請題于後修築貯水塘疏伏以復鴻潦之波兆朕應繇黄鵠灌鱗圖之畞修築須頒青蚨惟兹延充塘素為亢嵗備中因廢弛久莫支吾是以當炎官火傘之張欲救禾苖焦卷此乃類海洋尾閭之泄惟見泉脉乾枯枉怨天時坐失地利今将效躄浮圖之起廢其可令巧媳婦之擎空期協衆心䂓増舊製加塍圍白虹之隠隠儲水灔綠鴨之粼粼弗為胡成有備無患凢今番出費之户即他時承溉之田詳具于前幸題于左畚若雲杵若雨興工行見一新稼如茨庾如京獲利定應十倍新塘嶺施水菴疏伏以一間佛屋與白雲分㡬盞義漿如甘露美惟此新塘嶺實為古路頭宜建亭憩足力之疲勞將施水潤舌根之枯涸雖略經始誰與成終證盟藉普陀觀音質慈悲而無愧圓覺投檀那施主信福夀之有歸星洲寺疏伏以星化石而羅洲渚寺已半于千年木經火而飛烟埃工欲施于一旦夫豈小力量能成大䂓模将悉慿月斧風斤盡與新寳坊金地頂禮檀越心發菩提化筆大書而特書景福已至而益至認祖師西来意象教莊嚴符莊子南華經鵬程奮迅勤拳誦波羅蜜報答結歡喜緣乾静専坤動闢實上祝聖神萬萬之年革去故鼎取新豈但庇前後三三之衆心田菴上元疏伏以珠緯躔十二官萬民司命璧月明三五夜一嵗上元當天官賜福之辰正人世奏星之日受籙者乘兹而閲籙有生者期至于長生災曜伏吉宿臨斡神機于道域修禮耕陳義種分善果于心田祈夀年華請書初度謹疏定宇集巻十一
