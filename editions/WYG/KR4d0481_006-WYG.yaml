body:
  text: 定宇集卷六元陳櫟撰說深衣說古者衣與裳殊所以别上下也惟深衣之制衣連裳而不殊簡便有法被體深􅃉故曰深衣古者深衣盖有制度以應䂓矩繩權衡言古者雖泛言之然有虞氏深衣而養老則虞時已有之其古可知矣應䂓矩䋲權衡言深衣之法象也詳見下文短無見膚長無被土此言長短之中也短而見膚則䙝矣長而被土則汙矣故以及踝為凖裳之下齊止於踝則固不見膚亦不被土而長短得中矣人之身長短不齊不可以一定拘故不言長若干尺寸而以此二句酌其中也續衽鉤邉按鄭氏註云續猶屬也衽在裳旁者也屬連之不殊裳前後也鉤如鳥喙必鉤之鉤鉤邉若今曲裾也鄭氏所注曲裾今不詳為何狀後遂求鉤邉於裳十二幅之外謂别用布一幅綴而垂之裳之右旁朱子初年家禮亦有曲裾一條盖以此也後自悟其非謂連續裳旁合而縫之無前後幅之分即為續衽左右交鉤再覆縫之即為鉤邉其說詳見楊氏附註家禮中今皆遵用是固然矣然又按藍田吕氏之釋此句曰衽者衣裳之旁幅也玊藻所謂衽當旁是也衣之旁幅下殺裳之旁幅上殺上下之衽相續而中曲以是小要取名焉故曰鉤邉愚嘗即吕氏說而深考之以為深得記禮者之本意盖衣裳之上下相續他衣不然惟深衣為然此乃深衣之大節何可沒而不言苟續衽鉤邉但依前說訓之是一篇中竟無一字及衣裳之相續也人何由而知之乎兼衽乃衣襟之稱如曰斂衽曰左衽可見非特裳旁為衽也衽指衣裳之旁兩幅而言旁兩幅既上下相續則其中諸幅之上下相續不言可知矣又衣下殺而裳上殺則上下皆濶而腰獨狹其形自彎曲如鉤焉續上衣下裳之衽而如鉤形于兩邉以此釋續衽鉤邉不亦理明而辭順乎且著書立言必有體統有次第故記此篇者先以應䂓矩䋲權衡言此衣法象之詳次以見膚被土言此衣長短之中又次以續衽鉤邉言此衣上下連續之形又次以要縫半下言此衣要圍下齊濶狹之宜是此數句先言深衣之大體然後方以次及其他之節用也所謂要縫正是接上文續衽二字而言盖􅃌上下連續之縫耳不然所謂縫者何縫乎不應不言衣裳之相續而遽及裳旁之線脚記禮者恐不如是其捨體而先細碎也又按今士友所服深衣多于裳旁左裾之末裁為圓形此得非因曲裾之說以是為鉤邉乎夫曲裾之本說自别用一幅垂于十二正幅之外非就裳之正幅而圓其裾也且下齊如權衡以平為貴今圓其裾不平孰甚焉且圓其裾於義何取不圓之于義何缺乎古圖及朱子家禮圖其裾並與他衣同截然方整即無圓其旁之形此乃世俗謬誤之尤者不可不革也楊氏注云衽謂裳幅所交製也凡衽者或殺而上或殺而下是以小要取名焉衽属衣則垂而放之属裳則縫之以合前後上下相交篇韻衽字注衽裳際也韻畧衽衣襟也際謂邉也畔也裳際曰衽􅃌裳旁幅之訓盡矣當矣要縫半下縫即衣裳相接續之縫也要縫謂衣裳相續之縫正當腰也半下謂要縫之濶半于下齊之濶也深衣之袪袪謂袖口尺二寸圍之為二尺四寸三之為七尺二寸玊藻曰深衣三袪盖謂腰濶七尺二寸三倍于袪圍之二尺四寸也要七尺二寸下齊倍之則為一丈四尺四寸是要縫半于下齊下齊倍于要縫也如是則腰狹而貼體下寛而行便且雅觀而儀肅矣袼之髙下可以運肘袼當腋之縫也今俗呼為掛肩袼之濶狹以可以運肘為度玊藻曰袂可以回肘是也袂之長短反屈之及肘袂之長短以能反而屈之及于肘為度家禮為袂用布一幅附注謂不當拘以一幅是矣布幅有濶狹一幅屈之不及肘則增之可也帯下無厭髀上毋厭脅當無骨者此言繫大帯髙下之中也髀股骨也安大帯處下不可厭髀骨上不可掩脅骨只當脅下髀上無骨處臍中是也制十有二幅以應十有二月此言下裳之法象也前後通十二幅以應一嵗十有二月之象則天數也曾文清公深衣詩曰皇天分四時寸晷不少留斂取著邉幅危坐嵗一周得此義矣袂圓以應䂓曲袷如矩以應方負䋲及踝以應直下齊如權衡以應平故䂓者行舉手以為容負䋲抱方者以直其政方其義也故昜曰坤六二之動直以方也下齊如權衡者以安志而平心也五法已施故聖人服之故䂓矩取其無私䋲取其直權衡取其平故先王貴之此一節詳言深衣之法象以終篇首應䂓矩䋲權衡之意也袂圓謂胡下此以應䂓之圓家禮謂袂本之廣如衣之長而漸圓之以至袂口則是袂本不殺獨袂口殺也吕氏謂袂有侈者朝服是也有端者𤣥端素端是也有圓者内殺于袷外殺于袪中則胡下深衣是也是袂本内殺袂口外殺也深考之吕說為優兼袂本内亦殺之則半䂓之圓形方成而袷與要縫之間其形之彎曲如鉤尤為自然而親切且便于著而雅於觀也袷領也領交於胷其勢自方此以應矩之方負䋲及踝謂衣背與裳中幅之縫一直相當如負一䋲以至脚踝也此以應䋲之直下齊裳下緝也齊一無長短之參差此以應權衡之平行舉手註謂揖讓欲行者舉手以為容儀如䂓之圓也盖必舉手始見其圓若垂手則不見其圓矣䋲直在背故曰負矩方在胷故曰抱如曰負隂抱陽盖取坤六二直方之義以互相發明也五法䂓矩䋲權衡也要之不過方圓平直四者耳曰聖人服之曰先王貴之盖以衣之中衆義備焉正所謂先王之法服也學者捨是將何服哉誠能服其服思其義踐其實則善矣故上衣下裳有乾坤定貴賤位之義焉思其義而上安于上下安於下可也裳十二幅又有四時十二月之義焉思其義而其仁如春其禮如夏其義如秋其智如冬其發舒如開物之寅其斂藏如閉物之戍之類可也應䂓矩䋲權衡有方圓平直之義焉思其義而智則圓行則方直其内平其心可也布色白有質之義縁或繢或青有文之義焉思其義而文質彬彬可也衣之長短酌長短之中袷與帯之髙下酌髙下之中縁之大小文素酌大小文素之中思其義而隨時取中以適時措之宜可也是衣也無一節而無法亦無一節而無義又在乎服之者能觸類而長耳故可以為文可以為武可以擯相可以治軍旅此言深衣之用文武皆可也可以擯相即可以為文之一端也可以治軍旅即所謂可以為武也吕氏曰深衣之用上下不嫌同名吉㓙不嫌同制男女不嫌同服諸侯朝朝服夕深衣大夫士朝𤣥端夕深衣庶人衣吉服深衣而已此上下之同也有虞氏深衣而養老將軍文子除喪而受越人来弔練冠深衣親迎女在塗壻之父母死深衣縞總以趍喪此吉凶男女之同也此又可見深衣之用其廣如此有非止乎記者之四言也完且弗費善衣之次也麻冕用三十升布為之則細宻難成深衣用十五升布則非極細矣其制完且其費輕故曰完且弗費也善衣朝祭之服也自士以上有位於朝有職于祭自有朝祭之服除朝祭外皆可以服深衣則深衣為朝祭服之次者也庶人無位則深衣其盛服矣無次矣具父母大父母衣純以繢具父母衣純以青如孤子衣純以素尊者存以多飾為孝故髧彼兩髦盡孺子之飾以致孺子之慕焉况大父母父母俱存即世所謂重慶者安可以不盡飾乎故純以繢繢畫文錦之類也具父母則純以青有所殺也變而通之大父母存而父母沒者亦惟當純以青而已孤子當室衣冠不純采故孤子則純以素可也注云三十以下無父稱孤三十以上有為人父之道不為孤矣意此注為三十以上而已終喪者言非為三十以上正居喪者言也家禮唯曰黑縁畧無分别意者酌青素之中而通用之然全不合記禮者之言有所未安今世俗具慶則純青永感則純黑盖即記與家禮之說而參酌用之然純黒終不合于經文也純袂縁純邉廣各寸半純袂飾袖口也縁飾裳下齊也純邉飾衣裳側邉旁幅也三者之純各廣寸半唯袷廣二寸其文見于玊藻與此互相備也袷獨廣于三處者衣必振領如網必提綱領縁非大無以别于他縁綱大目小之義也此所謂寸皆用尺之寸此邉訓為衣裳側邉旁幅則鉤邉之邉意益明愚於丙戌秋述深衣說盖即鄭注及諸家說而參取之丁亥春始得見玊山曹念齋易之深衣圖解因以其圖參之禮記注之圖然後方知先儒幅數前後多寡之未當與世俗圓裾之誤之所由起也盖上衣一幅綴下裳三幅以一統三有四時統十二月之象雖於講說可觀而終於服著不便直領衫所以可只用四幅者以其裾直而狹故也如褙子道服其裾攙濶則必不可只用四幅須于靣前各攙一幅矣今深衣下裳之濶如許而衣之前靣其可只用直領衫之幅數乎况禮記古註前靣之深衣圖上衣之制已攙一幅是通衣前後用六幅也又証之三禮圖古朝祭之服未有衣前不攙一幅者况經文唯曰裳十有二幅耳未嘗有衣四幅之明文也其所以不言衣之幅數者盖以此衣唯裳之幅數與其他朝祭服裳用正幅如帷者不同故不容不特言之若上衣則與他朝祭服同可不必言也今上衣之制欲遵用記註古圖之幅數前後通六幅此一說也裳十二幅先儒惟喜以一幅衣統三幅裳之說故以六幅在後六幅在前後之六幅平鋪相連而前之六幅兩裾相掩是前以三幅當後六幅濶狹不均莫此為甚其勢不容不反捲向前而腰半齊倍之形不復可見矣記註圖及曹氏圖皆以四幅在後四幅在前前四幅只右邉一裾可見左裾一邉為右所掩不可見是前以八幅相掩而當後之四幅即十二幅而三分之每衣一幅連裳二幅前後濶狹均勻整齊而腰半齊倍之形顯然自見其與衆人所製大不侔矣今下裳之制欲遵用二圖之前八幅後四幅此又一說也若曲裾之誤盖出于禮記圖下之註其說謂裳下圓其形如鉤恐其下垂而不齊也此過慮之論也今縫人裁衣凡裾之用正幅者皆于下末㣲裁起其角恐四裾垂下故也若深衣之裳不用正幅交解裁之狹頭皆在上濶頭皆在下數幅相連其角自起决無四裾垂下不平之弊亦何必輕動刀剪裁令㣲起乎且記圖之註雖云爾而其圖之裾初不如今世俗之圓其裾角也他如家禮如曹氏之圖莫不並如他衣之裾並未有圓裾角之形且其為說不過懼其裾下垂不齊耳今試不圓之如鉤果下垂而不齊乎今裁圓之反上彎而不齊耳世俗之圓其裾角于形何取于義何當于圖何本乎注禮記圖者誤認鉤邉不善立言以致誤後學于無窮深可惜也大帯之制曹氏考之為詳玊藻曰大夫素帯辟垂士練帯率下辟注云大夫裨其紐及末士裨其末而已裨即今帯旁之小縁也紐大帯兩耳也末大帯兩耳下之直垂到地者也大夫縁大帯之兩耳及末士則不得縁兩耳但縁其末而已士接大夫之下乃有位之士如上士中士下士云者非儒生之士也下文云居士錦帯弟子縞帯則今之居學校為儒生者惟當遵用縞帯之制純白而不縁方為當耳今世或有縁兩耳者是僭大夫之制也又或有通背後盡縁之者是僭諸侯充辟之制也盲然妄作亦獨何哉至若裁衣之法當以各人之身為凖古尺今尺指尺皆有所不可泥亦有所不必泥者先圍其腰之濶自左衽至右衽尺寸若干然後以之定袪袂之濶狹用三分腰圍之一以為袪以合于深衣三袪之制又以之定下齊之濶狹倍腰圍之濶以為齊以合于要縫半下之制此濶狹之凖也自腰以上量之以至于袷以酌衣之短長自腰以下量之以至於踝以酌裳之短長此長短之凖也此其大畧也聞愚說者未必不曰衣用四幅裳以三幅上綴衣之一幅未嘗不可服也殊不知今之服是者懵不知其制度徃徃只據縫人所製不復過而問焉縫人往往以意那融何嘗合法所以差可著耳若十二幅勻分無分毫濶狹之殊乃欲以後幅平鋪之六當前靣相掩之六其不可著如愚前言之弊必矣然亦多習而不察耳上衣之前二幅則太狹下裳之後六幅則太濶後不貼服而前太廹窄此弊之必至者孰若愚今所考之濶狹得宜均匀齊整不背于經不戾于古乎又未必不曰衣四其幅裳圓其角之類衆多然也今不然則不入俗矣殊不知深衣古聖人之法服也今服是服將求合於今乎將求合于古乎天下事當論是否不當論同異苟其是也雖異何病有真見者將必同之其無真見者之安于謬誤奚與吾事哉又未必不曰學文公之學而深衣不用文公之說柰何殊不知文公家禮成于初年未㡬為一輩行竊之終身不及見以故終身不及改是以未嘗為學者道之至文公塟日始有錄之以来㑹塟授文公季子敬之者然後此書復出此說見于黄君㽦陳君淳之語録今載之楊氏附注家禮中非不明也文公諸書終身修改後来定本其中有與初年所著全無一語同者使家禮不失公及改之豈終于此而已乎今必執家禮以為據則曲裾之添布一幅黑縁之畧無分别上衣之長僅與袂本齊非不明載于家禮也今何為不遵用之乎愚盖以求為真是之歸者學文公而不敢泥未定之書以學文公也且前說之云云皆有所因述無一字出于臆說者極知不韙無所逃罪先覺君子幸察而教之至元戊子三月櫟又書定宇集卷六
