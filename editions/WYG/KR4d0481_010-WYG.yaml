body:
  text: 定宇集卷十元陳櫟撰書上許左丞相書延祐二年正月吉日學生新安陳櫟謹齋沐裁書拜獻于左丞相公先生鈞座前櫟聞之周公徃百世無善治孟子沒千載無真儒無善治聖賢之道不行無真儒聖賢之道不明道不行而猶明焉以其講明見諸推行道猶有可行之日道不行而併不明焉則人心昧昧乎莫知所之而道終無可行之時所謂百世無善治者如漢之蕭曹丙魏唐之房杜姚宋非不可佐天子相天下而事業終有愧於古所謂千載無真儒者漢儒莫如董仲舒然言正心而不及誠意唐儒莫如韓退之然言誠意而不及格物致知是以雖能著衛道之功于一時而無以任傳道之責于萬世故孟子而後能為徃聖繼絶學而任傳道之責于萬世者曰近世之周子程子而集周程子之大成者有朱子焉朱子之學初明于東南而未明于西北恭惟先正魯齊先生鍾乾坤之間氣于覃懐而挺生眞所謂豪傑之士北方之學者未能或之先者也首宗朱子心㑹身行遭時得君倡鳴道學上而啟沃乎聖主次而啟迪乎儲皇又次而作成乎賢士夫夫其有功于斯道大矣以不世之眞儒佐聖世之善治道不特明于斯世且将行于斯世矣天不憗遺賫志以徃善繼善述有先生焉孔孟周程之嗣子未聞其家學䋲䋲如先生之繼先正者天獨厚于先生天其無望于先生乎聖主繼興緝熙聖學開文明之運為科舉之行贊皇猷定科條壹是以朱子之學風勵海宇以經明行修責望多士先生之功居多親勞徒御策馬南来江浙省闈躬為董督壹是以寛厚加惠多士先生之功又居多政聲洋溢豈乆外藩不日召還又閳相業使道之未盡行于先正者盛行于先生繼孟子之眞儒成周公之善治天下蒼生不于先生乎望將誰望哉此不特天下蒼生之所望聖天子之望也而實天之望也有如櫟者新安之晚學也生文公之鄉讀文公之書少知㽞心老尤篤志學校縣府舉之以應鄉試偶爾儌倖近嵗前十一月間貿貿比來將侍同行赴都㑹試豈謂薄命感冷途中到此之初即已伏枕是以雖欲首拜光範之門而不可得至十二月初六日衆皆舟行病魔獨尼之今療病理甫瘳期限已迫勢已不能前進觀國之光則惟有退而守先王之道以傳學者而已然不一拜下風望大賢之威儀聞一言以自壯則是將虗此生全虗此行也竊惟文公闕里乃古建古歙二州二州儒士素盛于東南實頼父兄師友之教耳濡目染有素而然所謂魯無君子斯焉取斯者年來老成凋謝後學荒唐寖不如前良可慨嘆而又任庠序之教責者多非其人又所謂以其昏昏使人昭昭者今兹鄉舉猶幸古歙掛名者有魯兩生不至大為文公羞焉櫟二十年來畧有編纂不敢一毫不祖述乎朱子又或就其臼窠中而發明之于語孟有口義于易有讀易編于書有書解折衷于詩有述傳句解于禮記有集義句解于史有增廣通略之類貧不能刋僅所刋語孟口義一書而已羽翼先儒之書以模範子衿之軰雖自弱冠以來不能一日舎筆耕而食然及人者終有限焉區區之愚不無望于先生先生矜其貧病而遣之歸乎唯命其許之待後舉而赴都還試乎亦唯命其或造就之任紫陽書院山長或任徽路學學正使得以朱子之學迪後進以續紫陽之燈乎亦唯命願先生歸相聖天子繼先正以明此道于天下櫟也不敏亦可畧助明時使斯道略明于朱子之鄉焉干冒威尊下情無任惶懼之至上秦國公書延祐二年八月吉日學生鄉貢進士新安陳櫟謹齋沐裁書百拜獻于平章大丞相秦國公鈞座前櫟江南一寒士望翹材館逺在九霄上安敢輕以書瀆若稽昌黎韓子亦嘗以鄉貢進士上書光範之門以此例之或者其可又以黄清夫相門之客櫟之良友也託其貢書似非無因而前是用忘其㣲賤輕叩洪鈞首祈相度天寛略垂聼焉櫟聞之姫公沒百世無善治亞聖徃千載無眞儒無善治聖賢之道不行無眞儒聖賢之道不明漢唐以來徃徃坐此恭惟國公大賢間世遭時得君可謂繼亞聖之眞儒􅃱姫公之善治逺方寒士雖不能盡知輔相大業然海宇蒼生沐浴于深仁厚澤中豈非聖賢之道得公而行乎科舉宏開昭昭然以朱文公之學揭日月而行之天經人理復浸溉士心聞皆公所建白豈非聖賢之道頼公而明歟櫟也幸際斯時忝與士類前嵗應江浙鄉試偶在選中結友買舟期應㑹試亦既至古杭行有日矣倐爾遘疾衆行獨留療經逾年甫得痊愈試期已迫度難奔趍然亦不敢擅自歸也告狀杭州路録事司勘㑹移闗始克還家㝷繹舊聞以待學者繼獲覩書坊所刋㑹試程文内有科録程試該載聖㫖内一欵如櫟等不曽㑹試病患來遲之人亦許得與寸進堯言逺布信如四時猗歟盛哉眞激勵作成之大造也櫟生于前壬子嵗犬馬之齒于今六十有五矣羣材皆春散木尚槁豈造化之有偏特未有聞于鈞前已耳櫟也生朱文公之鄉學朱文公之學自少有志至老彌勤發揮先儒之所未盡言諸經㡬遍雖假館授徒不能一日捨此以食然其及人終不為多倘䝉鈞慈欽遵已降聖㫖照年六十以上例除櫟一泮水近闕使得及此已老未衰之年以平生所聞于朱文公者與諸生講明而躬行之作養成材以待選舉或使道略明于鄉郡則未沒之年皆感戴之日也謹託清夫為聲悃愊惟國公垂憐焉干冒威尊恐悚無已櫟再拜上馮路教抱甕先生書五月吉日學生成德齋生陳某謹齋沐裁書再拜申呈于路教翰相先生某聞盧誕有言曰經師易求人師難得所謂人師者何也非童子之命之師也非一卷之書之師也非家有塾黨有庠之師也道高一時名重一世家傳文獻淵源之懿身任人物權衡之責夫是之謂人師之人也生而時焉之不同不可師也時同而地焉之不近不易師也其時同而地近而其勢分之大相遼絶雖欲師之而不得師也若夫經師者由百世之後等百世之儒以方寸之天君對方策之聖賢一開編而可得也奚其難今夫求馬必于冀北求木必于鄧林求學問文章必于鄒魯也漢之淵雲宋之范蘓皆以蜀珍雄天下今先生實以之今夫后稷之孫無倩穡伯夷之兒無奪席其所耳濡目染者有素也是以論其世也故衣冠之家有閥閲豈惟衣冠哉學問文章也亦然聞先生家自鴻碩先生以來世傳學問之燈世擅文章之録則先生眞學問文章家之有閥閲者也而又刻苦以世其傳沉酣以飽其蘊腹萬卷書足萬里路以老懿身任人物權衡之責者非乎櫟也以時論則幸與先生並世而生以地論則先生適來教于吾州以勢分論則先生師也櫟亦可備弟子列者也以人師之難遭而幸其機之適遭不求師之將何時哉此櫟之所以來也抑又聞先覺者教人後覺者教于人教于人者而不遇名師儒是求珠玉于鶉衣而怨其不吾予也教人者而不得才子弟是投珠玉于暗路而責其不吾受也故後覺之心每患名師儒之難遭而先覺之心亦患才子弟之難得昔薛公奎至成都得范景仁曰吾喜得一偉人朱文公至臨漳曰某來漳州獨為吾道得一陳安卿耳前軰之喜得才子弟甚于後軰之幸遇名師儒也櫟也生五嵗而讀書十嵗而能文十五嵗而僭為童子師始也科舉之法行于時文之外知有窮理之學不屑于時文而已也繼也科舉之法廢于吟咏之外猶不變乎窮理之學不専于吟咏而已也今也學不前人年不後人悠悠磋跎進寸退尺犬馬之齒且三十有七矣先生倘以為可教而辱教之雖不敢自詭于蘓門之晁陳亦必不敢叛去為韓門之籍湜也此又櫟之所以來也抑又聞先正鴻碩先生之春秋通解胡文定嘗採取之櫟願學焉而未之見也昔有欲讀書不能得而為人慵書以讀之者又有欲傳龔氏易而挾餅代食以求𫝊者櫟也竊有志焉先生倘矜其立志之勤而慨然肯以家傳之學傳之是又因人師而得經師也此又櫟之所以來也惟硯是田無税可役其來也實異乎衆人之來是以先陳此書叙其所以來之意惟先生其幸教之干瀆師嚴惶恐無已上張郡守書延祐元年正月吉日路學成德齋生陳櫟謹齋沐獻書於總管大學士相公尊先生台座前櫟嘗讀昌黎鄆州溪堂詩知東平為山東巨鎮乆矣近嵗以來中原文獻萃于東平表表竒偉有先生焉先生把麾姑孰以德行文章為政事有古人風今之士大夫無是也嘗恨不得以拜下風亷頑立懦居無何而先生為吾郡來矣某一介晚學附籍郡庠累重家貧假館苟活每一至泮裹糧倩僕良不為易兹聞先生下車方新士民胥慶前日欲拜而不得者今何幸將得而拜之所以勇于一行為吾郡士民賀亦以自賀并將鳴其私焉某生朱子之鄉學朱子之學性膏理髓嚅嚌迄今竊嘗編述發明朱子之説為論孟口義編書解折衷詩述傳句解禮記集義句解等書鑽研探討捨朱子之書不好也幸遇聖朝肇新科舉一以朱子之書風勵多士鯫生平生所學庻㡬少可自見學校公舉以充職員某也雖愚何敢自棄固宜聞之踴躍以期無負聖天子教養㧞擢之盛心奈何極貧無資莫能自致學校體例諸生年六十以上者給以月糧某犬馬之齒六十有三矣例當有請前時以館寓瓠繋未之敢請今兹幸遇先生學道愛人之賢師苟不仰首一鳴復何時哉倘䝉指揮學校給以三五月耆儒糧米使得少助徃來之費實拜生成之賜不淺鮮也某平生編述僅刋口義一書字細紙惡不便台覧冒昧謹獻一部或可以呈之舎人焉耳又有感于溪堂之詩曰謂吾公父孰違公令吾郡士民以之又曰公無斁遺此邦是庥先生以之干冒威尊無任戰栗俟命之至賀鄧祭酒書七月吉日契家學生陳櫟謹齋沐裁書百拜申賀相公匪石先生鈞座前某自别先生亦既累載聞先生得時行道超遷不一遷亦當修辭貢書特賀不一賀竟墮魯人之稽臯者以萬里寄書恐遭洪喬之浮沉也今兹乃敢飭尺箋瀆丈函以遇便極的保無石頭驛事惟先生垂聼焉先生自亷車而翰苑自翰苑而祭酒固古今儒者之至榮實今日儒臣之尤重自建祭酒以來責莫重于今日而先生身任之甚盛甚休多賀多賀竊惟祭酒之名其來尚矣古者主有盛饌賓推老者一人舉酒以祭故以祭酒稱昉自荀卿為齊三老稱祭酒焉漢之侍中魏之散騎常侍功髙者並為祭酒其名重矣而猶未也漢置博士十二人推聰明有威重者一人為祭酒謂之博士祭酒官漸重矣而猶未也晉咸寜中立國子學置國子祭酒國子之名見于周禮師氏以三德三行教國子保氏養國子以道而教之六藝則國子祭酒即成周之師氏保氏其官乂重矣而猶未也齊建元中置國學祭酒有改國子學為國子監仍置祭酒而唐因之又改祭酒為大司成未㡬復舊領國子學太學置祭酒一人専掌監學之政且令儲君受業焉執經講説必以儒學優重者為之其官愈重矣方之今日則彼猶未也恭惟先生世擅蜀珍望隆時棟備君子所教之五而模範賢闗焉推天下逹尊之三而羽儀朝著焉愚前所謂古今儒者之至榮亶其然矣所謂見當今儒臣之尤重果何謂也太學國子祭酒前朝有是官矣重是選矣為太學生國子生之宗師而已矣其于啟沃上心贊襄聖學未之及也欽惟聖天子聰明天縱緝熙月將俾祭酒之臣進陪講讀發明帝王心傳之懿講貫修齊治平之本于以紹道學於既徃開太平于方今皆責之于祭酒是合經筵賢闗為一官而委重于先生愚故曰見今日儒臣之尤重盖謂此也此盖即唐朝儲君受業之意而充廣之非近世太學國子祭酒専任學政之比也先生何以稱此尤重之任哉愚知之矣不出先生前所提調校刋之書而已矣大學一書君天下者之律令格例也眞文忠公大學衍義一書儒臣毗贊聖學之根本龜鑑也如有用我執此以徃先生平昔所有志而未得行者今得行其所志不在此書其將焉在上而啟沃下而訓誘竊料必已熟講乎此矣愚猶不能忘言者亦欲先生之知其知我心也贊襄聖學其本體也佐興聖治其功用也有本無用非學也以耆壽俊為社稷臣愚將大有望于先生焉近江東僉事郭公會間談及先生三日一進講積誠感動研精敷陳可謂致主澤民千載一遇矣近世明經筵講義必推廣經義以逹于治道不徒空談道理而已東南民力吏治之利若病先生之所熟知昔欲為一道之福星不得専焉今雖未沛天下之霖雨將有待焉隂滋潛潤本于沃心昔唐令儲君受業所以預培他日治平之根基今兹俾贊襄聖學可以立見當世治平之效驗豈直教雨沾濡于館下諸生而已學顔子之學志伊尹之志使是君為堯舜之君使是民為堯舜之民此尊先正覺民生先正之有志而未酬者善繼其志而酬之不在先生乎先正之所以期望于後之人者其不在兹乎愚此書之賀實為先正賀為天下賀寜惟太學國子諸生賀而已北望賢闗與星同拱惟先生鍳而恕之不備與胡雙湖書啟䝉通釋中揲蓍五四為竒九八為耦處初學者或不能通昔嘗思之五去一而為四九亦去一而為八固也然四何為而為竒哉意者揲之以四以象四時四時具而後為一年者一其四時一年之象也此四時所以為竒者兩其四時兩年之象也此八所以為耦先生通釋中意必以易曉而未之及愚謂曷若明白為後學言之耶高明以為何如答胡雙湖書三代以後年數易考有甲子哀定以前年數難考史與稽古録世多牴牾恐難一一以稽古為定通略説克明峻德處以為修齊治平此説出于溫公朱子述之耳不意此老已見到此今見稽古中可考大學宗祖之説出真西山衍義其第一章即載堯典一章説秦世變升降處其説出尹起莘綱目發明此外雖不無祖述今亦難一一盡述此其大者却不可掩為已有論明帝崇儒之虗美不足盖召佛之實禍批教抑之太過愚謂不過虗美耳渠之崇儒先儒于富之教之章已畧及之未是十分美事畢竟邪正不兩立既有召佛入中國之大過則雖有崇儒十分好處不足言矣序文未作終必須作向有一族弟見通略謂當春秋戰國時説及孔孟後來未及增此先生纂要如已及之甚好如未也請添入然後以一大議論包括之意欲謂三代以上治與道合經與史合三代以下治與道分經與史分朱子謂呂伯恭不合先㸔史麤了眼只當先㸔經此後世經與史分故也二帝三皇時治統與道統合聖賢逹而在上道明且行此時經即史史即經也帝王徃矣治統與道統分道統寄于孔孟窮而在下之聖賢道雖明不行矣是後經自經史自史也史雖有司馬遷班固以降諸人及司馬公通鑑其畔于經者多有之今吾軰纂要通略之作提起伏羲為道統之祖而又提掇克明俊德親九族章以修齊為治平根本自可以斷盡三千年君德相業以經之道斷史之治史即經也且可為宋三百年事張本將述周程張朱以俟他日續下筆又何㸔史粗了眼之患哉先生苟不下此筆某明年當為之大掃一片議論以洗近年一種鄙薄道學謂與晉人清談同科之謬論先生鍳此意否又答雙湖書癸已之冬先辱謙翰隨即齋沐修答未知其得逹矣否今年夏書坊之所有刋易本義亟不論錢買之研朱焚香毎一展玩毎一景仰方此梅邉細讀見梅見易如獲見君而謙翰復翩其飛墜矣亟為展誦乃知旃䝉協洽午夏方徹紫石稜一以不墮浮沉為幸一以寄書難逹為嘆也以多問寡抑損勤劬某也何人可以承此此盖執事學愈髙心愈下不自知其辭之謙耳附注詩傳此一段大事前嵗聞有此舉甚以未得一聞緒餘為歉繼而似山玉甫二丈相見聞皆謂左右釋詩多有可疑讀詩之功不逮周易因叩其説皆謂如崇墉言言不當訓為言議之類他却不能舉今讀來教誠有此説某竊謂文公於六經惟易詩特筆成書自謂易被前軰説得道理多了恐翻這窠臼不轉至于詩無復遺恨後有揚子雲者必好之其訓釋亦云當矣今欲附語録纂諸家述已意但存他説以互相發明或發其餘意之未盡者足矣不必過求異也今承來示謂詩解見謄數段去復注其旁云不暇録惜乎某不得親見其説徒以條教大畧及所聞于人者想像蠡測而管窺之當于何許而考核其眞是之所在哉牛羊腓字之腓引易咸其腓証之極當崇墉言言之言引于時言言証之恐未當于時乃虗字又有于時語語相連其為言語無疑崇墉乃實字以上下文閑閑連連安安及下一節茀茀仡仡文意稍詳之此不過言其髙大之貌耳不如只依文公説為當此等連字據古人出口叶韻為是耳兼古字多通用兩言言各自為一義不相妨也不顯不時等不字只依舊説以為豈不顯豈不時似不可易大率詩人之詞緩反其詞以逆其意而讀之味在言外後來人多如此下不字今人開口亦多如此直訓為不顯未見其得履帝武敏歆此乃古事之荒逺可怪難明者先儒釋之大槩有兩説毛注則謂姜嫄躡帝嚳之歩武鄭箋則謂姜嫄履天帝之指拇毛説似實鄭説似怪然惟其怪也不由人道忽爾有娠是以三棄之而卒収之遂名曰棄使只如毛説因祀髙禖夫唱婦隨由此有子此乃事理之常復何怪何棄乎文公取鄭説非好怪也盖以神聖之生異于常人容或有之如天命𤣥鳥降而生商之類耳故取鄭説冠于前以蘓張二記証于後考究至此他亦説不去矣今存毛嚴之説以互相發明亦自不妨但不可必是此説而疑于前説也要之如此等處姑存而勿論可也縦巧為之説亦有何益據愚之見左右于易不十分自立説其附已見者不過十之一二耳今釋詩亦須如此前軰之説灼然未盡未明而我之説灼然稳當明白者則出之不然不如其已不必過于求竒以來云云也兼聞入閩之期已的恐一刋印後改正便難幸聞有熊先生老成宿儒相與參定必無輕易如見熊公後千慮之得倘與之符願左右勇于删削只存其稳當者稍渉竒異不契公論則棄去之使正大光明為無纎瑕之拱璧與本義附録纂註乆逺並行不亦善之善者乎未板行間已聞異議一板行後使果有受人指㸃處悔之何及大槩朋友間樂美服義者少嫉妒背非者多某平生無他能頗酷于樂善耳以左右下問之盛心純實無偽知其必能服善故敢直以所聞所見為告若夫嫉妒背非萬萬無之但懼或者之不免也外承寄示易辨極感極慰陽虗隂實之謬左右謂與佛老異端之學何異愚直謂此與兒童之見何異耳闢之甚不難但盡裒一部易中説虗實處而與之辨能如此詳明的當則非精熟于羲經者不能也正論日揭異説氷消盡美盡善敬嘆不暇某受賜宏矣某十三日午方得解初九所惠書外批索報甚急且又聞道存歸期在十五日恐蹉此便欲寄良難是以亟亟匆遽治復只據一時愚見述之直突覼縷恐竦曷勝何日一拜下風少罄所藴未見惟厚自珍嗇伏干台照不宣答胡雲峰請考評書昨賓暘行僭厓略數行字以請兹領教墨三復如侍典刑大槩人之作文自是者多服義者少非純不服義也亦多有自知不明而不知已之為非知人不明而不知人之為是者彼有一等私小之見横乎胷中恥已之失惟恐勝已者乂不論也此所以易于召閙也二三先生納之閑闌中亦既解命矣鉅帙六謹以緘付來使前數名外其餘不欲嚴于去取要亦無以大相逺其雜排之以附于後惟命其截斷不使太泛亦惟命至于銓次之間某管蠡之見豈敢自以為是不契尊意處聼自髙下置之更唯命秉卓然之見以持公論之衡鎮喧囂之辭而立吾道之幟不能不于先生有望焉經疑前六篇實欲作者主名知其文不知其人亦理所不可也其餘諸經古賦俱乞于後便中寵示全榜批教姓字卷上多撰他名或代名不可以為據敢乞拜意玉湖相公先生尊賜皆出雲峰之吹嘘感戢感戢已修謝書并及之矣回仲儀郡博一緘併此附去頤指呈逹為荷楮短心悠未究忡惙惟髙明鍳之未見間更望珍嗇以壽斯文不宣備答胡玉湖請考評書某自一二十年來側聞執事先生允恊輿情丕承先志以明經一脉倡率士類佐闡人文甚盛甚休由是歸心門墻積日如髪第未獲一拜下風常用悒悒以為此生欠事詎圖今者會友以文巨帙累重諉以銓次嘗轉託雲峰先生力為辭之雲峰不特不善為我辭且勾引先生賜之劄翰于是乎黾勉披賞不敢辭矣甫得竣事謹以授之秦綱望賜台電一瞩之未知能愜高見契公論否耳恭惟先生于玉比潤與湖俱清振起斯文是亦為政後舉不過一再秋風迓續文公丁夘之氣數機闗所繫未必不由于斯櫟也預以為賀至于憫熱惱之瘴衣之以疊雪之輕解粧寒之圍飫之以松明之紅此意厚甚下拜之餘附此以謝未知何時掬湖中玻瓈玉以洗昏花以快披覩臨楮不任拳拳答王仲儀書櫟去嵗聞琴書寓考川川泳雲飛良深健羡今春方以未詢履祥為欠而雲錦天落矣三返五復何快惬如之明經課評荷雲峰玉湖二公舉以見諉老病荒疎懼不任此方控辭間執事又從而慫慂之亦既黾勉拜命矣或以召閧公能為之解嘲否也貴州髦士如林得諸公又從而鼔舞之其雪去秋庚申之耻而迓文公丁夘之運近在後秋轉瞬見之耳全在雲峰老師與吾仲儀老友領袖後進以為文公闕里增光區區不無望焉何時得握手劇談以豁愁思答胡雲峰書近齋心价者捧至教字披誦方知有八月半之翰而未領隨即䖍答索及四書發明四小帙附齋心回便拜呈今不知已到未此月望賓暘方逓示前翰連張累紙詳縝謙厚雖得前席而聼何以過之快甚慰甚賜報諸作姓名明經人才之盛足見師友淵源敬嘆乆之王葵初聞其名矣董季真以乃翁所編蔡傳附録纂疏來竭力與删定補註内其葵初批字删除處見其學識不凢因附書逹葵初不􅂪一字之答想是季真匿之其説甚長他日有會晤縁當及之拜問本義二條冩去之後隨即悟文言乾九二夫子明有乾德中正語已悔所疑之過今􅂪詳教頓覺豁然以程子中無不正及未濟九二證之了然矣朱子曰九居二本非正以中故得正也此亦易不可為典要之一知正例而不知變例固不可也惕厲亦是至疑蒙批教詳明尤幸尤幸朱子曰無疑處却要有疑又要無疑使我之有疑得以無疑者先覺之賜也感刻感刻賜報本義通釋外尊著不一既未板行又難盡借又賜報四書通㫖之著前信方謂未成書以今尊諭覘之書成矣坊中四種附録為最纂疏多不滿人意集註依様畫葫蘆而已不堪視覧故不得已而有發明之編今蒙批論謂纂疏集成多有差繆可謂先得我心又報集成外添得數家亦難得也大學有盧玉溪通義最不易想亦在一家之内若夫北溪之學庸講義陸坦之木鐘集纂疏已略取之但未盡善爾前信欲拜觀通㫖數十板以見䂓模大槩賜教為幸顒望顒望與張純愚書某嘗讀龍溪諸誌銘及碧梧所為龍溪誌銘知德興之張甲天下又嘗讀伯東伯大之程文知具文可示法天下未識其後人何如人也二三年來偶于胡兄所見頴叔字説固知有純愚猶未悉繼于地理楊兄所見葉氏牧隠吟卷作者無慮百人獨純愚一説超然傑出亟録之敬服焉然猶未悉然料此必德興之張也謹識之心意謂何當得見斯人而交之今年携書此來與二程君交偶談及牧隠説二程曰是吾鄉中雲人所作繼而蘭叟此來又及之蘭叟方曰純愚本德興人乃徙而占籍于婺源耳愚然後方自喜聞絃之能賞音而所料果不謬也知蘭叟將有考川三役拜會之期遂于臨岐祝之為寄聲于純愚先生非不欲書未敢書也蘭叟再至則荷寄聲且曰欲寄以書以冗未及寫雖未得拜讀已領盛心某何修而辱先生先施之哉夫然前後之不敢書者始敢書矣所以有牧隠説之云云者盖如老泉所謂亦欲執事之知其知我也若夫不肖則以何者求知于執事哉某自少頗知經之當明今老矣犬馬之齒六十有一矣而經猶未易明也嘗謂仄仄平平之詩俗下應酧之文儒家事業詎止乎此而一望茅葦盡疲精神于此嘗心非之聞考川有明經書院司教事者雲峰胡丈執事與為僚其必皆注意于此而實能稱乎此多賀多賀健羡健羡庚寅識雲峰于郡城今二十有三年無由再見請談次得一唾名問興居幸甚某三十年繆作俗下應酧之詩若文去秋東屏不戒于火俱燼焉不足惜有一增廣通略乃因雙湖胡丈所刋史纂通要而再訂正者無他本亦燼焉書解折衷詩述傳句解禮記集義句解語孟口義等未審何時得執以北面求印正于先生乎所抄先生牧隠冊子亦燼矣先生窮㣲臻奥是惟無出出必超邁似此者何限嘗一臠想全鼎因風可賜教一二否願也不敢必也問先生之年于二程君皆不能記因筆不妨批教拳拳及此者亦老泉張益州畫像記之意也冒昧奉書不覺覼縷惟髙明鍳之不備與汪竹溪書憶今春侍家叔掃松楸道經仭墻因獲遂識荆之願雖老成典型時見清夢然以無謂不敢數動閽人詎圖謙尊忽賜誨示乃以諸令孫彬彬玉立特有西塾之招非老先生緣先曽大父燈窗之世契愛召棠之甘而忘戎李之苦何以得此矧重以諸族多方吹嘘左提而右挈之某也又奚説之辭黾勉拜命矯首凌兢謹此拜酧伏干尊照與汪古逸書今春領台翰詳宻殊甚而持書人去急匆匆僅拜答數字不能道所蘊之萬一當緘去四書考異一小帙惜所刋不免有誤字不便台覧想能以意會之不審合尊意否耳答書初凖擬暇時從容作之而匆匆無寜日便鴻無我過者迄今不能如願愧甚愧甚兹恃契厚僭有欲言同邑梢雲呉兄萬頃翩翩佳公子也屏山先生大尹之孫松所都廵之子篤志學問詩文俱工有令子年方志學欲從明師以玉成之某素與萬頃託交以此見詢亦聞先生大名非一年矣小生遂力以先生為薦兹拜此紙以逹其意萬頃亦自作先生書萬望曲從其情慨然諾之不特萬頃賢父子飽領誨益小生亦可時時請益萬頃且有容小生詣其仭墻之美意若得償此願以慰生平未得會晤之懐尤幸也亟亟拜字一生常苦匆忙有王半山之弊先生一笑而鍳之恕之幸甚答呉萬頃書疇昔之嵗輕抵鄭公鄉辱賜汲引僕軰急歸不果拜命迄今愧之繼以惡詩道謝又辱寵和突過黄初壓倒元白不足以言之也自後無謂不復嗣音悠悠迄今常切崇仰斗山忽出台翰所諭敬悉小生與古逸汪交書不一而未之一識此丈壬戌生好學好問朋儕罕見其比毎心服之兹體台意作一書逹之申之以台翰可謂知已又復篤教古逸必幡然應聘也自行之目必自酌之得宜小生不敢出位而言也匆匆拜復不能治擇言語來使鶴立不可稽之故耳伏祈台恕不具備答曹𢎞齋書某去臘三緘蒙瀆而辱嚮答之一是謙光十七日先拜領十六早尊翰至次月初九日尊翰始至整肅披誦一一如侍深以所代懇蒙允諾為至幸闓端新嵗方顒佳音而首翰又翩其天落矣亟展亟讀且審壽履康勝何喜慰如之行狀示教仰荷重勤真是無一節不包括無一字不研覃馬遷史筆韓栁文法允謂兼之非老于文學其誰能為只如姿貌凝重意度粹夷八字已是畫出一梧山翁矣良工心獨苦老杜所謂苦即先生所謂勞也必具隻眼而後能覺之已即授觀竹君感慰之深口莫宣述但令先代聲謝臆俟三虞之後専恪修書以既悃悰其長嗣仲煒亦附此引忱惟先生鍳之逹虗谷書謹領俟遣杭僕併發纔有報章專當申納劉生適亦至矣即令下手春丁以前恐難得便勢只可於此行拜省之後以摹本拜呈也畫之一教真如耳提而面命之感激何可云喻與呂存方書司馬公有言某與景仁范鎮兄弟也但姓異耳余于存方亦云少而宻壯而疎勢也跡雖踈情則宻義也戊戌十一月初十日訪存方偶値其先尊伯大祥建齋在次日整辦怱遽中存方力㽞之不容其去樽酒細論不以冗奪待我之義豈不益于此可見而余竊有愧焉先君與先尊伯交真是莫逆某故人稚弟也乃沒不及哭祥始及拜記曰既除喪而後越人來弔得無近之乎一語識愧存方其教之乎異姓連行雁少時同隊魚膠投情最宻梗泛迹因踈下榻匆忙際論文應接餘幽冥負父執來拜廹祥除答金滄洲書櫟憶去秋道鳴珂暫簪盍自後雖坐嵇康之懶不書不面然僕心似江水日夜向滄洲未嘗暫違也昨辱觀萬先生枉顧道美意出華緘何修而得斯于滄洲欣幸無斁櫟唯秺侯之門先君先叔俱嘗游焉不肖何人俾繼此躅雖出觀萬愛念之意汲引之勤然自非滄洲羲娥其觀人之眼溟渤其容人之量亦安能于總總客處中知有所謂陳櫟者又詎肯于故人下客之子而期以愛必兼愛也哉櫟行四方得此于人盖寡此正願擇所從而未之得者矧重以觀萬稱道誼雲之髙不容口此而不從其將奚從以此言之聞命即拜疇不謂宜然自今客他方則可在父母之邦則未可見主人館我今五載略無間言義合控辭然後拜命及力辭之而主人苦㽞之形㽞神馳殆兩浹旬進退維谷將如之何方欲修不能拜命之報章候伺觀萬到館耑人申納而觀萬又此來矣苦辭求决而主人終苦㽞不放輕帆好去便吾道付滄洲昨雖屢哦此詩今牽掣其事乃爾舟近蓬萊風輒引之分也夫還珠淚垂可勝凄斷負觀萬滄洲二先生之深知非意也勢也事會無極豈必終無効驅策之期哉肅此修謝萬冀赦原治報魯臯臨楮慙汗伏干穹照答汪竹溪書某早嵗侍松坡老師坐知羣從多典刑嶺雲隔之尚欠立雪不圖今逺貽音書及賤姓名誰誤聼熒胡嶺雲不能隔之耶廵簷聳觀梅花與有德色令孫森森立竹方就師模如某迂疎掄選見及不由介紹特逹相知樂莫樂兮固已心許矧重以朱丈昆季之慫惥乎然某于梧山賢周魯託世契依劉已十餘年詎敢不告而去之戀戀綈袍尚有餘意坐是欲遽拜命而未之可謝蘭竇桂正晉子野所謂好學如日出之陽者授受縁法天苟相之少緩嵗年安知暫睽之不終合今日之不輕去河南氏者即他日之不輕去浮溪翁者也别楮不敢㽞謹璧歸之記室眎入萬幸令小阮提領郎卿不及另幅聲謝附此引忱惟是有辜嚴命非意也勢也伏告穹照不備與徽學屠教授書名約字存博某頓首加拜謹呈路教提舉月汀先生師席某隆冬逆旅獲瞻師模語未終别去鷁退蠖屈天乎人也何尤扶憊而歸過郡城不敢以藍縷見意謂繼必可以從容請教豈期三載竟隨魯臯非先生鍳之以日星之明容之以江海之寛某也寜免于戾徽泮積弊如蝟先生以嚴正公廉一洗之昔枵然而不足今霈乎其有餘惜也斂此經綸整頓之手僅施之一斆學而未大用也雖然嘉聞美譽無翼而飛豈無能以轉聞者先生自此升矣預此多賀某散材也自度無所可用惟致力先儒之書發其蘊以圖不朽而已去冬編蔡書傳附録増註已成已與番陽一董兄謀刋之閩坊矣見編四書章句集註發明亦將過半未得求印正于先生殊以為恨也干冐師嚴無任戰汗顒徯之至與呉子静書乆不奉問惟有尊仰中間疊辱頒餉不及一字聲謝簡慢之咎奚以自文然無心之感為咸乃感之眞不言之説為兊乃説之至即辰嵗聿云暮伏想合宅尊大之眷均受福祉荒凉四壁蔑表餽嵗之意者寸芹遣前物㣲意全仲文好學有進深可為喜吾儕人家但如山谷所謂勿令書種斷絶其成功則天也如肯見過不必以嵗暮為嫌與呉執敬書某遥睇宗衮公遨嬉處緬想髙風無謂而書焉以為恭瀆也因以不敢襟度明豁必鍳此衷仲文來知尊履壽康良切欣喜去冬之杪辱令似桂山上舍盟書有収録兒曹雅意雖乏便未及令具遵禀狀然已心領恃有老成典刑必覆燾訓誨之也區區本意欲令長稚一出仲文之意以為長稚故疾恐或不免有發時不如令小姪勲孫應命此子雖教之十數年然未嘗出雖仲文以為可而某不敢必其可也所恃者先生以眷家祖行提撕綱維之但令伴令孫相與習句讀務相去其不是不及處不以客待之而以孫教之則庻乎其可先君之孫即先生之孫也倘沐以先君之故施及其子孫俾得由此漸漸稍慣可以悠逺藉庇某也未沒之年無非感恩圖報之日也夫豈惟兒曹而已哉末由拜侍敢乞厚自珍嗇躋登上壽臨楮不任拳拳與子勲我本未欲遣汝出偶遇機會故如此汝須是自卓立自争氣自求長進自做取成人不可如前日悠悠見笑于人今幸遇親家執敬老師重厚典刑可以親炙取法姊夫子静先生博淹修㓗可以資問請益好文字好説話隨手録取歸日要觀仲文非特益友實足為汝師渠之言一一謹守之不可一毫違之按渠之言而力行之永永無失今受人子弟之托須是且以教人為急自已事且放緩然教人讀即是我讀教人做文字即是如我自做教人解書即是我自解教人熟而記得即是我自熟自記得教人便是自學如此力行不特人有長進我亦自有長進又教人讀書今雖不必與人盡解然我却不可不自曉得須是毎日隨人所上之書逐段自檢㸔解得曉得不可徒讀其句讀而不曉其道理如和尚念經也毎日早起晏眠除登厠外莫妄出一歩不可與人閒説一句惹是非待學生必正色端莊如此决不遭侮夏楚人家多不樂此不宜施須是勤而有常謹審而不敢輕易能守得勤與謹二字萬萬無失言語要簡而當從容而分明最不要誇張妄誕學生事業與主人商量各人具一日程而日日謹守之答呉仲文甥凢十四首近與曹公交信報中全出示乃尊八十老人嘆末章及𢎞齋𢎞齋和一篇併尊文欲抄示以匆匆未果次第再信索之得之當録去也𢎞齋石假山詩曽見之因戱成一首大意謂木山可言假石非假也一卷石之多卷石即山之具體而㣲者且天下大小無定在莊生云秋毫為大而泰山為小使有據鵬背而上九萬之上其下視泰山亦卷石耳假義有二有眞假之假有假借之假凢有形于天地間而為人所受用觀翫者皆假我也名僧有偈云百年借汝間觀孫仲益嘗拈掇以為尺牘見之註中雖泰岱齊魯青未了者齊魯之人亦不敢認為真已物自羲黄以來泰岱亦幾換山主人矣爽鳩氏不能終古常樂之也今徳父為今季子知在徳不在山石小山已物而不認為已物不過假借之以適吾之樂其徳自可以不朽縱渠夜半有力者不計也以此竟成古句一首不曽帯歸匆匆亦記不全未及録去又恐中間或者不察以為含譏遂不欲發要之不過說正當道理末段嘗說得徳父好處出矣吾甥以為何如賢甥之說後篇五峯九峯之說不為佳不如前篇吾文自有意深淡不妨不必為俗人遷就也如何如何令弟處留下杜詩選半册乃律詩望索以見示近見劉須溪杜詩註杜詩本平易易解而劉批反艱深其辭却解不得可怪見之否然亦間有好處有暇欲盡註之但不知有力可成否耳石假山詩曰木山可言假石山何假為一卷石即具山體山之小者逾怪竒若謂卷石不是山撮土與地有二與秋毫為大泰山小大小定在誰究之倘騎鵬背髙九萬下視泰岱應有兹吾謂假字有二義以假借言端有意人生字宙間形聊百年偶凡所受用莫非假欲專一壑毋乃蔽田廬山園併貨寳借以閒觀了兹世倐來忽去或終身氣聚有之散斯棄粤從羲軒昊頊辛泰岱幾換山主人芳林崇土艮岳石力為兒戱堪笑嗔泰岱真山青未了齊魯亦難認為真爽鳩雖樂豈長樂但視為假常欣欣延陵徳翁今季子小山已物呼假耳元和在徳不在山徳意不朽山意閒適吾人樂聊爾假不妨夜半有力者又𢎞齋雜作管見内有吾輩所自能見到者有舊已面得之者其能廣人見聞者亦不少近見答一書甚詳盡敦篤末書一絶云孫曽鼎立淡壵垕年歳珠聨寅夘辰或抱或擕無不可老天照覷這閒人晚福真樂可羡也視虚谷将死五律之可憐過之萬萬吳恕齋講義于朱學儘不差亦無大過人者皆不肖所能知能言當摘録之後便歸納又承索放翁詩見遣去其詩甚典雅工博極好學南渡後乾淳以來詩人如此公者不可及矣承和詩肯将圓行應圓物但以古心傳古人好周易二字不過周家所作之易三易經卦皆八連山夏易也歸藏商易也今之易周易也伏羲之易唯有卦名而無辭自文王作卦辭周公作爻辭方有今之易經孔子作十翼乃易之傳耳易交易也變易也交易為體變易為用朱文公論之詳矣虚谷桐江續集有先後天吟百首多好唯其中說周易一首不是以周為周流大不是此不知何人好竒之論而虚谷誤信用之耳又承錄示尊先吳端翁正詩序及摘聨極感摘聯俱精絶詩壇律起結小不滿人意而兩聨絶佳舊傳全詩數篇豪壮工巧兼有之但不似蘇黄一輩之渾厚耳諒于中原文獻之正脉有難以一槩論者歟誦其詩不知其人可乎是以論其世也楊尚書名傑字次公號無為子其名見于坡詩吕成公文鑑選其詩文近傳其為婺源胡氏作綵衣堂記此詩序髙于記相去十餘年筆力之進如許可敬畏近示冊子胡餘學復卦講篇詳明不可及何其中有云孟子謂伯夷太公盍歸乎來斯朋來無咎之證歟此引証失之巧矣齊魯曕沈毅齋高弟名興龍寶祐丙辰文榜易義過省許許山屋名月卿以易魁别院所答魯瞻問易圖一書恐非山屋山屋文學不類此看易圖亦恐未如許精到畧果其答想是初年清明在躬之時但得魯瞻發問之書一觀方極分曉否則尋此本義前所列諸圖及蔡節齋易傳後所説叅看亦好然此書中亦多有徒詳而欠下語精妥處亦容有誤處大勢自好又福姪授所惠字已悉喻及孟義諸眞者誰乎甥舊自相為知已可也近日光姪至見記解必欲借曲禮上下去已付之所編述甚欲以傳知已庻廣其傳但在發去者見體早送來不失墜元本失之則㧞本塞源抱恨無窮矣高作一冊遣下環秀亭賦摭方公秀亭記之餘意辭甚明暢多景軒記末因以箴之可取望逺樓記雖得之心境記然亦不能全善三石説自虗谷千佛閣記來亦佳逸老園記模冩工意趣佳斷制之法從𢎞齋南山道院記來以逸老人之餘年餘年只可自言不宜施之于親當作髙年祀社文甚佳無鵠形矣㡬以充人形也充人二字當改作踐其得心亭記月齋記石假山説拙菴説全善勉旃勉旃又前遣去孟子口義看後于盛意如何人回試一二語及之老舅初十日歸十一日便下手解禮記今早奉先祀午後讀之至晚亦了却内則一篇四日共十七版高作一帙筆力大是長進咄咄逼前軰不止目前所罕見第一篇賦意有所祖述漸漸看至中間漸入蔗境老夫當避路但勝是麗勝淡辭勝理年漸髙筆漸老他日不患不成霜降水涸未可即遣回當選冩數篇㽞以示人云吾家亦有此宅相也老舅不能如山谷萬一賢甥殆過三洪師川逺矣開春晴得好過我少欵但恨無可以欵留者閔仲叔周黨相過惟飲水相視而已恐不免此爾統祈孚亮又人至首詢椿桂消息知俱錦還各遂綵侍甚喜讀所惠字稔尊祖老先生以次並納福老姊康健尤慰近來無寸暇此為骨朽後生活他日當與賢甥細商之亦自憐其自苦不能閒也念之否適閲所問至孟子首章仁義義字之疑昨嵗所成孟子口義已及之矣不可不傳之吾甥先遣前冊去自謂稍能得朱老之意望作急抄之換後冊去有一後序内専及此半作而止吾甥勉我成之它日看也此無他藁他本萬告而珍之又伏承椿萱重疉之賜毋乃如文帝賜張武以愧其心耶兼尊孃安人貴恙如許何必稠複講此却則不恭受則重愧感激之餘繼以嘆服也侍邊千萬為道謝意前日所發示文字亟此歸納此一宗文字虗谷逺矣以下諸人之作何敢望其萬分之一虗谷之作切于小桃源尤切于今日進士之難之弊末出作序者與本人之名有手段且前純述志隠子之言後方為之作歌正用送李愿序家數番陽張仲良一絶句亦可取廬山千仞歐公賦盤谷兩山韓子歌險語竒文世常有髙風清節士無多隠然有諷誡意下此而作者尚當于志字立議論諸人皆無發明得志字有力者匹夫不可奪志也若志立得定灼見世當隠而隠莫説三徴九辟雖千徴萬辟亦不可奪吾之志方足以稱志隠之名若販賣雲壑邀射虗名如盧藏用之終南㨗徑李渤之少室索價此而謂之隠豈知隠耶恐所謂程堯者亦不過借此為虗聲耳設有貲可求仕有媒可進仕未保其不奪志也以此箴之或可奪其膏肓又胡仲虎四書通庭芳委校之且令是否之好處儘有但雞子討骨頭處甚多最是不以祝本為定本大不是文公適孫鑑庚三總領題祝氏附録云後以先公晚年絶筆所更定而刋之興國者為據今乃不信其親孫之言而信外人之言只看中庸首一節斷語諸本與祝本疎宻天地懸隔乃隠而不言而専以為政篇德之為言得也得于心而不失一節來辨謂得于心而不失為定本而非行道而有得于心之説得于心何必加以而不失得于心是得何物不比據德云據德是道得于心而不失乃是因據字而下不失字耳似此之類不少只是纒辨數年前與之交頗信吾言凡所云云皆具存也又前日不曾戒甥一事夏秋之交最難將理將理之法第一要不多飲水不特冷水不可飲雖熟湯亦不宜多飲如遇小渴不如忍之忍之而慣自不思飲如遇大渴不得已而索水不若只潄去煩熱畧略嚥些入胷膈不宜引滿大吸快意一時以貽日後脾寒㵼痢之患也渴時閉口卷舌揷上牙之内自然有津液來候滿口細細嚥之自不渴此學仙妙法又照病且嬾勲亦不用心皆不可望能傳吾學者其吾甥乎冬末上來望帶取紙筆文字當傳者作急了之若悠悠半年僅傳一二何時是了近日某借人朱子語録昨日一日抄一十二板不過循循冩未嘗汲汲也十詩甚感但稱奬過情自家舅甥只貴用實意不要如此啟事甚妥帖工緻起八字妙但宫居二字不好吾甥好學好問故一髪不貸如此甥所作比近時所見又進矣可喜可喜勉之勉之又承惠字甚喜所言言言允當可謂愛之之深使其能一一謹守則吾何慮之有哉勲兒既見之後仍頼苦口戒飭之姊夫家祇以自家子姪待之有不是直戒切之尤所願望見之只令在中門外不必令入中門一歩此一件不妨以客禮待之也見令具榜子去叅諸尊長但見二令叔祖不可無榜又不好下只得下眷姪孫三字如何所當見之眷家前軰望一一引之進見教其不及扶其不至包其不能是所願望舉業一件今日相尚不做舉業往往只理會作詩眞實詩不易作簡不可不作想子弟漸長此等亦漸作對簡詩口義之類皆所當習然詩且當作絶句先五後七未要便作律詩做絶句三兩月見蹊徑方可問津于律向來老成而能作得詩成者自少况初學乎先易後難漸近法也勲孫字畫未成不可冩本見付去黄字顔字令摹以授同牕某小年編録太早致終身冩字不好雖教學今三十有六年未嘗與學生冩一幅本不過摹本而已日間不可一刻放過燈下只宜立定程限讀日間書毎般讀㡬遍讀足便就睡子弟精神有限不可徒乆坐而瞌睡徒損其明日之精神無益也又初九得家報方知邑中有公移到來賢甥宜與説作此寃家有何實益其子學于吾者五載今反以德為怨平昔自恨薄命不偶動遭反噬以為芝蘭而滋植之變為荆棘以為鸞鳯而卵翼之化為梟獍者往往而是孝友睦婣人之行也令叔一房上而事父母次而待兄弟族人外而待師友于此四字如何天理人倫有是乎沉毒隂狡最損人福平白善淑最增人福甥其開譬之若十分難言望勿吝一行面盡其委折尤好又此回之事亦是宅中房下一項大變折得一番大禍近聞犬屢升屋蹲而吠此妖也仲耆一病此怪證竒疾也此誣興而病遂愈豈非破財折災乎甥宜以順處逆以待天者之定于此事抛棄之不要留在心胷吾所望于甥者甚逺宜以公平正大為心不可一毫效彼也回宅時千萬過吾家詳細言之塞上翁曰安知非福乎尊祖厚德所以待吾甥一房者不薄其面以喻我之意甚好容面商之然後力贊其决吾于甥所闗繫付托非小事甥切宜克已自強以慰老懐吾于此當拭目以覘甥之逺業初聞必不平以古君子之事觀之以理遣之未有不平者相愛之深慮其因此饑寒或生疾也切望自愛與梅屋叔某有小事仰瀆尊聼近日與可叔面言要割税入敝户此若出于戲言則付之勿言若或果有此意乞賜一言力止之敝户惟其無税錢所以可與學中打捱若纔有百貫錢税便為所牽持矣五城者七兄嘗笑黄麟哥謂先祖通判做一世官不肯受親戚族人一文税錢寄附見得一介懦夫儒户而受人税錢今日但見小利未覩他日之大害耳此可謂名言若夫包納本户一二百丈税則尤利之小者便是貼之以七十分亦不願受此小利以貽他時之大害割來易割去難某人之事可鍳也可戒也謹以直覆千賜以仁人之一言𤨏𤨏冒瀆恐悚恐悚伏乞尊亮與春塘叔日昨領尊翰為曹學録求贈行詩序引嘗匆匆奉答殊愧草率繼而思得其説奮筆一揮而成議論頗精切不可移之它郡它人節節照映句句工宻字字秤量知良工心獨苦者其惟吾叔與二三知心乎番陽名士如林所謂作文要可張吾軍然後可以出手不然是辱吾徽亦自辱吾鄉貢進士也諸公贈行詩章亦宜彼此互相指摘推敲不至貽芝山羞為佳劣姪行年七十有三老矣其言雖苦而味頗腴聞者當不罪之秋崖耕緑堂詩録示人以為記尊翰亦以為記非也此詩恐不可出以示人内有諸人讀書不如睡又云者也之乎助何事譏斥鄙俚似非其得意之作後一首可以出手必元自有眞蹟奚以某之再冩為哉此説不及奉命非懶也叙引繕冩呈似過尊目以授曹君復實卿姪名光近日作答信後某日髙一哥來方知所寄還程松谷文字挾以自隨将歸後送還之未幾到與可處今必歸矣見發程君可大所求之文到敏求兄處遺像記頗自愜鄙意道理亦實是如此輓章不為好却見盡其家世平生履歴及塟地亦一字不可移用于它人所贈言則不可言序序必送人行乃可言呉丈與夏放皆謂之序恐無此體例也夏放最亂道汝何人敢大言無當将與卿大夫上之司徒初見即擲之非之不擬來取也此人乙夘生邑市無人推薦此等無狀無識之物可哀也哉今亦死矣康節云還知虗過死萬遍却似不曾生一般此物足以當此漫及之可發一笑賢姪所寓渠宅多好書半年數月後可以逐旅借看亦一大好事預以此賀吾曩嵗見好文字必抄或摘毎嵗必進得一兩書嘗自笑與老婦言之今年又買得一件書田矣自到璫溪後便不能及子西摠管亦頗有好文字初自江陵回得文公儀禮全書七十冊嘗妄意欲抄取一部繼亦成悠悠今年老眼昏花不能償此願遂為終身之恨亦漫及之言此者勵吾姪可為之時勿磋過也與髙四叔翁去年婺源胡雙湖數相勉将蔡氏書傳編附録纂䟽勉從其言成得三分之一繼而海口董養晦又挾雙湖書來欲借所編采入其叔父董深山所編中以不見深山所編拒之不發今夏養晦之來携乃叔所編四冊見示遂亦發數篇授之盖深山之子季真将携入閩板行甚堅彼中已有刋主矣近季真貽書盡發全書共十一冊來諉以刪定但其所編多汎濫不切自家議論尤泛使人不滿其書先已經王葵初及雙湖刪之矣葵初丙午生好見識遂因其已刪者而痛刪之秦誓以後者與董相叅次第将畢却将董編叅取自堯典以至㣲子合為一編蓋此原有書解折衷故成之頗不甚費力近以十餘篇凂髙一哥録取一本為底本髙一哥亦自録一本不審畧曾見之否如未見則髙一哥解盟時必可携歸共看也今番此書覺無餘藴矣老來自苦東坡所謂頗利前賢予骨朽後人眼目亦自憐也因有餘紙偶及之餘需後便切冀心亮又蔡傳集成亦聞置一部此名亦大言無當到何處謂之集大成初與約並名而刋為改乃父之序文外面書套之語亦商量冩定到後一切反之今刋者却是元序何等猱談初焉用半年之力授以成本之時震哥云彼拐先生耳至彼必自刋乃父名予對以未必其然我之忠厚不逮後生之明了逺矣此不𦂳要也愚謂其中有精切而遭去者無限逞其懡㦬之辭易其擔當之語往往有之奪吾説以畀新安胡氏者五十許條雙湖在必不容其如此内他人名字差錯者不少字畫差錯無限初授之本外添熊氏之説無一而是禹貢中有大亂道之語由南而窺址等是也與禹貢初無毫髪干渉徒爾大言以見其博此子不識妄加去取令人憤悶不得為完書也已改定成六卷近日方畢非一紙所能盡其詳自述一刋蔡傳本末當携歸與髙一哥一觀庻怡然賞之又十五日迫晚僮來領惠字已悉虞夏書已有兹不發盡發商周書去董之罪不在畔盟不並名以刋而在妄刪節割裂使看不得有遺恨中間胡雙湖實無一字凡新安胡氏曰者皆吾人之説也雙湖至公平使其在也必不肯如此董亦不敢如此因筆及之仔細将此本與刋本㸃檢便可見楮筆不能盡也字説昨早方成亟亟書去餘需嗣便心亮為荷與黄求心不面不書忽忽數載兒姪軰來徃幸得略聞起居然終恨不得親承博約之為快也去冬聞今嵗携琴書為汪溪游甚喜當易于盍簪豈兩各匏繫倐閲一兩月一見尚難偶外甥呉仲文過我謂特欲造函丈進拜遂拜此字以問近况此甥乃某女兄之第二子自少頗篤志于學數年前館于歙因得見𢎞齋先生甚䝉稱賞回其一啟頗期待不薄繼嘗以其詩藁呈虗谷先生亦䝉其賜一䟦期待尤不薄試一印之可知今嵗先定向杲一館以意見不合力去之偶見過聞梅結有一館未有人試為一詢之偶一言而合初不知其詳及其至也乃又有不愜其意者年來吾道固厄而此甥之厄又甚焉亦嘗多方開解之順而安之可也某于兄長託深契故畧及之兄長有可提撕警誨之者幸勿吝鼎呂來嵗仍館于長干滄洲金大暇時當必有此行桐岡自杭回滄洲必見之兄長得暇與偕行一游亦好但主人留外踐迹不欲假如何偷閒先一省見亦不敢落後也楮盡只此切丐尊照與金滄洲乆不簪盍多相燕鴻近聞台候稍稍違和天相吉人想已平復兹有少禀外甥呉仲文後一軰行之可望者方曹二公皆稱許之今嵗為梅結游某自悔其輕于一言此甥素聞先生斯文北斗吾道東風意欲下荆州之拜遂拜此字為之先容有可賜提撕者乞勿吝其詳見求心信中兹不贅桐岡自杭回車後當必過此又可飽聆誨益也乏楮修字不謹伏干恕詧與中澤程氏去冬留邑郛獲晤語豺狼不問麟鸞受誣徒為左右嘆憤蔑如之何别後啟處何似乏便不及書每切馳情最是失禮尊兄昆季令姪昆季其不以薄誼咎我者㡬希兹有白事未言先慚昨嵗兩薦塾師兩􅂪聼納竟皆為反覆者所誤遂誓不復言此事今兹有言恐尊兄亦笑之厭之矣然尊兄見超凢庸當亦鍳某非故欲相誤特為人所誤耳舍姪名光字寔卿戊子生從小問業貭疑于某學識頗正筆端亦俊性行甚純字畫儘楷現亦習應舉之文近寄經疑十篇加之淬礪儘可應試兄能見聼置之西塾令姪令嗣不為無裨某非如王氏有譽兒癖知心之前不嫌其直也答考水胡盤溪代子西比貢柔緘特厪答翰光芒飛動與二寳而三珍感感某前日以𤨏尾細故不獲已又修字為記室瀆發未二昕夕而秦使突如其前晉帖翩然而下矣其何以當之某材侔襪線恩受言絲上有七十嵗之親逺為二千里之役半山所謂古人一日養不以三公換有味斯言趦趄乆之家嚴時勉之行君親之命俱有不容違者遂方敢為行計避左里之險道出九江不獲禀違政此自訟詎圖誼雲郁穆叢珍稠叠嘉而貺之禮甚豐也卻之不恭受之有愧與其不恭也寜愧登嘉勉受何以報之外辱霜蹄謂賜虞祖屈産之馬似復晉歸其不欲明言卻之耶禮記所云如斯受賜癡兒何敢不拜謝送塟某近者卜塟先君過䝉尊慈崇篤契誼逺賜賁臨范張交好乃今見之先君有知銜茹必矣况于其孤其何敢忘日欲躬走仞墻以謝迂臨之辱恐勞起居以故不敢輕率是以飭墨卿以代面謝伏乞穹照不具謝履襪巾幣某昨者讚揚好事慚愧善歌曾㣲拍調之遏雲遽賜縑繪之叠雪讀所惠翰知雅意已先于未将以迹觀之則似磚之抛玉之引也念舊憐貧煦濡而濡濕之在左右為盛德事其如老生之不遑祇受何一拂拭一歩履無非銘篆恩私時也亟此占酧言不盡謝何時簪盍悉留靣既謝星源王正山豬肝及酒懶殘爐邉六花誤約孤負燈花如此空樽何青州從事與公子彭生携手同行惠而好我從事曰相與入醉鄉可乎彭生曰吾平生吐出肝腸豈曰豕交之哉二子辨不已某捫腹而謂之曰此中空洞無物能容卿等數百人願借前箸籌之二子曰善竟歸心腹代逹汪静軒某昨效龎公之入城勤陳蕃之下榻擾春風者深矣揖别言歸一歩一感渴教信宿尊仰方新待臘之栁露青賓春之梅綻白乗咸臨之吉利迓開泰之亨嘉此其時也仁者之静與松蘿俱凝定仁者之壽與椒栢俱延長歌擷澗芹以将此頌惟尊慈不以其輔瀆而翕受之則百斯幸以序附特此致意以達愚誠等祈尊恕答黄叔玉某不見叔度鄙吝乆生又得山谷刀筆鄙吝亦掃而空矣梅簷展玩踈花與有德色某兹􅂪親慈以寒家増累特貽慶言且有珍貺此何足掛齒牙者君家山谷嘲小德詩曰中年舉兒子漫種老生涯解著潛夫論何方無外家此兒之育適可似之敢借此詩歌之以謝短帋占酬不敵先施統祈親照寄鄭時菴某昨留都下與君為莫逆交眞異姓兄弟也英游時乃坐他冗不克躬餞迄今愧之猝猝言歸念欲即詣鄭公鄉以訊近履寔沈祟之尚未脱然坐是力不逮心非意所料即辰春和景淑寅想榮侍萱親婉容愉色昔人所謂壽觴舉慈顔和者不得専美矣健羡健羡少需賤體可以奔趨即容問師潭途伏謁墀下以究所懐也不腆芹􅇨少寓寸誠一笑領之幸甚答鄭時菴某春間䖍貢一箋随沐響答繼飭蚓墨方􅂪瀆是慚未㡬側聞大斾祈純嘏于星溪滿擬回轅可卜望塵之拜詎意德星之聚竟成參辰之不相比也政兹渴仰劃捧誨函義榦情條燦然十從事之内燕山昨夢居然喚醒並轡連床易得之半萬里外握手論心乃艱于纔三舍間今之隔濶牽于人前之會聚相之者其天乎靖惟執事宇宙一菴時止時行與道黙契止者暫也行者分内事也先為時棟榱桷或以次収焉予日望之焉用佞多儀寵賜充牣衡茅卻之不恭勉拜雅命之辱緬想德門仙輯逍遥水晶宫中暑溽梅蒸潛却無朕彌深歆羡未見為憾幸㳺心蔗漿錦掤之適以待殊綸不宣答李泰宇某兹承一扎逺餉多儀縶雪天之玉貍横氷泉之赤鯶塵出麥岐之秀意見李蹊之眞有笏可拄耶莫倒持否無波相及者如乾沒何與戴廷芳􅂪台翰緘示寄府判先生佳章感激感激怱怱未暇載􅆳姑少俟之前日邂逅季澄學正嘗靣稟欲附課稿還寔卿姪已荷留聼昨晚携至摠管宅則知入長干今早問已回轅矣兹敢附去轉為左右瀆得附示此姪不至沉浮多感多感屢許以虗谷續詩寵假尚未示下得終假惠之幸甚不敢汚損當珍䕶以歸奎府也答汪景初教諭近得盍簪别來倐兩閲月兹領妙墨如接晤言保舉一事魯兩生不肯行寔以年未及格亦理當然非有他謂也荷再諭及足仭誘掖之盛心賓暘侍其尊翁在邑見心則以其尊翁亦在邑未敢聞斯行之所逹總管書敬留于此俟歸投之如有令兩生行之意尚當具年甲籍貫以聞止軒之文㡬忘之矣近有目疾不欲苦思以甚之俟有佳思則綴緝呈似不具代金赫翁答季澄伏辱誨示以先人襄事特加問勞足見篤叙之髙誼劇切知感彼時自合走報盖以路逺且春雪連作不欲重勞是以欲報而不果今謙翰拳拳雖親辱執紼亦不是過謹拜此以謝鳴謙之辱不遑它及切丐穹照又春首詣仭墻展履端之慶禮也既而冗奪至于紱麟令旦親稱觴致椿松之祝尤禮所當然又以冗不克趨前于是簡慢之咎愈不可宥矣過期之餘甫能擷溪毛以見區區公其謂某何如人哉謹拜此以鳴其所以然亦首罪之一端也惟尊慈鍳其隻影而貰之則百斯幸矣與汪季澄不侍誨論一瞬許時箋敬區區亦以無謂不敢穹遡寸忱則不以書問䟽數為恭慢也兹恃寛度僭有禀瀆此月朔日承本縣文書為路學儒人不陪拜事勾喚且罰鈔小生自甲辰秋丁及甲寅五月拜朔十五年間外皆􅂪前任諸學官寛恕今忽例遭勾罰此必學司混同呈上梅先生未必注意及小生也兹拜梅先生一書懇之書之辭語婉曲當􅂪矜體兹不揆為髙明瀆如逹乞頤指左右為逓上如不欲自發去則潘半村鼎兄石養蒙正兄二表兄次第凂一兄為投之亦可萬丐必為投逹不至沉浮寔為至幸𤨏尾塵瀆非恃契愛不敢及此不逺胥晤當得靣謝伏干台照不具答汪稱隠比者不揆蚓竅蝇聲僭􅆳休官五詠過辱鳴謙鄭重以謝此奚以謝為哉前軰謂進之難不若退之難至以放鶴出籠縱魚入壑自喻其樂可想也今者先生全節而退髙矣先年而退尤髙也髙之故樂聞其詩而和之此奚以謝為哉取于造物也廉故造物之報之也永取之不盡故享之亦不盡先正定齋翁不盡取之留以遺公而公又不盡取之留以遺二季位不滿其德天之與平陽氏豈可涯涘也哉某不肖方年六十有三可以進而自棄不進先生嘗廻顧之期望之負此知已每竊自愧今忽忽七十有五矣猶不免傍人籬落是亦不可以已乎何當得脱此縳從公于山之巔水之涯以傾倒所懐也未卜省謁惟冀厚自珍䕶以躋上壽以儀鄉邦謹拜此以謝先辱伏楮拳拳不宣與程材仲某昨日蒙耑書招致之為一二日之留叙十四年之别飲食之錫予之賢昆季之于故舊得之矣老拙無以當之如愧何揖别言歸彈指頃忽忽數日感激未渠央也靣諭令薦進名術嘗以嚴陵項君松山對歸之次日適會之于族叔與可家與之言適値其将經過鄭里之的便遂以隻字為之先容或即偕之歴覧以訂所擬或與之約而需后期一聼裁酌此丈游諸公間多敬信之昔年子西之塟親三旧松山與焉去年之塟内赤丘松山専焉以賢昆季之髙一見之餘必自能賞識之何待愚言之贅哉以拳拳塟親之心適召地仙之至似亦有縁法焉未見願清心養氣以迎多祐令兄處不及别字禀不殊此松山行速拏楮拜此殊愧草率惟髙明恕鍳之不宣慰曹濟之某頓首拜申慰濟之教授學士尊契家兄大孝某近三月間扺邑詢尊祖老師近履知無恙方以為喜留宿數日而未歸未㡬忽有風傳老師訃音者驚呼惶惑驚者恐其眞也惑者疑其非真也未㡬呉觀萬歸自邑方知其傳眞矣嗚呼平昔泰山北斗之仰今其已矣恭惟老師判簿先生乾坤間氣海宇偉人方為程文闗舉子之口而奪之氣及為師儒炳紫陽之燈而傳其心全節無瑕上壽有永何可憾者二賢嗣之先沒數也伯魚先孔子卒雖先聖不能免也六賢孫之善繼理也子思續道脉之傳賢昆季所當勉也某自聞訃音即已動念謂辱老師之知自丙申迄今二十年平生無知已知已惟老師一人耳苟不親徃以哭以弔于心安乎即與觀萬商之擬以少暇同觀萬黄求心問葉舟之途靣慰有日五月又抵邑則聞諸菊存先生謂昆季或它出恐小生軰之行或參商不相値盍尼斯行小生思之有如龜山所言於心終有打不過者無以寓意謹致雞酒之敬撰一奠文以冩拳拳惟兄為焚白焉萬幸令弟諸兄長一一呼名尤幸諸兄荷祖父道脉之傳而尊兄承重之責尤重惟節哀順變以逺者大者自期至望至望兹拜字托菊存逓呈伏干台照答汪古逸某自去冬復書後今春有傳先生今嵗携琴鴈塘者為之甚喜喜也者喜其有拜識之機也忽又傳先生遭齊衰三年之變者為之大戚戚也者想其同我三十四年前劬勞之痛也又恐因此未必遂拜識之願也度老病必不能徃弔則欲附一書以慰探便無從迄今耿耿戴兄廷芳連日留外家謂其居距鴈塘可十里可附書正欲今早作書而昨晚篝燈時領先生所賜誨翰矣感甚愧甚靖惟壽母太孺人年垂及百躋登髙壽雖未知垂帨的何年以尊年六十六則太孺壽數可以想見人間世誰有以六十六之子而得事㡬百嵗之親乎老天于先生厚矣生也有涯數必有盡今日之變可無憾矣先生于禮已在不毁與惟衰麻之間當體母氏之心為心母氏之心豈欲垂白之子致毁過哀以戚我㝠㝠之懐乎先生念及此可以酌居喪之禮矣先生知及仁守何待愚言欲持服于家思親之仁也今過卒哭之期以勢而赴館亦交友之信也交友不信亦在非孝之科先生處之是矣又何待愚言然猶不能忘言者盖欲先生因愚言而寛旅中之懐耳慰程前邨近董季眞行嘗附答書方掛漏是懼江照磨至又辱寄聲時前書想未逹今想已逹矣照磨未㡬言先生近罹壽萱太夫人之戚某聞之驚嗟失聲徐問太夫人之年則上壽九十年登九十百千萬億人中誰能有之以先生年六十有七而上有母在百千萬億中人又誰有之天之厚太夫人至矣厚公尤至矣自他人觀之足可無憾公孝誠天至新罹此變恐不能堪然證之禮六十不毁七十惟衰麻在身以衰麻在身言雖少不及以不毁言則已過之願酌其中而處焉向者畢梧山之母徐生于文公夣奠之年年九十三而沒梧山甲申生年已六十九乃母初病時丁寜梧山云我年九十以上已大幸汝年垂七十宜為我自愛汝若過于哭泣我㝠㝠中亦不懽喜汝宜深戒之想太夫人之見亦必如此禮書公所自悉言之似贅敢援梧山之母之言以為公告某乆客梧山門此語寔錄也願公深體焉前軰云萬人叢中一人曉性理文章萬人叢中如公者敢無一人望公為太夫人自愛為吾道自愛儀州里以幸後學某三十六而喪父四十三而喪母家貧不能養欲養親不待以公之家丼㫖必不缺且親享髙壽仰視之愧死對照磨畧言不覺涕泗横流也願公鍳此而自覺焉至懇至懇慰友喪父某乆不交書則亦有以中間聞執事有何憂戚而未詳兹會廷芳方深知之始敢䖍修此紙首惟鍳察某比者不意慶門凶變有尊翁府君之戚府君横舟老師之嫡嗣聞名乆矣而未及識於癸酉鶚薦之文嘗得伏讀之甲戌混補回途得叅覿之人物頎然玉立今猶隠隠心目間不謂纔償識願而遽仙逰也禮為人後者為之子執事罹此與所天同哀悰何以堪然又聞之在禮有不言而事行言而事行身親之而後行之分况不免任人子弟之托乎此其不可為一概之哀也明矣執事熟知禮意何待愚言想三虞之期已近之或過之矣願以逺者自期此區區下交之所望于心契者老衰道阻不及靣慰而以書惟孝子仁恕察之兹因廷芳回附此以寛台懐匆卒不具再拜申慰慰戴時敏比者不謂慶門凶變尊翁堂錄太師老先生奄棄明時始者風聞疑而未信夫以尊先太師後學山斗昭代蓍龜縱不為衛武之九十入相亦何妨如伏勝之期頤傳經乃今天不憗遺奪此大老使後生于何而考德時廵于何而就問識與不識皆為流涕矧足下純孝天至其何以堪然有一説可以舒足下之深悲老子有言死而不忘者壽不忘何也死且不朽之謂也古有三不朽曰立德立功立言老先生德為人師言為世範著書立言部使者已轉而上聞矣行将垂世千古不朽尚父天命之壽與臧文仲身沒言立之壽相維于無窮視相如之且死而以封禪書獻諛者過之萬萬昔呉人謂孫仲謀曰此豈孝廉哭時願以逺者大者自期勉進乆大之德業扶持先生所著書章章永傳其視僅以一至之哀自任者為何如某不揆僭越以慰以期惟足下抑哀順變不鄙其狂愚而幸聼之禮合躬詣繐帷一瓣一慟于以哀死而弔生顧影自憐有願莫遂慰唁紙又墮魯臯惟高明恕而察之不宣慰胡濟鼎某兹者不意慶門凶變壽母太安人奄棄榮養執事孝誠天至愛敬兩全考叔之羮将有待而遺孟宗之鮓将有待而寄一旦遽遭此變何以堪諸自兹以徃返哺而烏何在卧氷而魚空肥甚為哀慕盖可想見自耳兹聞傷悼曷勝即欲一詣繐帷以哭以唁家事如蝟酧應不遑外奔内馳日不暇給忽忽嵗蛇赴壑矣既躬造之弗獲又隻字之復稽縱寛度不督過之愚獨不愧于心乎是用拜此以代靣慰更望節哀順變勉進饘粥以顯揚自期是所願望令昆季翰學至孝不果别状意不此殊統祈親照慰曹𢎞齋某不修箋敬整整經年非于師門簡慢也不欲無謂徒瀆尊也近此月初呉甥過邑郛會仲玉學正知次令嗣希文抱恙問何證謂胃弱不納食某雖不敢言固已竊隠憂之無從問訊日徯平復之音忽社后之四日竹牗寄聲見報謂希文竟不起矣驚駭痛悼無以為懐有是哉慶門之凶變一至此哉先生與判閫安人俱以八十之髙年而罹此倒置之大故其又何以為懐昔人為陶士行言越騎酷沒天下痛心何况人間父子情乎自聞此變即欲奉慰然亦無説以寛先生之憂恐祇以重先生之戚耳要之人禀受符直二五之氣數或厚或薄或長或短天也非人之所能為也亦惟順天而已荘生曰孰使我至此者非天乎况希文懿行奥學髙文妙畫種種出人又且諸郎俱佳不惟克其家而且世其學而又有孫竹立矣年登五十有五已不為夭如東坡所謂人有文為不朽與有子為不死此兩言者希文足以當之所使人不滿者以八十之親而繼哭五六十之子則為逆耳此為理之所不可解要亦數之不可逃先生髙明有素處常逹變必有可以自寛自釋者何待愚言天下禍變亦要人當夫子萬世宗師早哭伯魚僅有子思為之孫亦待曾子而成就之先生今兹事體不髙于宣聖數等乎願先生順天所命加慎眠食以躋登伏生髙允以上之壽是所願望兹因便風附此拜慰不覺覼縷惟尊慈鍳之不備定宇集巻十
