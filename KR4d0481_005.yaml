body:
  text: 定宇集卷五元陳櫟撰説孔門傳授圖説孔門弟子從遊者三千速肖者七十世傳七十二賢史記有七十七人今不能盡列之姑記以十哲冠於首曾氏父子次於後姓名見論語中而可稱者又次於後凡二十五人夫單傳聖道者曾子而不在十哲之列則知十哲世俗論耳兼乃孔子思從在陳蔡者而列此十人非謂十人之外無可與班者也曽參乃點之子時尚幼小未及從於陳蔡故不在十人之列歟顔子為孔門髙弟第一人惜其早世其學無傳其餘弟子雖多授徒然不免愈逺而愈失其真也獨曾子之傳最得其宗今曾子之格言見于論語其著述成書見于大學可考也曾子傳之子思子思見於中庸子思傳之孟子孟子之學見七篇軻之死不得其傳焉雖有公孫丑萬章之徒然觀其難疑問答見于七篇中者率皆淺陋不足以與于斯道之傳也孟子之門氣質稍純正者惟一樂正子克然僅在善信之中尚未免有從子敖之失韓昌黎所謂軻死不傳信矣直至宋周程氏出而千載不傳之絶學復繩繩至今云陸敬仁友名字説天台陸君敬其名仁友其字侍親來吾邑與吕君安貞交聞東阜一叟陳櫟名諉安貞為求字説未之得而歸歸踰二年千里寄書安貞拳拳求之不置豫雖老懶忍不為一言豫聞之安貞陸君年英妙資純敏好學篤取友端子味其名若字包涵關繫甚大且重非泛焉名字比胡可率易言敬百聖相傳心法也始於堯典列聖諸大賢傳此一敬諸經論孟諄諄此一敬一心主宰萬事根本此乎聖學成始成終此乎在君之親命之以敬自一稱此名敢不盡其實而一毫一息不敬乎仁之一字始見于虺誥至洙泗之教莫大于求仁包四德冠四端天尊爵人安宅實在此仁孔門傳授心法莫要于答顔子者次告仲弓告樊遲始明以敬教之居處恭執事敬敬也出門使民如賔如祭敬也克己復禮雖乾道未易能然恭敬之心禮也復禮之禮禮中有敬焉仁為心德心本與仁一而私欲二之無私欲而有其德即仁矣若何而能無私欲必也敬乎動靜表裏一敬自持須臾有間私欲萬端不敬則不仁求仁必持敬聖人復起不易斯言矣然為仁雖由己而輔仁不能不資乎人故曰以友輔仁又曰友其士之仁者必友士之仁始能輔我以為仁然必我有此仁始能友士之仁否則我有愧於仁仁者之友胡可與我友哉陸君誠能內持敬以求仁外取友以輔仁一聞人以仁友呼我我必自反焉必用力為仁友不亦宜乎余雖未面陸君不知其人視其友由安貞可以知陸君焉聞天厯己已浙江鄉闈三十一路共二十有八名而天台占其五其人皆英俊陸君皆得交之鍾天台之英亦固應爾天台上應台躔非他名山比鍾竒育秀必非凡人孫興公所謂仍羽人于丹丘羽人仙也君家放翁寄朱子詩曰有方為子換凡骨來讀晦翁新著書蓋謂文公書即換凡骨之仙方也君盍告所交之五君不求仙于仙而求仙于文公書出而瑞世為人中之麟為朝陽之鳳使應台躔之山益因人而加重不尤偉乎君之名若字敬與仁之全體大用盡在文公所著書中豫也言輕借曰不足深信君家放翁豈欺君哉仁友其勉旃江楚望淡生活説婺源楚望子江君嶽詩稿曰淡生活宛轉求豫一言豫未識其人未見其詩豫何言哉辭不可作乃贈豫詩二章謂嘗一臠可知餘味為求言復諄諄不置子何得無言哉冷淡生活香山居士語也今去冷獨淡詩病不淡耳淡奚病哉樂聲淡則聽心平是故樂貴淡張籍學古淡是故詩尤貴淡然淡而非稿無餘味之謂也一毫牽強不可謂淡少不出于自然不可謂淡外臞而內腴形枯而神澤斯為淡矣昔人論蜜取其中邉皆甜豫今論詩非取其中邉皆淡也能以理為主以氣為輔以興趣品格為髙以渾然天成為妙其殆庶幾乎老子曰味無味參透斯言淡生活當長一格抑聞君之曾大父字子大與朱文公王雙溪遊皆愛重之以詩唱酬不知子大視二公斯知子大矣抑又聞子之淡生活古修江君名之其琅玕閣暨取叢祠龜隂歸之學官又雲峯胡君名之記之不知楚望子視二公斯知楚望子矣噫甘泉有源珍木有根子之詩根源安在曰子大杜子美非審言孫乎能以此自懋淡生活又當長一格和詩説詩歌有唱和尚矣自舜作歌臯􅆳歌始春秋時賦詩必答然不過賦古人詩耳孔子與人歌而善必使反之而後和之和即􅆳也答也降而李陵蘇武詩體雖變唱答則同又降而至盛唐詩體又變唱答不變杜韓諸集班班可考然有和意不和韻尚有古意又降而白樂天元微之之徒則和韻矣全失古意然如車斜家花韻尚可押愈降愈下以至於今波頺風靡益可厭惡詩非詩韻非韻險韻俗韻獨腳韻往往而是詩之天趣絲毫無有豈詩也哉和韻詩前輩多非之韓陵陽不喜和人韻楊誠齋深言和韻之弊見於答徐􅆳書其言深切痛快此等議論後生想耳未聞亦慮不到率謂見人有詩即當和韻耳近有一等無知之徒效人為園亭若干詠題扁蹈襲而俗辭語鄙俚而謬且以和韻強人無知者又為之先和而宛轉以求于人應之者亦紛紛用其韻一是皆不知而妄作何等詩乎證之先民裴迪之於王輞川韓昌黎之于劉虢州蘇長公之于文洋州楊誠齋之于向薌林少者十餘詠多者五十詠只取和其題意並無和韻之例後生亦嘗考之乎唱者為轉求者應之者率皆冥冥不知其非以為當良可憫嘆今書此示初學得與山房説余與得與查君生同年學同志聞名而神交識面而心契二十年前乎今雖余亦以德宇呼君也今年春君過余偶談及比亦有以德宇代名者秋七月君忽緘得與山房記諗豫謂本取孟氏思則得之天所與我之意四方朋友見呼以德宇者殊非所以扁山房本指而且徴豫一言意者君惡聞孟公之驚座懶裁子夏之小冠故以是别之與姑舍是試相與繹軻書之藴所謂思則得之者接心之官言此天之所以與我者併耳目心官之三者言推廣言之則如大學序所云天降生民莫不與之以仁義禮智之性中庸或問所云天之與我者無一理不備亦無不可者大哉心乎兼五常具萬善位天地育萬物總不出方寸間神而明之全于思乎在是天之所以與人者莫大乎此心人求得天之所與者莫大乎立此心若為立之思焉耳審克思之則天之與我者可得天君泰然百體從令耳目之小者詎能奪之放而不思則天之與我者雖得之必失之大者不立必役于形而耳目得以奪之矣如之何勿思天之與我者雖同而氣質有昏明粹駁之分則所以與人者因之而不同君氣清而質粹天所以與君者過凡庸逺甚君少也蜚詩聲騰文價非無得也今年過強仕乃肯斂其英就其實卓乎以孟氏為標的將大有得于天之與我者充是言也如之何勿思先立其大者以致思于心而無徒眩于耳目溫然而仁天地之春不必吹鄒子之律也肅然而義宇宙之秋不必賦宋玊之悲也嘉會而禮與亨俱通不必聚漢廷之訟收斂而智與貞俱固不必運家令之囊也以程子玩物喪志之言自警毋徒誇洽乎記問則博不至于溺心以朱子發憤永刋落之句自勵毋徒矜巧乎文章則文不至于勝質殆不惟上得天之與而且逺得天之傳允若茲惜不令韓昌黎見之耳是則區區下交之望己君本求豫題詠豫不天有陟屺痛賦詩前賢有明戒嗚呼敢勉為君説之得與主人寧不曰是皆老生之常談吾山房又焉用子重下注腳畢仲永靜軒説友人畢仲永請曰曩仲毅兄之遊吳門過錢塘也出先生餞行詩于虛谷方公公和韻餞之且賜以字説時永夀惜不偕行不得與此賜今永夀讀書所扁以靜軒願併賤字一言以指南之豫曰表名以永扁軒以靜其本先聖仁者靜夀之云乎請廣其説夫子以動靜樂夀分屬知者仁者蓋以世之賢人君子資性有此二等知者精明之意多仁者渾厚之意多動靜以體段言樂夀以效驗言故也然安于義理靜而常覺豈有仁而不知者定而能應寂中涵感豈有終靜而不動者靜而有常固有夀理然仁者不憂樂天知命豈有仁而不自樂者夫子分仁知而各言學者當合仁知而兼體所以程子曰非體仁知之深者不能如此形容之朱子武夷精舍之仁知堂詩亦曰我慙仁知心偶自愛山水程朱二先生皆合仁知兼言曷嘗岐而二之哉子之尊先大父梧山翁尊先君子觀竹翁種德纍仁子宜益培之合洙泗言仁程朱論仁同其精微實諸踐履知及之仁能守之內無私心外皆當理全體而不息焉進學以知為先務成德以仁為要歸中庸曰有德者必得其夀非必之降年之天而必之方寸之天萬物靜觀率皆自得靜極而動樂與人同培纍世所種之德而穫之飫之萬里鵬程摶扶有日豈偏于靜而忘世者將夀域在茲樂地即在茲先聖先師亦無間于斯言傳神説贈婺源王勝甫藝之精者為能使造化出乎吾手孝之純者欲常使親在吾目噫豈易與俗人言哉道與之貌天與之形百人百殊千人千異一物各具之極皆自萬物統體之極出焉此造化之造化也而精于傳神者一心即鏡照之於內兩眼亦鏡照之于外得之心寫之繪素無異于鏡鏡其人始也道與之貌天與之形今道也天也自吾手出非吾手之造化而何故曰藝之精者為能使造化出乎吾手勝甫以之今夫人寓形宇內有盡而子孫之心無盡他年親日逺日忘所賴以傳逺者神是己子孫嘗逮事者見之如親常在目中固也不逮事者亦可于此識其形容雖不逮事猶逮事也老蘇有言平居聞一善必問其人之姓名與其長短大小美惡之狀又或志其人平生所嗜好以想見其為人嗟夫此于外人且然况子孫之於親乎子孫欲見之而不可得今得見所傳神則世美思于心世傳荷于身敢懈而不益虔乎故曰孝之純者欲常使親在吾目孝子慈孫以之人生壯老容隨年換自記其顔此在其身責未在子孫世有不珍襲先世之容張以驅禽雀護禾黍者有捫其絹用糊厨者有付婢以紉履者斯人也不有其先若此沒身難矣而况能有子孫乎因書之以為世戒平世間人説石泉吳子自號名世間人豫謂之曰間人甚佳名世難稱曷不曰平世間人石泉韙之徴子説豫辭不獲諗之曰漫為清世一間人康節詩也老景清間如啖蔗東坡詩也自一命以上即不得間幸遇平世本不當間生平世為間人老景也斯可然老不得間往往而是子之年已垂及涑水入耆英之年乃能水其心雲其身一毫外物莫能攖之當東坡所云之老景為康節所云之間人禹稷當平世願為子不可得也子年少亦嘗一命今老矣前日事姑付春夢婆一笑中優哉遊哉聊以卒嵗隨寓而樂消其清間與其為平世貴人而不間孰若為平世間人而無辱以當貴乎石泉掀髯大笑曰子言良然實卿字説豫族貢元公之曾孫光頴而淳少從豫學弱冠請字字以實卿屢請説今甫克為之自務光以來名光者多矣略舉之若田若霍若孔若嚴若錫若斛律若沈以洎南渡李皆名光或顯而不稱其名或隱而能完其名人品不同而名字稱德業符莫如司馬公聞于耳可警于心者公之字是也易曰篤實輝光孟子曰充實而有光輝光為實用實為光體尚矣書之重華本于允塞底至齊信發于用昭明大學之誠于中形於外中庸之誠則形形則著著則明樂記之和順積中而英華發外皆是意也溫公之字君實亶為篤實充實無愧於其字者朱子贊其遺像曰篤學力行清修苦節有德有言有功有烈上十字實也下六字光也惟其有篤學力行清修有德之實宜其有言與功烈之光功烈之有光于當時元祐相業是也其有言光于萬世通鑑三百五十四卷一千三百六十二年行事是也顔子曰舜何人也豫何人也有為者亦若是實卿乎聞實卿之稱警于心而懋實字之實吾家陳潭地記之所云云雖應城公以親叔第于前福倅公以親姪第于後貢元公以福倅親弟貢于次舉俱未足以契劵地記之言子能刻勵力學懋其茂實蜚其英聲如溫公之德言功烈光于一時萬世者亦人所為耳契劵地記之言安知其不在子乎嗟夫實卿其尚懋之哉誰謂華髙企其齊而自批云尋常字説無許多字此欲詳盡固不得而略也試味之中有不緊切間字否震齋説易自蒙至節可取以名齋者十七八卦扁齋以震於同邑戴公舜舉見之震卦德為動于卦象為雷逺取于物為龍取一索得男為主器之長子卦爻辭及象傳辭參取之惟于龍未之及大象傳曰洊雷震君子以恐懼修省用易以切己省察其義大矣哉然反覆玩繹全卦之深意非徒聞雷震而畏天威方修其身省其過也卦辭與初九爻辭皆以震來虩虩恐懼貌夫子傳之曰恐致福也震一陽動于二隂之下有亨道焉所以有亨道者以恐懼可致福耳夫子深意豈徒于既動而恐懼當如中庸所謂恐懼乎其所不聞致靜時涵養之工夫繼以修省致動時省察之工夫此動靜無違于敬之事也先儒謂敬字惟畏近之恐懼即畏也畏即近于敬也此不聞亦式之天豈待聞雷之震驚始恐懼修省也哉莊周之書寓言十九然于易有得曰易以道隂陽先儒深取之又有曰尸居而龍見雷聲而淵默上句乃靜中涵動龍之現震之龍也下句乃動中涵靜雷之聲震之雷也二言精微借以證震卦之義淵乎旨哉戴公有得于震而善用之吾宗弗齋翁為之記善矣公之孫庭芳君葺祖之齋而新之録記文示余欲余下一轉語敢釋此説以補先儒與記之所未備援濓溪飬心亭説例題之曰震齋説子馨字説松莊趙君五嗣與竇氏五桂同第五賢郎自幼以芳為名未字也不鄙下問于豫僭字之曰子馨申之以説焉周書明德惟馨唐賢曰惟吾德馨馨者芳香之氣味德者芳香之本根愚願子馨講學以明夫善躬行心得以誠其身則芳馨之德斂之不出乎方寸芳馨之譽播之彌滿乎六合趙韓王道理最大半部魯論之相業時來則為之奚以多遜為哉豫之所期望于子者甚大子必勉之族姪孫子敬子襄字説族兄八府君二孫長曰翼年踰弱冠次曰贊年亦幾弱冠矣字猶齗齗未定決於豫豫曰命名初意翼本詩之翼翼贊本書之贊贊歟曰然今字翼以子敬字贊以子襄可乎皆曰唯遂申其説告之翼而愈翼欽敬之不息贊而愈贊輔贊之不息也潛心文王于何求之曰小心翼翼之敬而已敬為百聖相傳心法能緝以修其誠熙以克其明于無不敬而知所止焉他日用之則行起心上之經綸其能為臣止于敬必矣臯之陳謨亹亹忠嘉大禹主張國論以可績許之臯眀道不計功惟思贊贊以襄成治道焉耳能思臯之思他日用之則行輔贊襄哉之成功雖致君舜上可也府君之祖貢元公與親兄福倅公同習詩經領薦鄉郡垂上春官齎志以逝距今三世矣一經相傳赫赫如昨日事二子誠能博求之經史子集反而約之思無邪之經提二祖詩經之筆以掇取巍科亦分內事昔春秋時有陳敬仲曾子弟子有子襄皆古君子苟能敬如敬仲聞大勇如子襄居今而思古焉是亦古君子也奚必多讓彼曰古之人古之人立志如此不寧惟余之望亦而祖府君之望尤貢元公之望族孫存心字説族孫良祖從豫遊請字豫字之曰存心拱而請其義豫曰孟子謂存乎人者豈無仁義之心哉仁義之心即良心也立人之道曰仁與義人欲無愧于為人在乎存此仁義之良心而不敢放耳孔子曰操則存舍則亡此操存字與存乎人之存字類此舍亡字與放其良心之放字類存放之幾不可不謹也始也操之而後存及存之之熟不待操而常存而祖所以存方寸地留與汝諸孫耕者實在此能存良心學成見諸用起心上之經綸雖莫大事業皆由此焉充之良祖其存此良心以印而祖之心哉歙縣吳戎子元字説戎其名者典午之世有之今歙邑吳君亦以戎名而字子元徴説于豫豫曰王濬仲不足名也豫請大之元戎十乘詠于詩戎之子元意應取此古人文武全才出將入相非如世叔偏長是矜學古入官十乘先行亦分內事耳元大也亦仁也文王作易曰元亨本取義于大孔子贊易曰元善之長體仁長人始取義于仁大且仁元之義盡矣辛憲英曰軍旅之間可以濟者其帷仁恕乎元戎統數萬衆民命國命寄焉非仁曷以子元勉乎哉今日之入孝出弟所以本此仁他日之入相出將所以廣此仁子元勉乎哉果力此言王濬仲焉得不風斯在下戴則翁字説同邑隆阜戴君望族也元式其名則翁其字世業儒以明經授徒祖蜚聲舊京庠伯兄為昭武樵溪書院長前教授上饒洪亦山嘗委則翁為郡泮掌書觀其家聲令聞其賢可知年踰強仕矣猶不自足需説于豫豫味君之名若字其本諸周書之式和民則乎式敬也民則也者天生蒸民有物有則之則也司徒掌教自唐虞已然敬敷五教在寬與式和民則異辭而同旨式即敬也和即寬也父子有親父子之則君臣有義君臣之則凡人倫所當然皆謂之則式以致其嚴和以全其寬式敬以為本和寬以將之民則盡矣其易和順於道德之意乎由和民則而盡性以致于命焉精微而見天則充極而順帝則皆性分內事希賢聖事則翁其懋之我能式敬以和民則人必將于君子乎是效是則則翁其懋之味其説而踐其實將必大有可敬者豈但如石屏戴式之以詩鳴于一時而已哉張元玉玠字説郡城張君玠明善張先生之曾孫也其家世之詳具見于虛谷方公所為張先生志銘中十世儒家今以儒飾吏尚留吾邑至順庚午孟秋下旬偶爾簪盍以豫于其伯父仲文公四十年庠序交遊之契不鄙令訂其字謂小字元之自幼已然然兄弟四五人字之下一字皆玉字兄字伯玊長弟已字仲玊今欲易字與兄弟協恐人相呼己慣不我從可若何豫曰元字不必易但易之為玊字足矣元玊喜拱請其説謹按許氏説文玠大圭也周書稱奉玠圭又按廣韻亦云玠大圭長尺二寸而詩書通作介圭介大也嵩髙曰錫爾介圭韓奕曰以其介圭説者曰諸侯之封圭執之以合瑞也今字元玊元大也與介義同元之訓大自文王彖易始元亨在占辭不過曰大通夫子贊易始以元善之長體仁長人發易之藴焉小戴記備言君子于玊比德願吾元玊於溫潤而澤仁也以下心潛而身體之玊其德以玊其身行已立身粹然無瑕公卿輔相時來為之自漢蕭曹以降由刀筆秉鈞衡者比比皆是矧君本儒雅子弟雖如申伯受介圭之錫韓侯以介圭入覲亦非分外物修其在己俟其在天元玊何損焉昔秦子初字太虛後改字少遊人但曰少遊不復呼秦太虛第更之有尚呼元之者出吾此説相示一笑必改呼元玊元玊云君歸以此呈尊伯父亦當以吾言為然金伯明字説同邑金兄若愚尚書忠肅公之八世孫也生三嵗而孤大父健教育之以今名更其乳名既冠朋友字之曰伯明玄黓涒灘之嵗始從豫遊徴字説甚勤諗之曰橫渠張子有言有形而後有氣質之性善反之天地之性存焉何謂反之變化氣質是也天地之性本無不善氣質之性不能皆善清者智濁者愚智即明也能力學以變化之如中庸之百倍其功則雖愚必明矣若愚而變化其氣質其惟希賢乎所謂若愚即顔子之如愚也顔子明睿所照即始見終其聞聖言觸處洞然夫子初以如愚言之退省其私亦足以發坦然由之由即行也宜終以不愚許之然顔子初不以明睿自居也遵聖師循循之誨博以文以致其知約以禮以力于行知行益進既竭吾才見聖道之卓立與始之瞻忽大不同己見到聖人之地步但欲從末由未能到聖人之地步耳守之也非化之也假之以年則不日而化矣程子顔好何學論所謂明諸心知所往然後力行以求至可以助張子善反之之功焉伯明年富力強可以積學有待顔子以如愚得之如參也亦竟以魯得之矧若愚魯而非真愚魯乎果能自今以始善學顔曾則子畏顔曽乎顔曽畏子乎伯明苟然豫言其必勉之趙子用字説霖雨蒼生傅巖相業用汝作之實在髙宗夫人幼學壯行有體必貴有用用之則行不能自見于用用之體在我用之機在君孔孟之道用之可雷域中雨天下奈時君不能用之故曰苟有用我王如用豫無用之者雖孔孟不能以自用况學者乎趙君霖其名翩翩佳公子也妙齡秀發有志于學邂逅相遇請曰友以子雨字我願説諸豫曰左氏謂雨三日以往為霖霖之為雨其誰不知詩家每單用霖代雨字如一滴秋霖白一莖芭蕉葉上認秋霖奚用贅以雨乎盍更之曰子用何如君欣然可之請其説遂諗之曰汝作霖雨啓乃心沃朕心傅説一方寸心霖雨之源所自出浹洽以沃君心霖雨之流所自先由沃君而澤民霖雨之流所宜澤大霈也天下無無體之用體安在曰在己之心所以開啓己心者其必由學乎六經學字開端于説命傅説惟自學以啓己心全體既立故能闡其學以沃君心以澤天下大用斯行君今年甫踰冠如日方升舍學將奚事或問朱子傅説亦讀書否答曰不讀書如何有説命三篇之文君盍監此多讀書以培其學勉學務以啓其心由科目以奮其身用汝之機端在此乎肇昔趙書記以魯論相天下非君當家衣鉢乎願力勉旃誰謂華髙企其齊而槐堂程叔固字説丞相吉國程公之曾孫莊夀字叔固徴説於子按莊生逍遙遊篇有大椿等説無夀字櫟社章始有夀字故能若是之夀是也緬想孩而名之初不過愛子而願其夀取八千春秋意耳叔固其字恰有深意敢托大易魯論及先儒議論發揮之以塞雅命可乎乾文言曰貞固足以幹事大傳九卦曰恆德之固也朱子本義謂貞固者知正之所在而固守之所謂知而弗去是也常者守不變而常且久是也余謂貞固恆固守有常其夀之基本歟側聞叔固以相國曾孫能敏而好學妙齡方十有四距古者入大學之年亦既邇只願希先聖之志于學以自力志之者朱子謂念念在是而為之不厭也持守堅定不可搖奪是謂志志為氣帥三軍之帥可奪而志不可奪守之不固志或可奪不得謂之志矣先聖十五志學初一進經十五年至三十而立朱子謂有以自立則守之固而無所事志矣持守堅固卓然有立固之效驗至是純熟自無改初年之志也愚願叔固隆師親友下十餘年堅固工夫至三十即先丞相戊子己丑之年也踵世科丞相譜亦分內事劵內物其毋多遜莊生所謂能若是之夀自不待言而可知老生亦曾用于固守者惜時不早逢中嘗似逢而老迫矣今稿項黃馘亦忝八十有一甘心于無所可用者叔固其以我為戒而及時以懋之哉髙珉仲溫名字説乳溪名儒髙公名叟之孫其生也祖善視之名之曰珉年幾弱冠矣友字曰仲溫好學不倦其師王君彌道余友也將赴江寧教官來别余因言曰髙氏之子方從吾遊今茲之别有依依不忍釋意盍即其名若字惠一言勉進之余遂為之言曰昔陳君舉有言古之人拙于取名而工于制行後之人反是其取名也工其制行也拙余以其言槩觀世之人動以玊璠璵圭璧等自命名工矣于稽其行果玊與果璠璵圭璧與今夫珉美石之似玊者也子之祖以似玊之珉命子非靳也非拙也自抑而不自誇也詩不云乎溫其如玊亦頌其人之似玊云爾祖以是名孫蓋望孫自似玊而勉勉進于如真玊而溫溫子其工于制行以副祖之望乎聘義之論玊曰溫潤而澤仁也于玊比德以仁冠之其意深而涵今參之樂記之言春作仁也洎真文忠公之言曰溫然而仁天地之春其仁也包四德冠四端心德之全人道之大如春之冠四時而貫四時者也子其用力于洙泗之言仁匪直如玊之溫必如其溫潤而澤之仁處己待人溫然一春則子之進于學進于德未易可量將與洙泗門人揖讓周旋其間夫然後方無愧而祖之所名孫與友之所以字子者余老矣行年七十有六矣星翁有許余年過九十者或庶幾其言望乳溪之濵有氣白如虹晝夜貫天者必子也程持敬兄弟字説程君與京命其子曰紹祖孰師以持敬字之或謂與名似不應豫曰奚而不應也紹聞衣德言申之以敬哉奚而不應也與京曰先生盍説諸使小子終身受持何幸如焉豫因諗之曰商周老臣懇懇以敬格君必進以法祖父訓其子師訓其生何可不然易曰無有師保如臨父母子也今呼其名凛若大父之臨其上敢不敬乎持之之方子朱子盡之從事于斯是曰持敬動靜無違表裏交正靜而敬動必敬可也表能敬裏必敬可也窮為良醫司人性命逹為良相迪上以為生民立命此而祖以來所兢兢然者苟念厥紹敢不敬乎子之八世祖克菴公受尊德性齋銘于子朱子尊德性即持敬之大本大原也深念及此敢不敬乎次子曰繼祖字懋敬繼即紹也勉于敬即所謂持敬也而兄弟無二祖亦無二敬也嗟乎二子其尚敬之哉慎無曰此老生之常談古杭杜彥和字説杜君仲禮字彥和其先世大明人南遷寓古杭多年所矣豫初識之見其貌溫如其言隱如舉動從容志趣純篤心敬之一日拱而徴字説于豫一再辭請益堅豫愛其質之近道志之向學也欲因以勉之臻于成遂不終辭夫禮之體嚴而用貴于和禮勝則離固以和為貴和勝則易流又以和而不流為貴是故必以禮節之有子之言中正不偏蓋聞之夫子者也何以言之夫子傳易履和而至履以和行履禮也禮貴于和也又曰上天下澤履君子以辨上下定民志曰辨曰定非和之節歟天秩有禮自我有庸必要歸同寅協恭和衷焉和衷和也寅恭節也書易魯論其歸一揆耳子之年方近三十以如許純粹之資質又超然欲拔出于舊習外苟求名師賢友琢之成之始以十年方強仕所進何可量聞子之先大父諱濟而字汝舟蓋志乎商相事業者賫志以沒豈無望于後之人若作和羮爾為鹽梅彥和勉之如和羮不偏于作醎亦不偏于作酸即不倚於一偏禮而和和而節之理也他日果能學成行修時來即為雖如如晦之相貞觀祁公之相慶厯善繼子大父之志而光大之亦分內事何讓焉子以為愚之言乎非也愚聞之先儒先儒聞之夫子有子夫子聞之天任時仲字説同邑任君士敏時仲其字求説於余雖未有半靣雅然聞其人於吾友宋君道源知其好學不厭者也遂為之説任得姓甚古證之左氏傳自滕薛朝魯知薛姓任暨季任為任君處守以幣交孟氏則又以國姓矣自茲代有顯人而人物莫盛於眉山之任孜字遵聖弟伋字師中皆舉進士與老泉東坡厚遵聖學問氣節名埒老蘇令平泉有遺愛子伯雨為右正言力攻章蔡直聲鏗鍧宇宙間諡忠敏忠敏子象先中詞科申先中書舍人師中知瀘州東坡嘗贈之詩曰吾州之豪任公子少年盛壯日千里别來十年學不厭讀破萬卷詩愈美可尚也已今味時仲之名若字其本諸説命乎敏有二義有天資之明敏有學力之勤敏敏而好學以天資言務時敏以學力言凡人性敏者多不好學孔文子性敏而能好學夫子所以美之子敏于學而不時是學而不時習非敏也傅説所以為君言之子能為時敏是務專力於敏又無時而不敏如顔之服膺而不惰如曾之日省而傳習不至如求之今女畫賜之倦學願息乾健無時而不流行子之自強不息者能與時以偕行是又今之任師中十年不厭而萬卷讀破者也聞君之一宗多聞人其希遵聖之伯仲忠敏之父祖子孫安知他日吾休陽之任不趾美眉山之任乎昔楊修謂揚雄為吾家子雲子亦宜曰吾家遵聖師中伯雨也當家有先哲舍是將誰希希驥之馬亦驥之乘下十年不厭之工夫以之應舉劵內物也他日誰敢與諸任齒乎時仲其勉旃程仲本字説長樂大尹程公之令子植先字仲芳廣東廉訪僉事詹公為之更曰仲本當矣仲本以方十有八之年侍親逺遊今歸而再往也道過寓館徴字説于豫豫於其大父信齋公以來託世契忍不為一言以發詹公深意而玊成之歟按朱子于本立道生注曰本猶根也凡植木未有不培根本而能生生而遂其枝葉華實者栁子種樹傳盡之不及者根拳土易過之者爪膚搖本皆非也韓子亦曰溉其根將食其實人之于學也何莫不然性之未發為大夲情之已發為逹道必涵養大夲以致中方能行逹道以致和理性情不先立其本可乎物有本末致誠正修以明明德本也齊治平以親民用也國家天下之事業不先於身心以立其本可乎語所謂孝弟為仁之本孟所謂事親事之本守身守之本體立而後用行皆自本根之立者始子每呼植之名聞仲本之字當體詹公美意深領而力勉之先篤學以立本體它日待時以逹功用遡敬甫南窗洺水諸公而踵其世科亦學者分內事耳詎止趾祖父之美而已昔伊川之著顔子所好何學論也非正如子之今年年十有八乎顔淵曰舜何人也豫何人也子必勉之子往拜詹公其出此説為我請教焉戴彥成字説節齋先生漕元戴公之次孫子植字彥成需字説於豫諏所本本蘇長公三槐堂銘遂綴葺授之封植之功必世乃成東坡為王氏植槐言也十年之計種以木百年之計種以德王晉公植槐雖種木實種德耳晉公植之魏公果成之植德於前成功于後功之成德之符歟重席侍中之苖裔種德數世矣帥幹公奮于前漕元公紹于後德浮於功留以遺後之人中庸曰天之生物因其材而篤焉栽者培之天下無幸成之事而有幸成之功乎必魏公始能成晉公之植則夫成祖父數世之植者非彥成之責而誰之責也老泉曰功之成非成于成之日必有所由自余亦曰功之成雖自於植之日必勉其所以成戴叔永字説節齋先生漕元戴公第三孫子載字叔永族姪實卿為其孰師為之求字説勉為之諗曰人情莫不欲夀書曰資富能訓惟以永年永年夀也富矣何加曰教之必教之則全攸好德之天以迓續延洪降命之天是則永年存乎天所以永年存乎人然夏曰嵗商曰祀周曰年前乎三代為唐虞則謂年為載子之名取唐虞深意端有在唐虞之世民醇夀永後世莫及焉何世不可為唐虞子其樂堯舜之道一且獲用則致君堯舜之上自躋仁夀而躋民于仁夀亦分內事耳陶靖節自謂羲皇上人子豈不可自謂唐虞上人乎惟以永年孰加于是叔永勉之叔明字説子束書渠口恕齋汪公之門者三年公之次孫德馨甫五嵗警敏可愛己知尊師豫甚嘉之别一十有三載為至治三年其年與李蟠通習六藝之年符豫甥仲文為其孰師字之叔明求字説豫不得辭也諗之曰至治馨香至明德惟馨姬公猶訓也意宏大理精微有味乎其言哉至治之馨超黍稷之馨明德之馨逹於至治之馨明德之馨體也至治之馨用也自堯以降羣聖猶曰明德况希賢之士可不務求以明德乎猗歟叔明子之年方十有七志于大學正此其時盍於大學致力焉格致以啓明德之端誠正修以盡明德之實加以數年出應時需幸逢至治之時翊贊至治之治體立而用行姬公豈欺我哉族孫字成與祝辭族孫善從豫遊六年將冠其尊人字之曰成與謂豫為之説豫惟古重冠禮必有祝辭載之儀禮班班可考朱晦菴之子冠也劉屏山實為之祝辭焉今始加元服敢祝之曰冠而字之以敬其名為之祝辭儀禮是程族兄孫善字曰成與鑿鑿有稽厥有國語昔趙武既冠歷見諸卿惟韓厥忠誨期以人之成冠為成人在始與善元服始加謹始此乎勉棄爾幼志順爾成德古之祝辭亦于焉是力所謂善否此其一初慎所與哉觀孰與為徒一隂陽謂道繼之者善孰不成性君子道鮮君子成德成之實難成之曷難于所與乎關孟道性善堯舜是稱與人為善惟舜為能舜何人哉有為亦若是由希賢希聖斯為成矣然欲與善在矜心是去矜心未去善將不吾與又欲與善必堅存實念實念不存誰與我為善成當大成豈特小成毋以成自居將趙文子並稱慎所與哉我其朝夕兢兢月鼎衍義鄉友吳君鼎其名月潭其居月鼎其號徴一轉語於豫豫曰君二千石苗裔儒家者流而道法是好有意內丹之術君稽魏伯陽之書以月之晦朔弦望為丹爐之火候蓋月鼎一大證據也其説曰乾坤易之門户衆卦之父母坎離匡郭運轂正軸牝牡四卦以為槖籥蓋乾坤以人身言之則乾陽在上坤隂在下而一身之隂陽萬物變化終始皆在其間所謂金丹大藥者也然則乾坤其爐鼎與乾坤位乎上下而坎離升降于其間水也汞也青龍也精也皆屬乎坎火也鉛也白虎也氣也皆屬乎離然則坎離其丹樂與納甲之法乾為望坤為晦震納庚為月之生明而兊納丁為上弦巽納辛為月之生魄而艮納丙為下弦如槖籥鼓鞴之用者也月以五日為一節六節為一周初三日第一節之中月生明之時蓋始受一陽之光而昏見于西方之庚地初八日第二節之中月上弦之時蓋受二陽之光而昏見于南方之丁地十五日第三節之終月正望之時全受日光而昏見于東方之甲地此自坤而息由震兌而滿于乾前半月也至十六日則第四節之始矣始生下一隂為巽而成魄以平旦沒于西方辛地焉二十三日第五節之中復生中一隂為艮而下弦以平旦而沒于南方丙地焉三十日為第六節之中全變三陽而光盡體伏于東北之壬地焉此自乾而消歷巽艮而盡于坤後半月也此爐鼎丹藥所資以為一月之火候者與前月之六節既盡而禪于後月則長子繼父復生震卦而震一兊二以極于乾三巽四艮五以極于坤六循環無端而火候與月相為無窮每月之朔震始用事為日月隂陽交感之初于是加修煉之功焉修煉之要安在鼎器歌所謂隂在上陽下奔乃其妙訣也夫陽上隂下者衆人之所同隂上陽下者真人之所獨煉其氣而陽反下奔養其精而隂反上潤所謂龍從火裏出虎向水中生者也坎離水火鉛汞龍虎雖互換有異名實只精氣二者而已其法以神運精氣要歸于以火烹水以水滅火凝結而成丹焉夫是之謂內丹內丹成者長生久視後天而老可也其技亦云妙矣證之吾易坤下乾上天地不交之否乾下坤上天地交之泰隂上陽下而成丹與坤上乾下而為泰一也果能致中和則吾身之天地自位吾身之萬物自育其吾聖賢之鼎丹與月不在月吾之方寸虛暗即月也鼎不在鼎吾之巽而耳目聰明即鼎也進乎技矣此非愚言也聞諸空同道士鄒欣者也月鼎欲知空同道士乎其問諸軒轅彌明定宇集卷五
